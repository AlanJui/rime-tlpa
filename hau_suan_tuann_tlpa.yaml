# 候選字清單模組程式舘
# version: "v0.1.0.0"

#==============================================================================
# 定義【雙標音模式】之【候選字單】
# 令候選字視窗，可顯示兩組「拼音/注音」
# 左邊：拼音（TLPA 拼音字母）；右邊：方音符號。
#==============================================================================
hau_suan_tuann:
  #==============================================================================
  # 定義【雙標音模式】之【候選字單】
  # 令候選字視窗，可顯示兩組「拼音/注音」
  # 左邊：拼音（TLPA 拼音字母）；右邊：注音符號。
  #==============================================================================
  __append:
    # --------------------------------------------------------------------------
    # 聲調
    # --------------------------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    #======================================================
    # 左半邊：台語拼音（TLPA 拼音字母）
    #======================================================
    #
    #------------------------------------------------------
    # 拆解【聲母】+【韻母】+【聲調】
    #------------------------------------------------------
    # 有聲母（含雙字母聲母 ng、zz），後面接任意字元，並以數字作結尾
    # - xform/^((?:bb|ln|ggn|gg|zz|[bpmtdlgkzcsjh]).*\d)$/〔〉Ø$1〕/
    - xform/^((?:ph|th|ng|[bpmtnlgkzcsjh]).*\d)$/〔〉Ø$1〕/
    #------------------------------------------------------
    # 清除【零聲母】：【零聲母】組合型式
    # 1. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 2. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 3. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    #------------------------------------------------------
    - xform/〔〉Ø/〔〉/
    #------------------------------------------------------
    # 聲母處理
    # - xform/〉([bpPmtTnlgkKwhJZCSjzcs])/$1〉/
    - xform/〉(ph|th|ng|ji|zi|ci|si|[bpmtnlgkjzcsh])/$1〉/
    #------------------------------------------------------
    # 處理【鼻化韻母】轉換： Na = ㄬㄚ = ㆩ = ann
    # a/e/i/O/u/uai/iau/ai/au/ia/io/iu/ua/ui
    #------------------------------------------------------
    # 方音符號【鼻音前綴識別符】，改羅馬拼音字母【前綴鼻音識別符】：La = ⁿa
    - xform/L([iu]?(ai|au|[aiueo]))/ⁿ$1/
    # # 羅馬拼音字母使用【前綴鼻音識別符】：ann = aⁿ
    # - xform/([iu]?(ai|au|oo|[aiueo]))nn/$1ⁿ/
    # 羅馬拼音字母【後綴鼻音識別符】：ann = ⁿa
    # - xform/([iu]?(ai|au|oo|[aiueo]))nn/ⁿ$1/
    #------------------------------------------------------
    # ㆦ [oo] 韻替換調整：[oo/ong/ok/op] ==> [O] ==> ㆦ /ɔ/
    - xform/iOnn/ionn/
    - xform/iOng/iong/
    - xform/iOk/iok/ # 台語注音二式無此韻母，其拼音為：[iook] ==> [iOk] ==> ㄧㆦㄍ
    - xform/Om/om/
    - xform/Op/op/
    - xform/Ong/ong/
    - xform/Ok/ok/
    # 變更【元音韻母】的羅馬拼音字母： oo 為 O
    - xform/Onn/onn/ # ㆧ [oonn] = O + nn
    - xform/O/oo/
    #------------------------------------------------------
    # o 之【字典編碼】改為： ə
    - xform/ə/o/
    #------------------------------------------------------
    # 轉換成聲調符號：將【聲調數值】轉換成【聲調符號】
    #------------------------------------------------------
    - xform/1(〕)/1$1/ # 陰平 1  ¹  ˉ
    - xform/5(〕)/5$1/ # 陽平 5  ⁵  ˊ
    - xform/2(〕)/2$1/ # 上声 2  ²  ˋ
    - xform/3(〕)/3$1/ # 陰去 3  ³  ˪
    - xform/7(〕)/7$1/ # 陽去 7  ⁷  ˫
    - xform/8(〕)/8$1/ # 陽入 8  ⁸  ˙
    - xform/4(〕)/4$1/ # 陰入 4  ⁴
    #------------------------------------------------------
    # 校調
    #------------------------------------------------------
    # - xform/Øi/yi/
    # - xform/Øu/wu/
    - xform/〔〉/〔/
    - xform/〉//
    - xform/〔([^〕]*)O([^〕]*)〕/〔\1o\2〕/

