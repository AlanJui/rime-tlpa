# 【候選清單】程式舘：【雙欄式】注音符號（TPS）；台語音標（TLPA）
# lib_comment_TlpaBpm_and_tlpa.yaml （台語注音符號：台語音標/TLPA 使用之【注音符號】）
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 雙欄【候選清單】
    # 左欄：注音符號（TPS）；右欄：台語音標（TLPA）。
    #==============================================================================
    # ---- 0. 複製原始音標（左欄使用【】進行後續轉換，右欄〔〕保持原樣） ----
    - xform/^(.*)$/【》$1】〔$1〕/
    # 台語音標的【羅馬拼音字母】，其【調號】值，使用【上標數值】格式顯示
    - xform/1〕/¹〕/    # 1
    - xform/7〕/⁷〕/    # 7
    - xform/3〕/³〕/    # 3
    - xform/2〕/²〕/    # 2
    - xform/5〕/⁵〕/    # 5
    - xform/4〕/⁴〕/    # 4
    - xform/8〕/⁸〕/    # 8

    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ /   # 多重空白壓成一格（美化）
    #------------------------------------------------------
    # 聲調
    #------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    #------------------------------------------------------
    # 韻母
    #------------------------------------------------------
    - derive/ur/u/
    - derive/or/o/
    - derive/ou/oo/
    #------------------------------------------------------
    # 声母
    #------------------------------------------------------
    - xform/》Ø/》/
    - xform/》ji/ㄖ》i/
    - xform/》zi/ㄐ》i/
    - xform/》ci/ㄑ》i/
    - xform/》si/ㄒ》i/
    - xform/》ph/ㄆ》/
    - xform/》th/ㄊ》/
    - xform/》kh/ㄎ》/
    - xform/》ng/⁰ㄫ》/
    - xform/》g/ㄫ》/     # g
    - xform/》b/ㄪ》/
    - xform/》j/ㄖ》/
    - xform/》z/ㄗ》/
    - xform/》s/ㄙ》/
    - xform/》c/ㄘ》/
    - xform/》l/ㄌ》/
    - xform/》p/ㄅ》/
    - xform/》k/ㄍ》/
    - xform/》t/ㄉ》/
    - xform/》h/ㄏ》/
    - xform/》m/ㄇ》/
    - xform/》n/ㄋ》/

    #======================================================
    # 定義【韻母】與【方音符號】對映規則
    #------------------------------------------------------
    # 【零聲母】組合型式
    # 1. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 2. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 3. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    #======================================================
    # ㆦ [oo] 韻替換調整：[oo/ong/ok/op] ==> [O] ==> ㆦ /ɔ/
    - xform/》iong/》iOng/
    - xform/》iok/》iOk/ # 台語注音二式無此韻母，其拼音為：[iook] ==> [iOk] ==> ㄧㆦㄍ
    - xform/》ionn/》iOnn/
    - xform/》ong/》Ong/
    - xform/》ok/》Ok/
    - xform/》om/》Om/
    - xform/》op/》Op/
    # 變更【元音韻母】的羅馬拼音字母： oo 為 O
    - xform/》onn/》Onn/ # ㆧ [oonn] = O + nn
    - xform/》oo/》O/ # ㆦ [oo]
    #------------------------------------------------------
    # o 之【字典編碼】改為： ə
    # 【判斷條件】： oonn|onn|iong|iok|ong|ok|om|op
    # 非上述之 o【韻母】，自 o 變更為 ə
    - xform/》o/》ə/
    #------------------------------------------------------
    # 【鼻音韻母】使用【鼻音前綴識別符號】：
    - xform/》([iu]?(ai|au|[aiueO]))nn/》L$1/
    # 以【鼻音韻母】開始的無聲母音標
    - xform/》(m|ng)(\d)$/》$1$2/
    #------------------------------------------------------
    # i
    #------------------------------------------------------
    # 姜 iang / 堅 ian / 兼 iam
    - xform/》iang/ㄧㄤ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》ia([kt])/ㄧㄚ》$1/
    - xform/》ia(m|p)/ㄧㄚ》$1/
    # 經 ing / 巾 in / 金 im
    - xform/》i(ng|k)/ㄧ》$1/
    - xform/》i(n|t)/ㄧ》$1/
    - xform/》i(m|p)/ㄧ》$1/
    # 嘄 Niau / 嬌 iau
    - xform/》(L?)(iau)/$1ㄧㄠ》/
    # 驚 Nia / 迦 ia
    - xform/》(L?)(ia)/$1ㄧㄚ》/
    # 恭 iong
    - xform/》io(ng|k)/ㄧㆦ》$1/
    # 薑 Nio / 茄 io
    - xform/》(iə)/ㄧㄜ》/
    - xform/》(L)(iə)/$1ㄧㆦ》/
    # 牛 Niu / 丩 iu
    - xform/》(L?)(iu)/$1ㄧㄨ》/
    # 泉腔
    # - xform/》ir/ㄦ》/	    # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    - xform/》ir/ㆨ》/ # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    # 梔 Ni / 居 i
    - xform/》(L?)(i)/$1ㄧ》/
    #------------------------------------------------------
    # u
    #------------------------------------------------------
    # 閂 Nuai / 乖 uai
    - xform/》(L?)(uai)/$1ㄨㄞ》/
    # 光 uang / 觀 uan
    - xform/》uang/ㄨㄤ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》ua([kt])/ㄨㄚ》$1/
    # 官 Nua / 瓜 ua
    - xform/》(L?)(ua)/$1ㄨㄚ》/
    # 褌 Nui / 規 ui
    - xform/》(L?)(ui)/$1ㄨㄧ》/
    # 糜 Nue / 檜 ue
    - xform/》(L?)(ue)/$1ㄨㆤ》/
    # 君 un
    - xform/》u(n|t)/ㄨ》$1/
    # 方音
    - xform/》ur/ㄨ》/
    # 艍 u
    - xform/》u/ㄨ》/
    #------------------------------------------------------
    # a
    #------------------------------------------------------
    # 江 ang / 干 an / 甘 am
    - xform/》ang/ㄤ》/
    - xform/》an/ㄢ》/
    - xform/》a([kt])/ㄚ》$1/
    - xform/》a(m|p)/ㄚ》$1/
    # 閒 Nai / 皆 ai
    - xform/》(L?)(ai)/$1ㄞ》/
    # 爻 Nau / 交 au
    - xform/》(L?)(au)/$1ㄠ》/
    # 監 Na / 膠 a
    - xform/》(L?)(a)/$1ㄚ》/
    #------------------------------------------------------
    # e
    #------------------------------------------------------
    # 泉腔: erng, erk, eru, ere, ern er
    - xform/》er(ng|k)/ㄧ》$1/ # 等 [terng2], 德 [terk4]
    - xform/》er(n|t)/ㄧ》$1/ # 【恩】：ern1
    - xform/》ere/ㄨㄝ》/ # 火【鷄】:kere1
    - xform/》er/ㄜ》/ # 【火】鷄: her2
    # 稽 ei / 嘉 ee
    - xform/》ei/ㄝ》/
    - xform/》ee/ㄝ》/
    # 更 Ne / 伽 e
    - xform/》(L?)(e)/$1ㄝ》/
    #------------------------------------------------------
    # oo
    #------------------------------------------------------
    # 公 ong / 箴 om
    - xform/》O(ng|k)/ㄛ》$1/
    - xform/》O(m|p)/ㄛ》$1/
    # 姑 Noo / 沽 oo
    - xform/》(L?)(O)/$1ㄛ》/
    #------------------------------------------------------
    # o
    #------------------------------------------------------
    # 姑 No / 高 o
    # - xform/》(L?)(ə)/$1ㄜ》/ # 扛 Nə
    - xform/》ə/ㄜ》/ # 高 o
    #======================================================
    # 校調【鼻化韻母】輸出格式：
    # （1）無【鼻化韻母前綴符號】，如：【方音符號】
    #    【方音符號】： nia = Lia = ㄥㄧㄚ = ㆪㄚ = ㄧㆩ
    # （2）有【鼻化韻母前綴符號】，如：【閩拼方案】、【台語音標注音】
    #    【閩拼方案】： nia = Lia = ㄥㄧㄚ
    #    【台語音標】： nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    #
    # Liau, Lia, LiO, Liu
    # Luai, Lua, Lui, Lue
    # Li, Lu, La, LO, Le, Lai, Lau
    #======================================================
    # 介音 i 開頭之鼻韻母
    - xform/Lㄧㄠ》/⁰ㄧㄠ》/ # Liau = iaunn
    - xform/Lㄧㄚ》/⁰ㄧㄚ》/ # Lia = iann
    - xform/Lㄧㆦ》/⁰ㄧㆦ》/ # LiO = iOnn
    - xform/Lㄧㄨ》/⁰ㄧㄨ》/ # Liu = iunn
    # 介音 u 開頭之鼻韻母
    - xform/Lㄨㄞ》/⁰ㄨㄞ》/ # Luai = uainn
    - xform/Lㄨㄚ》/⁰ㄨㄚ》/ # Lua = uann
    - xform/Lㄨㄧ》/⁰ㄨㄧ》/ # Lui = uinn
    - xform/Lㄨㄝ》/⁰ㄨㄝ》/ # Lue = uenn
    # 元音/複合鼻韻母
    - xform/Lㄧ》/⁰ㄧ》/ # Li = inn
    - xform/Lㄨ》/⁰ㄨ》/ # Lu = unn
    - xform/Lㄚ》/⁰ㄚ》/ # La = ann
    - xform/Lㆦ》/⁰ㆦ》/ # LO = Onn
    - xform/Lㄝ》/⁰ㄝ》/ # Le = enn
    - xform/Lㄞ》/⁰ㄞ》/ # Lai = ainn
    - xform/Lㄠ》/⁰ㄠ》/ # Lau = aunn
    #------------------------------------------------------
    # 鼻音韻尾
    # 陽聲韻： 姆[m-] / 鋼[ng-] / n
    #------------------------------------------------------
    - xform/》m(\d)/ㄇ》$1/    # ㆬ [m]
    - xform/》ng(\d)/ㄥ》$1/   # ㆭ [ng]
    - xform/》n(\d)/ㄣ》$1/
    #------------------------------------------------------
    # 入聲韻 p t k h
    #------------------------------------------------------
    - xform/》p([48])/ㄅ》$1/   # ㆴ [p]
    - xform/》t([48])/ㄉ》$1/   # ㆵ [t]
    - xform/》k([48])/ㄍ》$1/   # ㆻ [k]
    - xform/》h([48])/ㄏ》$1/   # ㆷ [h]
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㆡ(ㄧ)/ㆢ$1/
    - xform/ㄗ(ㄧ)/ㄐ$1/
    - xform/ㄘ(ㄧ)/ㄑ$1/
    - xform/ㄙ(ㄧ)/ㄒ$1/
    # 國/台語注音符號複合韻母校調
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    #======================================================
    # 右邊：注音符號。
    # 定義【聲調】使用符號：【方音符號】
    #======================================================
    # - xform/》1/ˉ/        # 1 ¹ ˉ   陰平
    # - xform/》6/˫/ # 7 ⁷ ˫   陽去
    - xform/》1//   # 1 ¹ ˉ   陰平
    - xform/》2/ˋ/ # 2 ² ˋ   上声：不分陰上或陽上
    - xform/》3/˪/  # 3 ³ ˪   陰去
    - xform/》4//   # 1 ¹ ˉ   陰入
    - xform/》5/ˊ/ # 5 ⁵ ˊ   陽平
    - xform/》7/˫/  # 4 ⁴     陰入
    - xform/》8/˙/ # 8 ⁸ ˙   陽入
