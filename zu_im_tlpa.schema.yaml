# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: zu_im_tlpa
  name: 注音輸入法【台語注音符號】
  version: "v0.1.0"
  author: 居正中
  description: |
    【輸入類型】：注音輸入法
    【拼音系統】：台語音標（TLPA 拼音字母 + 方音符號）
    【字典編碼】：台羅音標
    【注音輸入】：方音符號（聲：ㄒㄧㆩˉ：nu*<SP>）
    【侯選清單】：〔sⁿia¹〕\n 【ㄒㄧㆩˉ】
    【聲調標示】：
      (1) 台羅八聲調；
      (2) 使用數值標示聲調，以利閱讀。

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  # 【輸入編輯列】漢字標音格式（310.md §輸入編輯列之漢字標音格式）
  - options:
      [ key_in_piau_im_sni, key_in_piau_im_tps, key_in_piau_im_tlpa,
        key_in_piau_im_tl, key_in_piau_im_poj, key_in_piau_im_bp,
        key_in_piau_im_bpm2, key_in_piau_im_ipa, key_in_piau_im_tlpa_tps ]
    reset: 8
    states: [ 十五音, 方音符號, 台語音標, 台羅拼音, 白話字, 閩拼方案, 台語注音二式, 國際音標, 台語注音符號 ]

engine:
  processors:
    - lua_processor@aux_commit    # 輸出【漢字標音】，而非【漢字】
    - lua_processor@jump_select   # 務必置頂，用以攔截【快捷鍵】，如：Ctrl+M, Ctrl+<, Ctrl+>
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier
    - lua_filter@reformat_comment_filter
    # 為 filter 除錯用
    # - lua_filter@append_ok_filter
    # - lua_filter@force_mark_filter

speller:
  alphabet: "!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-=\"5346][7."
  initials: "!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="
  finals: "\"5346][7."
  delimiter: "'"
  use_space: true
  #==========================================================================
  # 定義【注音符號】編碼及【鍵盤按鍵】對映之【注音編碼】
  #==========================================================================
  algebra:
    #===========================================================================
    # 拼音系統標準化校調
    # 為本輸入方案使用之【字典編碼】，進行【標準化】前置處理
    #===========================================================================
    - xform/6/7/
    # --------------------------------------------------------------------------
    # 區分 oo 及 o 所使用之羅馬拼音字母：【o】與【ə】
    # 將羅馬拼音字母 o 留予 oo [ɔ] 韻使用；使用【拼音符號】 ə [ə]
    # 《範例》：【何】：【ho5】= 【hə5】
    # --------------------------------------------------------------------------
    # 變更【元音韻母】的羅馬拼音字母： oo 為 O
    - derive/oo/O/ # ㆦ [oo]
    # --------------------------------------------------------------------------
    # 下之【韻母】乍看為 o，實則需當 oo [ɔ] 韻使用
    # iong|iok|onn|ong|ok|om|op
    - derive/ionn/iOnn/
    - derive/iong/iOng/
    - derive/iok/iOk/ # 台語注音二式無此韻母，其拼音為：[iook] ==> [iOk] ==> ㄧㆦㄍ
    - derive/ong/Ong/
    - derive/onn/Onn/ # ㆧ [oonn] = O + nn
    - derive/ok/Ok/
    - derive/om/Om/
    - derive/op/Op/
    # --------------------------------------------------------------------------
    # 變更 ㄜ /o/ 韻的羅馬拼音字母：[or] ==> [o] ==> ㄜ [or]
    # - derive/or/ə/
    # o 之【字典編碼】改為： ə
    - xform/o/ə/ # ㄜ [ə] - 只轉換獨立的 o
    # --------------------------------------------------------------------------
    # 【複合韻母】
    - derive/ai/I/ # ㄞ [ai]
    - derive/au/U/ # ㄠ [au]
    # --------------------------------------------------------------------------
    # 【鼻化韻母】
    # --------------------------------------------------------------------------
    # 可用【鼻化韻母後綴識別符號】輸入
    - derive/ann/d/ # ㆩ [ann]
    - derive/inn/f/ # ㆪ [inn]
    - derive/unn/q/ # ㆫ [unn]
    - derive/enn/r/ # ㆥ [enn]
    - derive/Onn/v/ # ㆧ [onn]
    - derive/Inn/x/ # ㆮ [ainn]
    - derive/Unn/y/ # ㆯ [aunn]
    # --------------------------------------------------------------------------
    # 【鼻化韻母】輸入，可用連續兩次的輸入達成
    #--------------------------------------------------------------------------
    - derive/([aiueOIU])nn/$1$1/
    # -------------------------------------------------------------------------
    # 【鼻音韻母】使用【鼻音前綴識別符號】：ñ
    #--------------------------------------------------------------------------
    # a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui
    # 【註】：台羅拼音使用 onn [ɔ̃] ==> ㆧ，如： 唔（onn），沒有所謂的 oonn 韻母
    - derive/([iu]?[aiueOIU])nn/L$1/
    # 為所有【鼻化韻母】建置【字典編碼】：【L】
    # - abbrev/L([iu]?[aiueOIU])/L/
    #==========================================================================
    # 【閩南話變調規則】
    # 為強化使用者輸入之便利性，即便輸入【變調】，仍能推算出【本調】之漢字
    # 為字典中的【本調】產生【變調】的衍生拼音
    #==========================================================================
    # 舒聲變調規則 (17325)
    - derive/1/7/ # 第一調 → 第七調 (kim1 → kim7)
    - derive/7/3/ # 第七調 → 第三調
    - derive/3/2/ # 第三調 → 第二調
    - derive/2/1/ # 第二調 → 第一調
    - derive/5/7/ # 第五調 → 第七調
    #--------------------------------------------------------------------------
    # 入聲變調規則 (48)
    # 入聲尾韻為 h 的變調
    - derive/(?<![ptk])4/2/ # -h 第四調 → 第二調
    - derive/(?<![ptk])8/3/ # -h 第八調 → 第三調
    #--------------------------------------------------------------------------
    # 入聲尾韻為 p/t/k 的變調
    - derive/[ptk]4/8/ # -p/-t/-k 第四調 → 第八調
    - derive/[ptk]8/4/ # -p/-t/-k 第八調 → 第四調
    #==========================================================================
    # 【聲母】羅馬拼音字母替換/衍生
    #  - 唇音/雙唇音: p, ph, b, m ( BP: b, p, bb, m )
    #  - 舌音/舌尖中音（齒齦音）: t, th, n, l (BP: d, t, ln, l)
    #  - 齒音/舌尖前音（齒齦音）: ts/z, tsh/c, j, s ( BP: z, c, j, s )
    #  - 齒音/舌尖前音（齦顎音）: zi, ci, ji, si ( BP:j, ch, jj, sh )
    #  - 牙音/舌根音（軟顎音）: k, kh, g, ng ( BP: k, kh, g, ng )
    #  - 喉音（聲門音）：h ( BP: h )
    #==========================================================================
    # 帶【鼻音】之【聲母】
    # - xform/^m/b/ # ㄇ [m]
    # - xform/^l/n/ # ㄌ [l]
    # - xform/^g/g/ # ㆣ [g]
    #--------------------------------------------------------------------------
    # - xform/p(?!h)/p/ # ㄅ[ p ]
    - xform/^ph/P/ # ㄆ [ph]
    - xform/^th/T/ # ㄊ [th]
    - xform/^kh/K/ # ㄎ [kh]
    - xform/^ng(?!\d)/ŋ/ # ㄫ [ng]
    #--------------------------------------------------------------------------
    # 【舌齒音（齒齦顎音）】可用【舌齒音 + i 】替換
    # - ㆡ[j] + ㄧ[i] = ㆢ[J] + ㄧ[i]
    # - ㄗ[z] + ㄧ[i] = ㄐ[Z] + ㄧ[i]
    # - ㄘ[c] + ㄧ[i] = ㄑ[C] + ㄧ[i]
    # - ㄙ[s] + ㄧ[i] = ㄒ[S] + ㄧ[i]
    #--------------------------------------------------------------------------
    # 台羅拼音轉【台語音標+】
    - xform/^ts(?!h)/z/ # ㄗ [ts]
    - xform/^tsh/c/ # ㄘ [tsh]
    # 舌尖前音（齦顎音）:
    - derive/^j(?i)/J/ # ㆢ[ji]
    - derive/^z(?i)/Z/ # ㄐ[zi]
    - derive/^c(?i)/C/ # ㄑ[ci]
    - derive/^s(?i)/S/ # ㄒ[si]
    #==========================================================================
    # 【字典編碼】：將字典檔中的【台羅拼音】轉換成本輸入方案，使用之【字典編碼】
    #==========================================================================
    #
    # --------------------------------------------------------------------------
    # 【元音韻母】與【複合韻母】：ㄞ[ai]、ㄠ[au]
    # --------------------------------------------------------------------------
    # 【元音韻母】
    #  ㄚ [a]
    #  ㄧ [i]
    #  ㄨ [u]
    #  ㆤ [e]
    #  ㆦ [oo]
    - xform/ir/w/ # ㆨ [ir]
    # --------------------------------------------------------------------------
    # 衍生【地方腔韻母】
    # --------------------------------------------------------------------------
    - derive/er(ng|k)/i$1/
    - derive/er(G|k)/i$1/
    - derive/er(n|t)/u$1/
    - derive/er/e/
    # 泉州腔
    - derive/ir(ng|k)/i$1/
    - derive/ir(n|t)/u$1/
    - derive/ire/ue/
    - derive/ir/e/
    # 漳州腔
    - derive/ou/O/
    - derive/ei/e/
    - derive/ee/e/ # 漳州/泉州腔
    # 廈門腔
    - derive/ur/u/
    #==========================================================================
    # 鼻音韻尾（m/ng/n）
    #==========================================================================
    # ng ：預設當【韻母ㆭ】
    - xform/ng(?=\d)/G/ # ㆭ (W) = -ng：ng 後接調號，當【韻尾韻母】ㆭ = ㄥ
    # n ：預設當【聲母ㄋ】)
    - xform/n(?=\d)/N/ # ㄣ (N) = -n： n  後接調號，當【韻尾韻母】ㄣ，
    # m ：預設當【聲母ㄇ】
    - xform/m(?=\d)/M/ # ㆬ (M) = -m： m  後接調號，當【韻尾韻母】ㆬ = ㄇ
    # --------------------------------------------------------------------------
    # 校調【複合韻母】，改成【方音符號】或【國/台語共用注音符號】
    # -------------------------------------------------------------------------
    # 校調【複合韻母】改成【國/台語共用注音符號】
    - derive/aG/A/ # ㄤ aG [ang] = a + ng
    - derive/aN/@/ # ㄢ aN [an] = a + n
    # 校調【複合韻母】改成【方音符號】
    - derive/aM/Y/ # ㆰ aM [am] = a + m
    - derive/OG/H/ # ㆲ OG [ong] = o + ng
    - derive/OM/W/ # ㆱ OM [oom] = o + m
    #==========================================================================
    # 【入聲韻尾】： # 【鼻音韻尾】==》【入聲韻尾】
    #   (1) -m  ==> -p
    #   (2) -n  ==> -t
    #   (3) -ng ==> -k
    #==========================================================================
    # 入聲韻尾：p/t/k/h，【字典編碼】：R/F/Q/V
    # 【所有入聲調】（台羅拼音第4,8聲）：【字典編碼】：【6】，【鍵盤按鍵】：【7】
    - derive/p[48]/R6/  # ㄅ [b] --> ㆴ [R]
    - derive/t[48]/F6/  # ㄉ [d] --> ㆵ [F]
    - derive/k[48]/Q6/  # ㄍ [g] --> ㆻ [Q]
    - derive/h[48]/V6/  # ㄏ [h] --> ㆷ [V]
    #--------------------------------------------------------------------------
    - abbrev/([RFQV]6)/6/
    #==========================================================================
    # 【入聲調】併入【輕聲調】，【字典編碼】：【&】，可使用【按鍵】：【.】
    #--------------------------------------------------------------------------
    # am/an/ang/im/in/ing/un/ong/iam/ian/iang/iong/uan/uang
    # (1) ap, ip, iap,
    # (2) at, it, ut, iat, uat
    # (3) ak, ik, ok, iak, iok
    # (4) ah, ih, uh, eh, ooh, oh, aih, auh, iah, iuh, ioh, uah, uih, ueh, iauh, uaih
    #==========================================================================
    - abbrev/(?:ah|aih|ak|ap|at|auh|eeh|eh|ek|iah|iak|iahnn|iap|iat|iauh|ih|ik|iəh|iOk|ip|it|iuhnn|mh|ngh|əh|Ok|Oh|Op|uah|uat|ueh|uh|uih|ut)[48]/&/
    #=======================================================================
    # abbreviation:
    # 台語音標之拼音字母輸入【簡化規則】（abbreviation：縮寫詞）
    #=======================================================================
    # 注音輸入，可只輸入：【聲母】+【韻母】，【調號】則可略去；但只適用於【舒聲調】（平、上、去聲）。
    # - derive/^([bpPmntTlgkKŋhjzcshJZCS]+)\d$/$1/
    - derive/^([a-zA-Z]+)\d$/$1/
    # 注音輸入，可以只用【聲母】
    - abbrev/^([bpPmntTlgkKŋhjzcshJZCS]).+$/$1/
    # 可只用【聲母】+【調號】輸入
    - abbrev/^([bpPmntTlgkKŋhjzcshJZCS]).+([17325480])$/$1$2/
    #==========================================================================
    # 【字典編碼】與【鍵盤按鍵】對映
    #==========================================================================
    # 【字典編碼】/【鍵盤按鍵】/【注音符號】
    # 【1】==>【:】==>【ˉ】   # 按鍵【[】輸入：第1調（陰平調）的【高平調】符號
    # 【7】==>【5】==>【˫】   # 按鍵【5】輸入：第7調（陽去調）的【中平調】符號
    # 【3】==>【3】==>【˪】   # 按鍵【3】輸入：第3調（陰去調）的【低平調】符號
    # 【2】==>【4】==>【ˋ】   # 按鍵【4】輸入：第2調（上聲調）的【高降調】符號
    # 【5】==>【6】==>【ˊ】   # 按鍵【6】輸入：第5調（陽平調）的【低升調】符號
    # 【4】==>【[】==>【ˉ】   # 按鍵【[】輸入：第4調（陰入調）的【低促聲調】符號
    # 【8】==>【]】==>【˙】   # 按鍵【]】輸入：第4調（陽入調）的【高促聲調】符號
    # 【0】==>【.】==>【˙】   # 按鍵【.】輸入：輕聲調的【輕聲符號】
    # 【6】==>【7】==>【ʔ】   # 按鍵【7】輸入：所有入聲韻母
    #--------------------------------------------------------------------------
    # 【L】==>【-】==>【ㄥ】  # 按鍵【-】輸入：ㄥ【鼻化韻母前綴符號】
    #--------------------------------------------------------------------------
    # - xlit|bpPmntTlgkKŋjzcshJZCSaiwueOəMNGRFQVIUY@AWHdfqrvxyLØ173258406|!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="5346][.7|
    - xlit|bpPmntTlgkKŋhjzcsJZCSaiwueOəMNGIUY@AWHdfqrvxyRFQVØL173254806|!1qas2wxEedNcYyhnRrfv8uKj,ikmp/9lM0;Oo*UJ<I(Lbtgz=-"5346[].7|

translator:
  dictionary: ji_khoo_tl
  prism: zu_im_tlpa
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    # 將連續輸入的分隔符號：【'】換成空白
    - xform/'/ /
    #==========================================================================
    # 定義【鍵盤輸入列】：鍵盤按鍵與方音符號對映
    #--------------------------------------------------------------------------
    # 全對映：（1）【注音符號按鍵】；（2）【調號按鍵】；（3）【功能按鍵】
    #==========================================================================
    # （1）【注音符號按鍵】
    # - xlit|!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="5346][.7|ㆠㄅㄆㄇㄋㄉㄊㄌㆣㄍㄎㄫㆡㄗㄘㄙㄏㆢㄐㄑㄒㄚㄧㆨㄨㆤㆦㄜㆬㄣㆭㆴㆵㆻㆷㄞㄠㆰㄢㄤㆱㆲㆩㆪㆫㆥㆧㆮㆯㄥØ一七三二五八四輕ʔ|
    - xlit|!1qas2wxEedNcYyhnRrfv8uKj,ikmp/9lM0;Oo*UJ<I(Lbtgz=-"5346[].7|ㆠㄅㄆㄇㄋㄉㄊㄌㆣㄍㄎㄫㄏㆡㄗㄘㄙㆢㄐㄑㄒㄚㄧㆨㄨㆤㆦㄜㆬㄣㆭㄞㄠㆰㄢㄤㆱㆲㆩㆪㆫㆥㆧㆮㆯㆴㆵㆻㆷØㄥ一七三二五四八輕ʔ|
    #--------------------------------------------------------------------------
    # （2）【調號按鍵】
    #     -【"】高音調（陰平）： 【無標記】
    #     -【5】中音調（陽去）： '
    #     -【3】低音調（陰去）： "
    #     -【4】高降調（上声）： ˋ
    #     -【6】低升調（陽平）： ˇ
    #     -【[】低促調（陰入）： 【無標記】
    #     -【]】高促調（陽入）： ˙
    #--------------------------------------------------------------------------
    #     -【7】促聲調（陰入/陽入）：【字典編碼】：【6】
    #     -【.】輕聲調（輕聲）：【字典編碼】：【0】
    #--------------------------------------------------------------------------
    # 入聲尾韻不用【標準按鍵】改用【声母按鍵】之相容處理
    - xform/ㄅ(四|八)$/ㆴ$1/  # ㄚㆴ
    - xform/ㄉ(四|八)$/ㆵ$1/  # ㄚㆵ
    - xform/ㄍ(四|八)$/ㆻ$1/  # ㄚㆻ
    - xform/ㄏ(四|八)$/ㆷ$1/  # ㄚㆷ
    #------------------------------------------------------
    # 聲調轉換
    #------------------------------------------------------
    - xform/輕/⁰/    # 輕聲調
    - xform/一/¹/    # 1
    - xform/七/⁷/    # 7
    - xform/三/³/    # 3
    - xform/二/²/    # 2
    - xform/五/⁵/    # 5
    - xform/四/⁴/    # 4
    - xform/八/⁸/    # 8
    #--------------------------------------------------------------------------
    # 【鼻化之元音韻母】（方音符號：ñ）輸入校調
    #--------------------------------------------------------------------------
    # 【元音韻母】連續輸入兩次，等同輸入【鼻化之元音韻母】
    - xform/ㄧㄧ/⁰ㄧ/
    - xform/ㄨㄨ/⁰ㄨ/
    - xform/ㄚㄚ/⁰ㄚ/
    - xform/ㄛㄛ/⁰ㄛ/
    - xform/ㄝㄝ/⁰ㄝ/
    - xform/ㄞㄞ/⁰ㄞ/
    - xform/ㄠㄠ/⁰ㄠ/
    #------------------------------------------------------
    #【鼻化之元音韻母】可用【前綴識別】輸入
    #------------------------------------------------------
    - xform/ㄥㄧ/⁰ㄧ/
    - xform/ㄥㄨ/⁰ㄨ/
    - xform/ㄥㄚ/⁰ㄚ/
    - xform/ㄥㆦ/⁰ㄛ/
    - xform/ㄥㆤ/⁰ㄝ/
    - xform/ㄥㄞ/⁰ㄞ/
    - xform/ㄥㄠ/⁰ㄠ/
    #------------------------------------------------------
    # 【鼻化之元音韻母】輸入過程校調
    #------------------------------------------------------
    - xform/ㄧ⁰ㄛ/⁰ㄧㄛ/
    - xform/ㄧ⁰ㄨ/⁰ㄧㄨ/
    - xform/ㄧ⁰ㄚ/⁰ㄧㄚ/
    - xform/ㄧ⁰ㄠ/⁰ㄧㄠ/
    - xform/ㄨ⁰ㄚ/⁰ㄨㄚ/
    - xform/ㄨ⁰ㄞ/⁰ㄨㄞ/
    #------------------------------------------------------
    - xform/ㄥ/⁰/
    #------------------------------------------------------
    # 韻母組合輸入調整
    #------------------------------------------------------
    - xform/ㄧㆭ/ㄧㄥ/  # ing
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    - xform/ㄚㆭ/ㄤ/    # ang
    # - xform/ㄚㆬ/ㆰ/    # am
    # - xform/ㆦㆭ/ㆲ/    # ong
    # - xform/ㆦㆬ/ㆱ/    # om
    #--------------------------------------------------------------------------
    # 校調
    #--------------------------------------------------------------------------
    # 聲母輸入校調（務必置於【鼻化韻母】校調之後）
    # - derive/ji/Ji/  # Ji(ㆢ) = j(ㆡ) + i
    # - derive/zi/Zi/  # ji(ㄐ) = z(ㄗ) + i
    # - derive/ci/Ci/  # Ci(ㄑ) = c(ㄘ) + i
    # - derive/si/Si/  # Si(ㄒ) = s(ㄙ) + i
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/(ㆡ|ㆢ)/ㄖ/
    #------------------------------------------------------
    # 聲母轉換：【方音符號】==>【台語音標/注音符號】
    #------------------------------------------------------
    - xform/ㆠ/ㄪ/
    - xform/ㄫ/⁰ㄫ/
    - xform/ㆣ/ㄫ/
    #------------------------------------------------------
    # 韻母轉換：【方音符號】==>【台語音標/注音符號】
    #------------------------------------------------------
    - xform/ㆤ/ㄝ/
    - xform/ㆦ/ㄛ/
    - xform/ㆬ/ㄇ/
    - xform/ㆭ/ㄥ/
    - xform/ㆰ/ㄚㄇ/
    - xform/ㆱ/ㄛㄇ/
    - xform/ㆲ/ㄛㄥ/

  comment_format:
    #==============================================================================
    # 定義【雙欄式】之【候選字單】
    # 左欄：台語音標之注音符號；右欄：台語音標（TLPA）。
    #==============================================================================
    #
    #==========================================================================
    # 拼音系統校調
    #==========================================================================
    # 連續輸入
    - xform/'/ /      # 【拼音分隔符號】換成空白
    - xform/\s+/ /    # 多重空白壓成一格（美化）
    #==========================================================================
    # 聲調校調
    #==========================================================================
    # 【陽上調（6）】視作【陽去調（7）】
    - xform/6/7/
    #==========================================================================
    # 韻母校調
    #==========================================================================
    - xform/ur/u/
    - xform/or/o/
    - xform/ou/oo/
    #==========================================================================
    # 声母校調
    #==========================================================================
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    - xform/^tsh/c/ # ㄘ
    - xform/^ts(?!h)/z/ # ㄗ（拼音字母 ts 之後不是接 h 的【c】換成【z】）

    #==========================================================================
    # 【候選清單】漢字標音格式化
    #==========================================================================
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/【》Ø$1】〔〉Ø$1〕/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    # 不可把 n + 韻母（如 na1）先標成 Ø，否則會跳過後面的 ㄋ 聲母轉換。
    # - xform/\b(n([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d))\b/【》Ø$1】〔〉Ø$1〕/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/【》Ø$1】〔〉Ø$1〕/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/【》$1】〔〉$1〕/

    #==========================================================================
    # 【拼音系統】轉換作業
    #==========================================================================
    # 【調號】使用【上標數值】格式
    # - xform/0〕/⁰〕/    # 0
    # - xform/1〕/¹〕/    # 1
    # - xform/7〕/⁷〕/    # 7
    # - xform/3〕/³〕/    # 3
    # - xform/2〕/²〕/    # 2
    # - xform/5〕/⁵〕/    # 5
    # - xform/4〕/⁴〕/    # 4
    # - xform/8〕/⁸〕/    # 8
    #------------------------------------------------------
    # 消除【指標符號】
    - xform/〉//
    # 消除【零聲母】識別符號 Ø
    - xform/〔Ø/〔/

    #==========================================================================
    # 【注音系統】声母轉換作業
    #==========================================================================
    - xform/【》ji/【ㄖ》i/
    - xform/【》zi/【ㄐ》i/
    - xform/【》ci/【ㄑ》i/
    - xform/【》si/【ㄒ》i/
    #------------------------------------------------------
    - xform/【》ng(?!\d)/【⁰ㄫ》/
    - xform/【》n(?!\d)/【ㄋ》/
    - xform/【》m(?!\d)/【ㄇ》/
    #------------------------------------------------------
    - xform/【》ph/【ㄆ》/
    - xform/【》th/【ㄊ》/
    - xform/【》kh/【ㄎ》/
    - xform/【》g/【ㄫ》/
    - xform/【》b/【ㄪ》/
    - xform/【》j/【ㄖ》/
    - xform/【》z/【ㄗ》/
    - xform/【》s/【ㄙ》/
    - xform/【》c/【ㄘ》/
    - xform/【》l/【ㄌ》/
    - xform/【》p/【ㄅ》/
    - xform/【》k/【ㄍ》/
    - xform/【》t/【ㄉ》/
    - xform/【》h/【ㄏ》/

    #--------------------------------------------------------------------------
    # 零聲母特別處理
    #--------------------------------------------------------------------------
    # 音節以【韻化輔音】開始
    - xform/【》Øm(\d)$/【ㆬ》$1/
    - xform/【》Øng(\d)$/【ㆭ》$1/
    #------------------------------------------------------
    # 消除【零聲母】
    - xform/【》Ø/【Ø》/

    #==========================================================================
    # 【注音系統】韻母轉換作業
    #==========================================================================
    # 鼻化韻母轉換：改 nn 後綴，成 n 前綴
    # ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    # 台羅拼音：onn ；台語注音二式：oonn
    # 台羅拼音：o ；台語注音二式：or
    - xform/》([iu]?(ai|au|oo|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》Luaih/⁰ㄨㄞㄏ》/
    - xform/》Liah/⁰ㄧㄚㄏ》/
    - xform/》Liau/⁰ㄧㄠ》/
    - xform/》Liuh/⁰ㄧㄨㄏ》/
    - xform/》Luai/⁰ㄨㄞ》/
    - xform/》Lah/⁰ㄚㄏ》/
    - xform/》Lai/⁰ㄞ》/
    - xform/》Leh/⁰ㄝㄏ》/
    - xform/》Lia/⁰ㄧㄚ》/
    - xform/》Lio/⁰ㄧㄛ》/
    - xform/》Liu/⁰ㄧㆫ》/
    - xform/》Loh/⁰ㄛㄏ》/
    - xform/》Lua/⁰ㄨㄚ》/
    - xform/》Lui/⁰ㄨㄧ》/
    - xform/》La/⁰ㄚ》/
    - xform/》Le/⁰ㄝ》/
    - xform/》Li/⁰ㄧ》/
    - xform/》Lo/⁰ㄛ》/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》([iu]?(?:ai|ao|oo|[aiueo]))/》$1/
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㄏ》/
    - xform/》iong/ㄧㄛㄥ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㄏ》/
    - xform/》uih/ㄨㄧㄏ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㄏ》/
    - xform/》auh/ㄠㄏ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㄏ》/
    - xform/》iam/ㄧㄚㄇ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㄅ》/
    - xform/》iat/ㄧㄚㄉ》/
    - xform/》iak/ㄧㄚㄍ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》ioh/ㄧㄜㄏ》/
    - xform/》iok/ㄧㄛㄍ》/
    - xform/》ooh/ㄛㄏ》/
    - xform/》ong/ㄛㄥ》/
    - xform/》uah/ㄨㄚㄏ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㄉ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㄝㄏ》/
    - xform/》ngh/ㄥㄏ》/
    - xform/》ah/ㄚㄏ》/
    - xform/》am/ㄚㄇ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㄅ》/
    - xform/》at/ㄚㄉ》/
    - xform/》ak/ㄚㄍ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㄝㄏ》/
    - xform/》ih/ㄧㄏ》/
    - xform/》im/ㄧㄇ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/ㄧㄅ》/
    - xform/》it/ㄧㄉ》/
    - xform/》ik/ㄧㄍ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》ng/ㄥ》/
    - xform/》oo/ㄛ》/
    - xform/》oh/ㄜㄏ》/
    - xform/》om/ㄛㄇ》/
    - xform/》op/ㄛㄅ》/
    - xform/》ok/ㄛㄍ》/
    - xform/》uh/ㄨㄏ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㄉ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㄝ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㄇㄏ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㄝ》/
    - xform/》i/ㄧ》/
    - xform/》o/ㄜ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㄇ》/
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    # - xform/》Li/⁰ㄧ》/
    - xform/ㆡ(ㄧ|⁰ㄧ)/ㆢ$1/
    - xform/ㄗ(ㄧ|⁰ㄧ)/ㄐ$1/
    - xform/ㄘ(ㄧ|⁰ㄧ)/ㄑ$1/
    - xform/ㄙ(ㄧ|⁰ㄧ)/ㄒ$1/

    #======================================================
    # 【聲調】
    #======================================================
    # 台語音標的【注音符號】，其【調號】值，使用【上標數值】格式顯示
    - xform/》0/⁰/    # 0
    - xform/》1/¹/    # 1
    - xform/》7/⁷/    # 7
    - xform/》3/³/    # 3
    - xform/》2/²/    # 2
    - xform/》5/⁵/    # 5
    - xform/》4/⁴/    # 4
    - xform/》8/⁸/    # 8

    #======================================================
    # 終結校調
    #======================================================
    # 消除【零聲母】
    - xform/【Ø/【/

