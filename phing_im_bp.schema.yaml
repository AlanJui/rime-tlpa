# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: phing_im_bp
  name: 拼音輸入法【閩拼方案】
  version: "v0.2.0.0"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【輸入類型】：拼音輸入法
    【拼音系統】：閩拼方案（BP）
    【字典編碼】：台羅音標（TLPA）
    【注音輸入】：閩拼字母（znia5：z+n+i+a+_）
    【侯選清單】：〔zniā〕
    【聲調標示】：閩拼八調（以數值標示）
  #------------------------------------------------------
  # 閩拼聲調與按鍵對映
  # BP 1: 上平（陰平）   ;
  # BP 2: 下平（陽平）   /
  # BP 3: 上聲（陰上）   \
  # BP 4: 下聲（陽上）   （少用）
  # BP 5: 上去（陰去）   _
  # BP 6: 下去（陽去）   -
  # BP 7: 上入（陰入）   [
  # BP 8: 下入（陽入）   ]
  # BP 0: 輕聲           7（數字鍵7）
  # BP 9: 入聲縮寫       .
  #------------------------------------------------------

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  - name: supers_tone
    reset: 1
    states: [一般, 上標]

engine:
  processors:
    - lua_processor@aux_commit    # 選擇【輸入法】輸出：羅馬拼音字母
    # - lua_processor@jump_select
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier
    - lua_filter@reformat_comment_filter

speller:
  alphabet: abcdefghijklmnopqrstuvwxyz;-_\/[]7.
  initials: abcdefghijklmnopqrstuvwxyz
  finals: ;-_\/[]7.
  delimiter: "'"
  use_space: true
  algebra:
    #==========================================================================
    # Step 1: TLPA → BP 聲母轉換
    # 原則：多字母先處理；同起首字母者，「目標」先於「來源」以避免雙重轉換
    #==========================================================================
    # 舌尖前音
    - xform/^tsh/c/          # tsh(ㄘ) → c
    - xform/^ts(?!h)/z/      # ts(ㄗ) → z（不含 tsh）
    # 鼻音聲母（多字母先處理）
    - xform/^ng/ggn/         # ng(ㄫ) → ggn
    # 唇音
    - xform/^b/bb/           # b(ㆠ) → bb  ← 須先於 p→b
    - xform/^p(?!h)/b/       # p(ㄅ) → b   ← 不含 ph
    - xform/^ph/p/           # ph(ㄆ) → p  ← 在 p→b 之後
    - xform/^m/bbn/          # m(ㄇ) → bbn
    # 舌尖音
    - xform/^t(?!h)/d/       # t(ㄉ) → d   ← 不含 th
    - xform/^th/t/           # th(ㄊ) → t  ← 在 t→d 之後
    - xform/^n/ln/           # n(ㄋ) → ln  ← ng 已處理
    # 舌根音
    - xform/^g(?!g)/gg/      # g(ㆣ) → gg  ← 須先於 k→g
    - xform/^k(?!h)/g/       # k(ㄍ) → g   ← 不含 kh
    - xform/^kh/k/           # kh(ㄎ) → k  ← 在 k→g 之後
    # 其他
    - xform/^j/zz/           # j(ㆡ) → zz
    # l, s, h, c(tsh), z(ts), zi, ci, ji, si 不變
    #==========================================================================
    # Step 2: TLPA → BP 韻母轉換
    #==========================================================================
    - xform/ir/eu/            # ir(ㆨ) → eu
    - xform/au/ao/            # au(ㄠ) → ao
    # 鼻化韻母：去 nn 後綴，加 n 前綴
    - xform/onn/noo/          # onn(ㆧ) → noo（須先於一般規則）
    - xform/([iu]?(?:ai|ao|oo|[aiueo]))nn/n$1/  # ann→na, inn→ni, unn→nu 等
    #==========================================================================
    # Step 3: TLPA → BP 聲調轉換（同步替換，無衝突）
    # TLPA: 1  2  3  4  5  6  7  8
    # BP:   1  3  5  7  2  4  6  8
    #==========================================================================
    - xlit|234567|357246|
    #==========================================================================
    # Step 4: 閩南話變調規則（BP 調號）
    # 舒聲變調循環：1→6→5→3→2→6
    #==========================================================================
    - derive/1/6/
    - derive/6/5/
    - derive/5/3/
    - derive/3/2/
    - derive/2/6/
    #--------------------------------------------------------------------------
    # 入聲變調
    - derive/(?<![ptk])7/3/    # -h 陰入(7) → 上聲(3)
    - derive/(?<![ptk])8/5/    # -h 陽入(8) → 陰去(5)
    - derive/[ptk]7/8/         # -ptk 陰入(7) → 陽入(8)
    - derive/[ptk]8/7/         # -ptk 陽入(8) → 陰入(7)
    #==========================================================================
    # Step 5: 入聲縮寫與輕聲
    #==========================================================================
    - derive/([ptkh])[78]$/${1}9/    # 入聲韻尾 + 調號縮寫為 9
    - derive/8/0/                    # 陽入(8) 可用 0（輕聲鍵）輸入
    #==========================================================================
    # Step 6: 零聲母 i/u 的 y/w 相容輸入
    #==========================================================================
    # i 為介音
    - derive/^ia/ya/
    - derive/^io/yo/
    - derive/^iu/yu/
    # i 為主要元音
    - derive/^i(\d)/yi$1/
    # u 為介音
    - derive/^ua/wa/
    - derive/^ui/wi/
    - derive/^ue/we/
    # u 為主要元音
    - derive/^u(\d)/wu$1/
    #==========================================================================
    # Step 7: 聲母縮寫輸入（只打聲母）
    #==========================================================================
    - abbrev/^(bbn|bb|ln|ggn|gg|zz|[bpdtlgkhzcsjyw]).+$/$1/
    #==========================================================================
    # Step 8: 無調號輸入
    #==========================================================================
    - derive/^([a-z]+)\d$/$1/
    #==========================================================================
    # Step 9: BP 聲調按鍵對映
    # 1(上平); 6(下去)- 5(上去)_ 3(上聲)\ 2(下平)/ 7(上入)[ 8(下入)] 0(輕聲)7 9(入聲).
    #==========================================================================
    - xlit|165327809|;-_\/[]7.|

translator:
  dictionary: ji_khoo_tl
  prism: phing_im_bp
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  comment_format:
    # comment_format 直接接收字典原碼（TLPA 拼音 + 數字調號 1-8）
    # ---- 1. 聲母：TLPA → BP ----
    - xform/^tsh/c/
    - xform/^ts(?!h)/z/
    - xform/^ng/ggn/
    - xform/^b/bb/
    - xform/^p(?!h)/b/
    - xform/^ph/p/
    - xform/^m/bbn/
    - xform/^t(?!h)/d/
    - xform/^th/t/
    - xform/^n/ln/
    - xform/^g(?!g)/gg/
    - xform/^k(?!h)/g/
    - xform/^kh/k/
    - xform/^j/zz/
    # ---- 2. 韻母：TLPA → BP ----
    - xform/ir/eu/
    - xform/au/ao/
    - xform/onn/noo/
    - xform/([iu]?(?:ai|ao|oo|[aiueo]))nn/n$1/
    # ---- 3. 聲調：TLPA → BP ----
    - xlit|234567|357246|
    # ---- 3b. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # i 為介音（ia, io, iu...）→ i 改成 y
    - xform/^ia/ya/
    - xform/^io/yo/
    - xform/^iu/yu/
    # i 為主要元音（i + 調號）→ 前加 y
    - xform/^i(\d)/yi$1/
    # u 為介音（ua, ui, ue...）→ u 改成 w
    - xform/^ua/wa/
    - xform/^ui/wi/
    - xform/^ue/we/
    # u 為主要元音（u + 調號）→ 前加 w
    - xform/^u(\d)/wu$1/
    # ---- 4. 調符移位 ----
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([12345678])/$1$3$2/
    - xform/([ae])([iueo])([12345678])/$1$3$2/
    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform/oo1/ōo/
    - xform/oo2/óo/
    - xform/oo3/ǒo/
    - xform/oo4/ǒo/
    - xform/oo5/òo/
    - xform/oo6/ôo/
    - xform/oo7/ōo/
    - xform/oo8/óo/
    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform/a1/ā/
    - xform/e1/ē/
    - xform/i1/ī/
    - xform/u1/ū/
    - xform/o1/ō/
    - xform/m1/m̄/
    - xform/ng1/n̄g/
    # BP 2: á（下平/陽平，acute U+0301）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # BP 3: ǎ（上聲，caron U+030C）
    - xform/a3/ǎ/
    - xform/e3/ě/
    - xform/i3/ǐ/
    - xform/u3/ǔ/
    - xform/o3/ǒ/
    # BP 4: ǎ（下聲/陽上，同上聲，少用）
    - xform/a4/ǎ/
    - xform/e4/ě/
    - xform/i4/ǐ/
    - xform/u4/ǔ/
    - xform/o4/ǒ/
    # BP 5: à（上去/陰去，grave U+0300）
    - xform/a5/à/
    - xform/e5/è/
    - xform/i5/ì/
    - xform/u5/ù/
    - xform/o5/ò/
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform/a6/â/
    - xform/e6/ê/
    - xform/i6/î/
    - xform/u6/û/
    - xform/o6/ô/
    - xform/ng6/n̂g/
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform/a8/á/
    - xform/e8/é/
    - xform/i8/í/
    - xform/u8/ú/
    - xform/o8/ó/

  preedit_format:
    # 1. 分隔符號
    - xform/'/ /
    # 2. Reverse xlit：按鍵 → BP 調號數字
    # - xlit|;-_\/[]7|16532780|
    - xlit|;-_\/[]7.|165327809|
    # 3. 輕聲/入聲縮寫顯示
    - xform/0/˙/
    - xform/9/˙/
    # 4. 調符移位：將調號數字移至主要元音後
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1652378])/$1$3$2/
    - xform/([ae])([iueo])([1652378])/$1$3$2/
    # 5. oo 韻母整體處理（須先於單 o 規則）
    - xform/oo1/ōo/
    - xform/oo2/óo/
    - xform/oo3/ǒo/
    - xform/oo4/ǒo/
    - xform/oo5/òo/
    - xform/oo6/ôo/
    - xform/oo7/ōo/
    - xform/oo8/óo/
    # 6. 調符代換（BP 調符）
    # BP 1: ā（macron）
    - xform/a1/ā/
    - xform/e1/ē/
    - xform/i1/ī/
    - xform/u1/ū/
    - xform/o1/ō/
    - xform/m1/m̄/
    - xform/ng1/n̄g/
    # BP 2: á（acute）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # BP 3: ǎ（caron）
    - xform/a3/ǎ/
    - xform/e3/ě/
    - xform/i3/ǐ/
    - xform/u3/ǔ/
    - xform/o3/ǒ/
    # BP 4: ǎ（陽上，少用）
    - xform/a4/ǎ/
    - xform/e4/ě/
    - xform/i4/ǐ/
    - xform/u4/ǔ/
    - xform/o4/ǒ/
    # BP 5: à（grave）
    - xform/a5/à/
    - xform/e5/è/
    - xform/i5/ì/
    - xform/u5/ù/
    - xform/o5/ò/
    # BP 6: â（circumflex）
    - xform/a6/â/
    - xform/e6/ê/
    - xform/i6/î/
    - xform/u6/û/
    - xform/o6/ô/
    - xform/ng6/n̂g/
    # BP 7: ā（macron，入聲）
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    # BP 8: á（acute，入聲）
    - xform/a8/á/
    - xform/e8/é/
    - xform/i8/í/
    - xform/u8/ú/
    - xform/o8/ó/

key_binder:
  import_preset: default
  bindings:
    - { when: composing, accept: underscore, send: underscore }
    - { when: has_menu,  accept: underscore, send: underscore }
    - { when: composing, accept: minus, send: minus }
    - { when: has_menu,  accept: minus, send: minus }
    - { when: composing, accept: period, send: period }
    - { when: has_menu,  accept: period, send: period }
    - { accept: "Control+p", send: Page_Up,   when: composing }
    - { accept: "Control+n", send: Page_Down, when: composing }
    - { when: has_menu, accept: "Control+h", send: Page_Up }
    - { when: has_menu, accept: "Control+l", send: Page_Down }
    - { when: has_menu, accept: "Control+k", send: Up }
    - { when: has_menu, accept: "Control+j", send: Down }

editor:
  bindings:
    space: commit
    Control+Shift+Return: commit_comment

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    uppercase: ^[A-Z][-_+.'0-9A-Za-z]*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    punct: '`[^\s]$'
    reverse_lookup: "`[a-z]*$"

menu:
  alternative_select_labels: [①, ②, ③, ④, ⑤]
  alternative_select_keys: "12345"
  page_size: 5

style:
  horizontal: false
  font_face: "霞鶩文楷 TC, 新細明體"
  comment_font_face: "霞鶩文楷 TC, 新細明體"
  comment_font_size: 18

punctuator:
  import_preset: keymap_piau_tian
