# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: phing_im_bp
  name: 拼音輸入法【閩拼方案】
  version: "v0.2.0.6"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【輸入類型】：拼音輸入法
    【拼音系統】：閩拼方案（BP）
    【字典編碼】：台語注音二式（BPM2）
    【注音輸入】：閩拼字母（znia5：z+n+i+a+_）
    【侯選清單】：〔zniā〕
    【聲調標示】：閩拼八調（以數值標示）
  #------------------------------------------------------
  # 閩拼聲調與按鍵對映
  # BP 1: 上平（陰平）   ;
  # BP 2: 下平（陽平）   /
  # BP 3: 上聲（陰上）   \
  # BP 4: 下聲（陽上）   （少用）
  # BP 5: 上去（陰去）   _
  # BP 6: 下去（陽去）   -
  # BP 7: 上入（陰入）   [
  # BP 8: 下入（陽入）   ]
  # BP 0: 輕聲           7（數字鍵7）
  # BP 9: 入聲縮寫       .
  #------------------------------------------------------

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  # 【輸入編輯列】漢字標音格式（310.md §輸入編輯列之漢字標音格式）
  - options:
      [ key_in_piau_im_sni, key_in_piau_im_tps, key_in_piau_im_tlpa,
        key_in_piau_im_tl, key_in_piau_im_poj, key_in_piau_im_bp,
        key_in_piau_im_bpm2, key_in_piau_im_ipa ]
    reset: 5
    states: [ 十五音, 方音符號, 台語音標, 台羅拼音, 白話字, 閩拼方案, 台語注音二式, 國際音標 ]

engine:
  processors:
    - lua_processor@aux_commit    # 選擇【輸入法】輸出：羅馬拼音字母
    - lua_processor@jump_select
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier
    - lua_filter@reformat_comment_filter

speller:
  alphabet: abcdefghijklmnopqrstuvwxyz;-_\/[]7.
  initials: abcdefghijklmnopqrstuvwxyz
  finals: ;-_\/[]7.
  delimiter: "'"
  use_space: true
  algebra:
    #==========================================================================
    # 聲母轉換
    #==========================================================================
    # BPM2 → BP 声母轉換
    - xform/^jj(?i)/zz/       # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/^j(?i)/z/         # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/^ch(?i)/c/        # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/^sh(?i)/s/        # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    # 齒音/舌齒音
    # - xform/^j/zz/          # j(ㆡ) → zz
    # - xform/^z/z/           # ts(ㄗ) → z（不含 tsh）
    # - xform/^c/c/           # tsh(ㄘ) → c
    # - xform/^s/s/           # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/^ng/ggn/        # ng(ㄫ) → ggn
    # 舌根音
    # - xform/^gg/gg/         # g(ㆣ) → gg  ← 須先於 k→g
    # - xform/^g/g/           # k(ㄍ) → g   ← 不含 kh
    # - xform/^k/k/           # kh(ㄎ) → k  ← 在 k→g 之後
    # 唇音
    - xform/^m/bbn/         # m(ㄇ) → bbn
    # - xform/^b/bb/          # b(ㆠ) → bb  ← 須先於 p→b
    # - xform/^b/b/           # p(ㄅ) → b   ← 不含 ph
    # - xform/^p/p/           # ph(ㄆ) → p  ← 在 p→b 之後
    # 舌尖音
    - xform/^n/ln/          # n(ㄋ) → ln
    # - xform/^l(?!n)/l/      # l(ㄌ) → l
    # - xform/^d/d/           # t(ㄉ) → d   ← 不含 th
    # - xform/^t/t/           # th(ㄊ) → t  ← 在 t→d 之後
    # 聲門音
    # - xform/^h/h/           # h(ㄏ) → h
    #==========================================================================
    # 韻母轉換
    #==========================================================================
    # oonn → oon -> noo
    # - xform/oonn/noo/
    # iook → iok; iong → iong
    # oom → om; oop → op
    - xform/oo([kmp])/o$1/
    # ior → io; or → o
    - xform/or/o/
    # iau → iao; au → ao
    - xform/au/ao/
    # iek → ik; ing → ing
    - xform/iek/ik/
    #--------------------------------------------------------------------------
    # 鼻化韻母：改 nn 後綴，成 n 前綴
    - xform/([iu]?(?:ai|ao|oo|[aiueo]))nn/n$1/  # ann→na, inn→ni, unn→nu 等
    #==========================================================================
    # 【零聲母】+【i/u開頭韻母】校調
    # 根據 i 或 u 之後是否還有其他母音，決定：「加上」 y/w ；或是「代換」成 y/w。
    #--------------------------------------------------------------------------
    # i 開頭
    #   - i, ih; ni
    #   - im, ip
    #   - ing, ik
    #   - in, it
    #   - iao, iaoh; niao
    #   - ia, iah; nia, niah
    #   - nioo
    #   - io, ioh
    #   - iu; niu, niuh
    #   - iam, iap
    #   - iong, iok
    #   - iang, iak
    #   - ian, iat
    #--------------------------------------------------------------------------
    # 在 i 前加上 y (前加法)
    # 規則：當 i 後面沒有其他母音（即 i 單獨存在，或是只接鼻音/入聲韻尾 m, n, ng, p, t, k）時，直接在前面加上 y。
    #--------------------------------------------------------------------------
    # 範例：
    #   - i → yi
    #   - in → yin / it → yit
    #   - im → yim / ip → yip
    #   - ing → ying / ik → yik
    #--------------------------------------------------------------------------
    # 將 i 代換為 y (代換法)
    # 規則：當 i 後面還有其他母音（如 a, o 等）時，直接將 i 改寫為 y。
    #--------------------------------------------------------------------------
    # 範例：
    #   - ia → ya
    #   - iao → yao / ian → yan / iam → yam / iap → yap
    #   - iang → yang / iak → yak
    #   - iong → yong / iok → yok
    #==========================================================================
    # u 開頭
    #   - u, uh
    #   - ua, uah; nua
    #   - uai, uaih; nuai, nuaih
    #   - uan, uat
    #   - uang
    #   - ue, ueh
    #   - ui, uih; nui
    #   - un, ut
    #--------------------------------------------------------------------------
    # 在 u 前加上 w (前加法)
    # 規則：當 u 後面沒有其他母音（只接輔音/韻尾）時，直接在前面加上 w。
    #--------------------------------------------------------------------------
    # 範例：
    #   - u → wu
    #   - un → wun / ut → wut
    #   - uh → wuh
    #--------------------------------------------------------------------------
    # 將 u 代換為 w (代換法)
    # 規則：當 u 後面還有其他母音（如 e, i, a 等）時，直接將 u 改寫為 w。
    #--------------------------------------------------------------------------
    # 範例：
    #   - ue → we / ui → wi
    #   - uan → wan / uai → wai / uap → wap
    #   - uang → wang / uak → wak
    #==========================================================================
    # i 開頭
    - xform/^ia/ya/                    # ia... → ya...
    - xform/^io/yo/                    # io... → yo...
    - xform/^iu/yu/                    # iu... → yu...
    - xform/^i(ang|ak)(\d)$/y$1$2/     # iang1 → yang1, iak8 → yak8
    - xform/^i(ong|ok)(\d)$/y$1$2/     # iong2 → yong2, iok8 → yok8
    - xform/^i(a[inp]?)(\d)$/y$1$2/    # iao1 → yao1, ian2 → yan2, iam3 → yam3, iap4 → yap4
    - xform/^i(a)(\d)$/y$1$2/          # ia1 → ya1
    - xform/^i(\d)$/yi$1/              # i1 → yi1
    - xform/^i(ng|k)(\d)$/yi$1$2/      # ing1 → ying1, ik8 → yik8
    - xform/^i(n|t)(\d)$/yi$1$2/       # in1 → yin1, it8 → yit8
    - xform/^i(m|p)(\d)$/yi$1$2/       # im1 → yim1, ip8 → yip8
    #--------------------------------------------------------------------------
    # u 開頭
    - xform/^ua/wa/                    # ua... → wa...
    - xform/^ui/wi/                    # ui... → wi...
    - xform/^ue/we/                    # ue... → we...
    - xform/^u(a)(ng|k)(\d)$/w$1$2$3/  # uang1 → wang1, uak8 → wak8
    - xform/^u(h)(\d)$/wu$1$2/         # uh4 → wuh4
    - xform/^u(n|t)(\d)$/wu$1$2/       # un2 → wun2, ut8 → wut8
    - xform/^u(a[inp]?)(\d)$/w$1$2/    # uan2 → wan2, uai7 → wai7, uap8 → wap8
    - xform/^u([ei])(\d)$/w$1$2/       # ue3 → we3, ui7 → wi7
    - xform/^u(\d)$/wu$1/              # u3 → wu3
    #==========================================================================
    # BPM2 → BP 聲調轉換（同步替換，無衝突）
    # BPM2: 1  2  3  4  5  6  7  8
    # BP:   1  3  5  7  2  4  6  8
    #==========================================================================
    - xlit|234567|357246|
    # #==========================================================================
    # # 閩南話變調規則（BP 調號）
    # # 舒聲變調循環：1→6→5→3→2→6
    # #==========================================================================
    # - derive/1/6/
    # - derive/6/5/
    # - derive/5/3/
    # - derive/3/2/
    # - derive/2/6/
    # #--------------------------------------------------------------------------
    # # 入聲變調
    # - derive/(?<![ptk])7/3/    # -h 陰入(7) → 上聲(3)
    # - derive/(?<![ptk])8/5/    # -h 陽入(8) → 陰去(5)
    # - derive/[ptk]7/8/         # -ptk 陰入(7) → 陽入(8)
    # - derive/[ptk]8/7/         # -ptk 陽入(8) → 陰入(7)
    # #==========================================================================
    # # 入聲縮寫與輕聲
    # #==========================================================================
    # - derive/([ptkh])[78]$/${1}9/    # 入聲韻尾 + 調號縮寫為 9
    # - derive/8/0/                    # 陽入(8) 可用 0（輕聲鍵）輸入
    #==========================================================================
    # 聲母縮寫輸入（只打聲母）
    #==========================================================================
    - abbrev/^(bbn|bb|ln|ggn|gg|zz|[bpdtlgkhzcsjyw]).+$/$1/
    #==========================================================================
    # 無調號輸入
    #==========================================================================
    - derive/^([a-z]+)\d$/$1/
    #==========================================================================
    # BP 聲調按鍵對映
    # 1(上平); 6(下去)- 5(上去)_ 3(上聲)\ 2(下平)/ 7(上入)[ 8(下入)] 0(輕聲)7 9(入聲).
    #==========================================================================
    # - xlit|165327809|;-_\/[]7.|
    - xlit|1653278|;-_\/[]|

translator:
  # dictionary: ji_khoo_tl
  dictionary: ji_khoo_bpm2
  prism: phing_im_bp
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    #==========================================================================
    # 輸入方案總則
    #==========================================================================
    # 分隔符號
    - xform/'/ /
    #==========================================================================
    # 【零聲母】+【i/u開頭韻母】校調
    #==========================================================================
    # i 開頭
    - xform/^ia/ya/                    # ia... → ya...
    - xform/^io/yo/                    # io... → yo...
    - xform/^iu/yu/                    # iu... → yu...
    - xform/^i(ang|ak)(\d)$/y$1$2/     # iang1 → yang1, iak8 → yak8
    - xform/^i(ong|ok)(\d)$/y$1$2/     # iong2 → yong2, iok8 → yok8
    - xform/^i(a[inp]?)(\d)$/y$1$2/    # iao1 → yao1, ian2 → yan2, iam3 → yam3, iap4 → yap4
    - xform/^i(a)(\d)$/y$1$2/          # ia1 → ya1
    - xform/^i(\d)$/yi$1/              # i1 → yi1
    - xform/^i(ng|k)(\d)$/yi$1$2/      # ing1 → ying1, ik8 → yik8
    - xform/^i(n|t)(\d)$/yi$1$2/       # in1 → yin1, it8 → yit8
    - xform/^i(m|p)(\d)$/yi$1$2/       # im1 → yim1, ip8 → yip8
    #--------------------------------------------------------------------------
    # u 開頭
    - xform/^ua/wa/                    # ua... → wa...
    - xform/^ui/wi/                    # ui... → wi...
    - xform/^ue/we/                    # ue... → we...
    - xform/^u(a)(ng|k)(\d)$/w$1$2$3/  # uang1 → wang1, uak8 → wak8
    - xform/^u(h)(\d)$/wu$1$2/         # uh4 → wuh4
    - xform/^u(n|t)(\d)$/wu$1$2/       # un2 → wun2, ut8 → wut8
    - xform/^u(a[inp]?)(\d)$/w$1$2/    # uan2 → wan2, uai7 → wai7, uap8 → wap8
    - xform/^u([ei])(\d)$/w$1$2/       # ue3 → we3, ui7 → wi7
    - xform/^u(\d)$/wu$1/              # u3 → wu3
    #==========================================================================
    # 2. 按鍵 → BP 調號數字
    #==========================================================================
    - xlit|;-_\/[]|1653278|
    #==========================================================================
    # 3. 輕聲/入聲縮寫顯示
    #==========================================================================
    # - xform/0/˙/
    # - xform/9/˙/
    #==========================================================================
    # 4. 為韻母使用之羅馬拼音字母上頭，添加聲調符號（使用閩拼方案之聲調；非台語注音二式）
    #==========================================================================
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1652378])/$1$3$2/
    - xform/([aeo])([iueo])([1652378])/$1$3$2/
    #==========================================================================
    # 5. oo 韻母整體處理（須先於單 o 規則）
    #==========================================================================
    - xform/oo1/ōo/
    - xform/oo2/óo/
    - xform/oo3/ǒo/
    - xform/oo4/ǒo/
    - xform/oo5/òo/
    - xform/oo6/ôo/
    - xform/oo7/ōo/
    - xform/oo8/óo/
    #==========================================================================
    # 6. 調符代換（BP 調符）
    #==========================================================================
    # BP 1: ā（macron）
    - xform/a1/ā/
    - xform/e1/ē/
    - xform/i1/ī/
    - xform/u1/ū/
    - xform/o1/ō/
    - xform/m1/m̄/
    - xform/ng1/n̄g/
    # BP 2: á（acute）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # BP 3: ǎ（caron）
    - xform/a3/ǎ/
    - xform/e3/ě/
    - xform/i3/ǐ/
    - xform/u3/ǔ/
    - xform/o3/ǒ/
    # BP 4: ǎ（陽上，少用）
    - xform/a4/ǎ/
    - xform/e4/ě/
    - xform/i4/ǐ/
    - xform/u4/ǔ/
    - xform/o4/ǒ/
    # BP 5: à（grave）
    - xform/a5/à/
    - xform/e5/è/
    - xform/i5/ì/
    - xform/u5/ù/
    - xform/o5/ò/
    # BP 6: â（circumflex）
    - xform/a6/â/
    - xform/e6/ê/
    - xform/i6/î/
    - xform/u6/û/
    - xform/o6/ô/
    - xform/ng6/n̂g/
    # BP 7: ā（macron，入聲）
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    # BP 8: á（acute，入聲）
    - xform/a8/á/
    - xform/e8/é/
    - xform/i8/í/
    - xform/u8/ú/
    - xform/o8/ó/

  comment_format:
    __patch:
      # 【候選清單】使用【單欄】：【閩拼方案】
      - lib_comment_bp:/hau_suan_tuann

key_binder:
  import_preset: default
  bindings:
    #---------------------------------------------------
    # 使用【_】鍵，輸入【調號】：3 （低音調）
    - { when: composing, accept: underscore, send: underscore }
    - { when: has_menu, accept: underscore, send: underscore }
    #---------------------------------------------------
    # 使用【-】鍵，輸入【調號】：7 （中音調）
    - { when: composing, accept: minus, send: minus }
    - { when: has_menu, accept: minus, send: minus }
    #---------------------------------------------------
    # # 使用 【.】鍵，輸入【調號】：0（輕聲及入聲調）
    # - { when: composing, accept: period, send: period }
    # - { when: has_menu, accept: period, send: period }
    #---------------------------------------------------
    # 翻頁
    - { accept: "Control+p", send: Page_Up,   when: composing }
    - { accept: "Control+n", send: Page_Down, when: composing }
    #---------------------------------------------------
    # Vim 導覽
    - { when: has_menu, accept: "Control+h", send: Page_Up }
    - { when: has_menu, accept: "Control+l", send: Page_Down }
    - { when: has_menu, accept: "Control+k", send: Up }
    - { when: has_menu, accept: "Control+j", send: Down }

editor:
  bindings:
    Return: commit_composition              # 【漢字標音輸出】選項設定
    Control+Return: commit_raw_input        # 【鍵盤按鍵】（未經 preedit_format 轉換的原始輸入）
    Shift+Return: commit_script_text        # 【輸入編輯列】（經 preedit_format 轉換後的結構）
    Control+Shift+Return: commit_comment    # 【候選字清單】選擇項目

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    uppercase: ^[A-Z][-_+.'0-9A-Za-z]*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    punct: '`[^\s]$'
    reverse_lookup: "`[a-z]*$"

menu:
  alternative_select_labels: [①, ②, ③, ④, ⑤]
  alternative_select_keys: "12345"
  page_size: 5

style:
  horizontal: false
  font_face: "霞鶩文楷 TC, 新細明體"
  comment_font_face: "Cascadia Next TC Medium, 霞鶩文楷 TC, BopomofoRuby1909-v1, 新細明體"
  comment_font_size: 18

punctuator:
  import_preset: keymap_piau_tian