    - xform/居交/嬌/    # 嬌=居交=ㄧㄠ[iau]
    - xform/居爻/嘄/    # 嘄=居爻=ㄧㆯ[iaunn]（似為有音無字）
    - xform/嬌ㆷ/嬌/    # ㄧㄠㆷ[iauh]
    - xform/嘄ㆷ/嘄/    # ㄧㆯㆷ[iaunnh] （似為有音無字）
