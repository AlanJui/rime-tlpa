# lib_preedit_bpm_to_sni:
#【輸入編輯列(preedit_format)】使用【注音符號按鍵】，輸入【十五音】漢字標音之【聲、韻、調】。
# version: "v0.1.0.0"

Phing_Im_Iong_Tiau_Ho:
  #======================================================
  # 【輸入編輯列(preedit_format)】：定義輸入按鍵與注音符號之對映定義
  # 操作輸入法時，在輸入介面壓下的【按鍵】，與之對映的注音符號（ㄅㄆㄇ），
  # 將根據此處的定義，於輸入介面顯示相對應的注音符號
  #======================================================
  __append:
    # 將連續輸入的分隔符號：【'】換成空白
    # - xform/'/ /
    #==========================================================================
    # 定義【鍵盤輸入列】：按鍵與方音符號對映
    #--------------------------------------------------------------------------
    # 全對映：（1）【注音符號按鍵】；（2）【調號按鍵】；（3）【功能按鍵】
    #==========================================================================
    - xlit|!1qas2wxEedGYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L75346][N.|ㆠㄅㄆㄇㄋㄉㄊㄌㆣㄍㄎㄫㆡㄗㄘㄙㄏㆢㄐㄑㄒㄚㄧㆨㄨㆤㆦㄜㆬㄣㆭㆴㆵㆻㆷㄞㄠㆰㄢㄤㆱㆲㆩㆪㆫㆥㆧㆮㆯ八七三二五四一ㄥ入|
    #==========================================================================
    # 定義【零聲母】處理：為沒有聲母的音節添加「英」字符號
    #--------------------------------------------------------------------------
    # 處理【零聲母】：無聲母，以韻母開頭
    # 為【無聲母】的漢字標音，自動添加【聲母】：英
    # - 無声母：【ø】
    #==========================================================================
    # 零聲母識別：以韻母開頭的音節自動添加「英」字符號
    - xform/^(ㄚ|ㄞ|ㄠ|ㄢ|ㄤ|ㆤ|ㆥ|ㆮ|ㆯ|ㄧ|ㆪ|ㄨ|ㆫ|ㆦ|ㆧ|ㄜ|ㆬ|ㆭ)/英$1/
    # 零聲母識別：複合韻母開頭
    - xform/^(ㄧㄚ|ㄧㄞ|ㄧㄠ|ㄧㄢ|ㄧㄤ|ㄧㄜ|ㄧㆦ|ㄧㄨ)/英$1/
    - xform/^(ㄨㄞ|ㄨㄚ|ㄨㄢ|ㄨㄤ|ㄨㄧ|ㄨㆤ)/英$1/
    #--------------------------------------------------------------------------
    # 支援連續輸入模式
    - xform/'(ㄚ|ㄞ|ㄠ|ㄢ|ㄤ|ㆤ|ㆥ|ㆮ|ㆯ|ㄧ|ㆪ|ㄨ|ㆫ|ㆦ|ㆧ|ㄜ|ㆬ|ㆭ)/英$1/
    - xform/'(ㄧㄚ|ㄧㄞ|ㄧㄠ|ㄧㄢ|ㄧㄤ|ㄧㄜ|ㄧㆦ|ㄧㄨ)/英$1/
    - xform/'(ㄨㄞ|ㄨㄚ|ㄨㄢ|ㄨㄤ|ㄨㄧ|ㄨㆤ)/英$1/
    #--------------------------------------------------------------------------
    # 入聲尾韻不用【標準按鍵】改用【声母按鍵】之相容處理
    # - xform/ㄅ(四|八)$/ㆴ$1/  # ㄚㆴ
    # - xform/ㄉ(四|八)$/ㆵ$1/  # ㄚㆴ
    # - xform/ㄍ(四|八)$/ㆻ$1/   # ㄚㆴ
    # - xform/ㄏ(四|八)$/ㆷ$1/  # ㄚㆴ
    #--------------------------------------------------------------------------
    # 聲母輸入校調
    #--------------------------------------------------------------------------
    # - xform/ㄗㄧ/ㄐㄧ/
    # - xform/ㄘㄧ/ㄑㄧ/
    # - xform/ㄙㄧ/ㄒㄧ/
    # - xform/ㆡㄧ/ㆢㄧ/
    - xform/ㄗ((ㄥ)?ㄧ)/ㄐ$1/
    - xform/ㄘ((ㄥ)?ㄧ)/ㄑ$1/
    - xform/ㄙ((ㄥ)?ㄧ)/ㄒ$1/
    - xform/ㆡ((ㄥ)?ㄧ)/ㆢ$1/
    #------------------------------------------------------
    # 【鼻化之元音韻母】（方音符號：ñ）輸入校調
    #------------------------------------------------------
    # 【元音韻母】連續輸入兩次，等同輸入【鼻化之元音韻母】
    - xform/ㄧㄧ/ㆪ/
    - xform/ㄨㄨ/ㆫ/
    - xform/ㄚㄚ/ㆩ/
    - xform/ㆦㆦ/ㆧ/
    - xform/ㆤㆤ/ㆥ/
    - xform/ㄞㄞ/ㆮ/
    - xform/ㄠㄠ/ㆯ/
    #------------------------------------------------------
    #【鼻化之元音韻母】可用【前綴識別】輸入
    #------------------------------------------------------
    - xform/ㄥㄧ/ㆪ/
    - xform/ㄥㄨ/ㆫ/
    - xform/ㄥㄚ/ㆩ/
    - xform/ㄥㆦ/ㆧ/
    - xform/ㄥㆤ/ㆥ/
    - xform/ㄥㄞ/ㆮ/
    - xform/ㄥㄠ/ㆯ/
    #------------------------------------------------------
    # 【鼻化之元音韻母】輸入過程校調
    - xform/ㆪㆦ/ㄧㆧ/
    - xform/ㆪㄨ/ㄧㆫ/
    - xform/ㆪㄚ/ㄧㆩ/
    - xform/ㆪㄠ/ㄧㆯ/
    - xform/ㆫㄚ/ㄨㆩ/
    - xform/ㆫㄞ/ㄨㆮ/
    #------------------------------------------------------
    # 韻母組合輸入調整
    #------------------------------------------------------
    # - xform/ㄧㆭ/ㄧㄥ/  # ing
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    - xform/ㄚㆭ/ㄤ/    # ang
    - xform/ㄚㆬ/ㆰ/    # am
    - xform/ㆦㆭ/ㆲ/    # ong
    - xform/ㆦㆬ/ㆱ/    # om
    #==========================================================================
    # 定義【注音符號】與【十五音】字母之對映規則
    #==========================================================================
    # 声母：【注音符號】→【十五音聲母】
    - xform/ㆠ/門/  # b【!】 ==>  [b]
    # - xform/ㄅ(?!\d)/邊/  # p【1】 ==>  [p]
    - xform/ㄅ/邊/  # p【1】 ==>  [p]
    - xform/ㄆ/頗/  # P【q】 ==>  [ph]
    # - xform/ㄇ/毛/  # m【a】 ==>  [m]
    - xform/ㄇ/門/  # m【a】 ==>  [m]
    # - xform/ㄋ/耐/  # n【s】 ==>  [n]
    - xform/ㄋ/柳/  # n【s】 ==>  [n]
    - xform/ㄉ/地/  # t【2】 ==>  [t]
    - xform/ㄊ/他/  # T【w】 ==>  [th]
    - xform/ㄌ/柳/  # l【x】 ==>  [l]
    - xform/ㆣ/語/  # g【E】 ==>  [g]
    - xform/ㄍ/求/  # k【e】 ==>  [k]
    - xform/ㄎ/去/  # K【d】 ==>  [kh]
    # - xform/ㄫ/雅/  # ŋ【G】 ==>  [ng]
    - xform/ㄫ/語/  # ŋ【G】 ==>  [ng]
    - xform/ㆡ/入/  # j【Y】 ==>  [j]
    - xform/ㄗ/曾/  # z【y】 ==>  [z]
    - xform/ㄘ/出/  # c【h】 ==>  [c]
    - xform/ㄙ/時/  # s【n】 ==>  [s]
    - xform/ㄏ/喜/  # h【c】 ==>  [h]
    - xform/ㆢ/入/  # J【R】 ==>  [ji]
    - xform/ㄐ/曾/  # Z【r】 ==>  [zi]
    - xform/ㄑ/出/  # C【f】 ==>  [ci]
    - xform/ㄒ/時/  # S【v】 ==>  [si]
    #--------------------------------------------------------------------------
    # 元音韻母與鼻化韻：【注音符號】→【十五音韻母】
    - xform/ㄚ/膠/  # a【8】 ==>  [a]
    - xform/ㆩ/監/  # d【*】 ==>  [ann]
    - xform/ㄧ/居/  # i【u】 ==>  [i]
    - xform/ㆪ/梔/  # f【U】 ==>  [inn]
    - xform/ㄨ/艍/  # u【j】 ==>  [u]
    - xform/ㆫ/楊/  # q【J】 ==>  [unn]
    - xform/ㆤ/伽/  # e【,】 ==>  [e]
    - xform/ㆥ/更/  # r【<】 ==>  [enn]
    - xform/ㆦ/沽/  # O【i】 ==>  [oo]
    - xform/ㆧ/姑/  # v【I】 ==> [onn]
    - xform/ㄜ/高/  # ə【k】 ==>  [o]
    #--------------------------------------------------------------------------
    # 複合韻母與鼻化韻：【注音符號】→【十五音韻母】
    - xform/ㄞ/皆/    # 9【I】 ==>  [ai] = 膠居
    - xform/ㆮ/閒/    # x【(】 ==>  [ainn] = 膠梔
    - xform/ㄠ/交/    # l【U】 ==>  [au] = 膠艍
    - xform/ㆯ/爻/    # y【L】 ==>  [aunn]
    #--------------------------------------------------------------------------
    # 韻化鼻音韻母：【注音符號】→【十五音韻母】
    - xform/ㆬ/姆/    # m
    - xform/ㆭ/鋼/    # ng
    #--------------------------------------------------------------------------
    # 陽声韻母：【注音符號】→【十五音韻母】
    - xform/ㆰ/甘/  # Y【M】 ==>  [am] = [aM] = ㄚㆬ = 膠姆
    - xform/ㄤ/江/  # A【;】 ==>  [ang] = [aG] = ㄚㆭ = 膠鋼
    - xform/ㄢ/干/  # @【0】 ==>  [an] = [aN] = ㄚㄣ = 膠ㄣ

    - xform/ㆲ/公/  # H【o】 ==>  [ong] = [oG] = ㄛㆭ = 膠鋼
    - xform/ㆱ/箴/  # W【O】 ==>  [om] = [oM] = ㄛㆬ = 膠姆

    - xform/ㆨ/猪/  # w【K】 ==>  [ir] = [iR] = ㄧㆻ = 膠日
    #--------------------------------------------------------------------------
    # 鼻音韻尾（韻化輔音）
    # 陽聲韻： 姆[-m] / 鋼[-ng]
    # m|ng 後面緊跟著數字時，視作【韻母】（鼻音韻母）
    #--------------------------------------------------------------------------
    - xform/ㆬ/姆/  # M【m】 ==>  [m]
    - xform/ㆭ/鋼/  # G【/】 ==>  [ng]

    #==========================================================================
    # 定義【注音符號】與【十五音韻母】之【對映規則】
    #==========================================================================
    # - xform/ㄅ(四|八)/ㆴ$1/  # ㄚㆴ
    # - xform/ㄉ(四|八)/ㆵ$1/  # ㄚㆴ
    # - xform/ㄍ(四|八)/ㆻ$1/   # ㄚㆴ
    # - xform/ㄏ(四|八)/ㆷ$1/  # ㄚㆴ

    #==========================================================================
    # 韻母
    #==========================================================================

    #--------------------------------------------------------------------------
    # 膠【ㄚ】/[a]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/ㄚ/膠/      # 膠=ㄚ[a]
    - xform/ㆩ/監/      # 監=ㆩ[ann]
    - xform/膠ㆷ/膠/    # ㄚㆷ[ah]
    - xform/監ㆷ/監/    # ㆩㆷ[annh]
    # 陽聲韻與入聲韻
    - xform/膠姆/甘/    # 甘=膠姆=ㄚㆬ[am]
    - xform/膠ㆴ/甘/    # ㄚㆴ[ap]
    - xform/膠ㄣ/干/    # 干=膠ㄣ=ㄚㄣ[an]
    - xform/膠ㆵ/干/    # ㄚㆵ[at]
    - xform/膠鋼/江/    # 江=膠鋼=ㄚ鋼[ang]
    - xform/膠ㆻ/江/     # ㄚㆻ[ak]
    #--------------------------------------------------------------------------
    # 皆【ㄚㄧ】/[ai]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/ㄞ/皆/      # 皆=膠居=ㄚㄧ[ai]
    - xform/ㆮ/閒/      # 閒=ㆮ[ainn]
    - xform/皆ㆷ/皆/    # ㄚㄨㆷ[auh]
    - xform/閒ㆷ/閒/    # ㄚㆫㆷ[aunnh]
    #--------------------------------------------------------------------------
    # 交【ㄚㄨ】/[au]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/ㄠ/交/      # 交=膠艍=ㄚㄨ[au]
    - xform/ㆯ/爻/      # 爻=ㆯ[aunn]
    - xform/交ㆷ/交/    # ㄚㄨㆷ[auh]
    - xform/爻ㆷ/爻/    # ㄚㆫㆷ[aunnh]
    #==========================================================================
    # 伽【ㆤ】/[e]
    #==========================================================================
    # 陰聲韻與入聲韻
    - xform/ㆤ/伽/      # 伽=ㆤ[e]
    - xform/ㆥ/更/      # 更=ㆥ[enn]
    - xform/伽ㆷ/伽/    # ㆤㆷ[eh]
    - xform/更ㆷ/更/    # ㆥㆷ[ennh]
    # 陽聲韻與入聲韻
    # - xform/伽ㆤ/嘉/    # 嘉=ㆤㆤ[ee]
    # - xform/嘉ㆷ/嘉/    # ㆤㆤㆷ[eeh]
    # - xform/嘉ㄧ/稽/    # ㆤㄧ
    #==========================================================================
    # 沽【ㆦ】/[oo]
    #==========================================================================
    # 陰聲韻與入聲韻
    - xform/ㆦ/沽/    # 沽=ㆦ[oo]
    - xform/ㆧ/姑/    # 姑=ㆧ[onn]
    - xform/沽ㆷ/沽/  # ㆦㆷ[ooh]
    - xform/姑ㆷ/姑/  # ㆧㆷ[onnh]
    # 陽聲韻與入聲韻
    - xform/沽姆/箴/  # 箴=ㆦ姆[om]
    - xform/沽ㆴ/箴/  # 箴=ㆦㆴ[op]
    - xform/沽鋼/公/  # ㆦ鋼[ong]
    - xform/沽ㆻ/公/   # ㆦㆻ[ok]
    #==========================================================================
    # 高【ㄜ】/[o]
    #==========================================================================
    # 陰聲韻與入聲韻
    - xform/ㄜ/高/    # ㄜ[o]
    - xform/高ㆷ/高/  # ㄜㆷ[oh]
    # ionn = iunn （古有今無之韻）
    #==========================================================================
    # 居【ㄧ】/[i]
    #==========================================================================
    # 陰聲韻與入聲韻
    - xform/ㄧ/居/    # 居=ㄧ[i]
    - xform/ㆪ/梔/    # 梔=ㆪ[inn]
    - xform/居ㆷ/居/  # ㄧㆷ[ih]
    - xform/梔ㆷ/梔/  # ㆪㆷ[innh]
    # 陽聲韻與入聲韻
    - xform/居姆/金/    # 金=居姆=ㄧㆬ[im]
    - xform/金ㆴ/金/    # ㄧㆴ[ip]
    - xform/居ㄣ/巾/    # 巾=居ㄣ=ㄧㄣ[in]
    - xform/居ㆵ/巾/    # ㄧㆵ[it]
    - xform/居鋼/經/    # 經=居鋼=ㄧㆭ[ing]
    - xform/居ㆻ/經/    # ㄧㆻ[ik]
    #--------------------------------------------------------------------------
    # 迦【ㄧㄚ】/[ia]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/居膠/迦/    # 迦=居膠=ㄧㄚ[ia]
    - xform/居監/驚/    # 驚=居監=ㄧㆩ[iann]
    - xform/迦ㆷ/迦/    # ㄧㄚㆷ[iah]
    - xform/迦ㆷ/迦/    # ㄧㆩㆷ[iannh]
    # 陽聲韻與入聲韻
    - xform/居甘/兼/    # 兼=居甘=居膠姆=ㄧㄚㆬ[iam]
    - xform/居膠ㆴ/兼/  # ㄧㄚㆴ[iap]
    - xform/居干/堅/    # 堅=居干=居膠ㄣ=ㄧㄚㄣ[ian]
    - xform/居膠ㆵ/堅/  # ㄧㄚㆵ[iat]
    - xform/迦鋼/姜/    # 姜=迦鋼=居膠鋼=ㄧㄚㆭ[iang]
    - xform/居膠ㆻ/姜/   # ㄧㄚㆻ[iak]
    #--------------------------------------------------------------------------
    # 嬌【ㄧㄠ】/[iau]
    #--------------------------------------------------------------------------
