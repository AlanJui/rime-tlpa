    - xform/居姑/薑/    # ㄧㆧ（似已成為古有今無之韻）
    # 陽聲韻與入聲韻
    - xform/居公/恭/    # 恭=居公=ㄧㆦㆭ[iong]
    - xform/居沽ㆻ/恭/   # ㄧㆦㆻ [iok]
    - xform/居沽入/恭入/   # ㄧㆦㆻ [iok]
    #--------------------------------------------------------------------------
    # 丩【ㄧㄨ】/[iu]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/居艍/丩/    # 丩=居艍=ㄧㄨ[iu]
    - xform/居楊/牛/    # 牛=居楊=ㄧㆫ[iunn]
    - xform/丩ㆷ/丩/    # ㄧㄨㆷ[iuh]
    - xform/牛ㆷ/牛/    # ㄧㆫㆷ[iunnh]
    #==========================================================================
    # 艍【ㄨ】/[u]
    #==========================================================================

    #--------------------------------------------------------------------------
    # 艍【ㄨ】/[u]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/ㄨ/艍/    # ㄨ[u]
    - xform/ㆫ/楊/    # ㆫ[unn]
    - xform/艍ㆷ/艍/  # ㄨㆷ[uh]
    # 陽聲韻與入聲韻
    - xform/艍ㄣ/君/    # 君舒：ㄨㄋ[un]
    - xform/艍ㆵ/君/    # 君促：ㄨㆵ[ut]
    - xform/艍入/君入/    # 君促：ㄨㆵ[ut]
    #--------------------------------------------------------------------------
    # 瓜【ㄨㄚ】/[ua]
    #--------------------------------------------------------------------------
    # 陰聲韻與入聲韻
    - xform/艍膠/瓜/    # ㄨㄚ[ua]
    - xform/艍監/官/    # ㄨㆩ[uann]
    - xform/瓜ㆷ/瓜/    # ㄨㄚㆷ[uah]
    - xform/官ㆷ/官/    # ㄨㆩㆷ[uannh]
    # 陽聲韻與入聲韻
