# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: phing_im_poj
  name: 拼音輸入法【白話字】
  version: "v0.1.0.5"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【輸入類型】：拼音輸入法
    【拼音系統】：白話字【教會羅馬字拼音方案】
    【字典編碼】：台羅音標
    【注音輸入】：羅馬拼音字母（siaⁿ1：siann;）
    【侯選清單】：〔siaⁿ¹〕【ㄙㄧㄚ¹】
    【聲調標示】：
      (1) 台羅八聲調；
      (2) 使用數值標示聲調，以利閱讀。
    #------------------------------------------------------
    # 定義使用者按下鍵盤時，輸入法能接受的按鍵
    #------------------------------------------------------
    # 1 ==> 【;】: 陰平調（高音調）
    # 7 ==> 【-】: 陽去調（中音調）
    # 3 ==> 【_】: 陰去調（低音調）
    # 2 ==> 【\】: 上聲調（高降調）
    # 5 ==> 【/】: 陽平調（低升調）
    #------------------------------------------------------
    # 4 ==> 【[】: 陰入調（低促調）
    # 8 ==> 【]】: 陽入調（高促調）
    #------------------------------------------------------
    # 0 ==> 【.】: 入聲調 [48]=0
    # 9 ==> 【7】: 輕聲調
    #------------------------------------------------------

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  # 【輸入編輯列】漢字標音格式（310.md §輸入編輯列之漢字標音格式）
  - options:
      [ key_in_piau_im_sni, key_in_piau_im_tps, key_in_piau_im_tlpa,
        key_in_piau_im_tl, key_in_piau_im_poj, key_in_piau_im_bp,
        key_in_piau_im_bpm2, key_in_piau_im_ipa ]
    reset: 4
    states: [ 十五音, 方音符號, 台語音標, 台羅拼音, 白話字, 閩拼方案, 台語注音二式, 國際音標 ]

engine:
  processors:
    - lua_processor@aux_commit    # 選擇【輸入法】的輸出：【羅馬拼音字母】、【方音符號】、【用調號呈現之方音符號】
    - lua_processor@jump_select   # 在【候選字清單】移動【選擇游標】
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
    # - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier
    # 重組【候選字清單】中的【羅馬拼音字母】及【注音符號】
    - lua_filter@reformat_comment_filter

speller:
  alphabet: abcdefghijklmnopqrstuvwxyzNM;-_\/[]7.
  initials: abcdefghijklmnopqrstuvwxyzNM
  finals: ;-_\/[]7.
  delimiter: "'"
  use_space: true
  algebra:
    #==========================================================================
    # 【按鍵編碼】：將【字典】使用之【漢字標音系統】編碼，使之與【鍵盤按鍵】對映
    #==========================================================================

    # --------------------------------------------------------------------------
    # 【聲調】
    # --------------------------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7

    # --------------------------------------------------------------------------
    # 【韻母】
    # # - xform/oo/o͘/      # 不可在 algebra 轉換：使用者無法從鍵盤輸入 o͘，改由 preedit_format 顯示層處理
    # - xform/ou/oo/        # ou = oo
    # - xform/ua([nt])/oa$1/  # uan ==> oan; uat ==> oat
    # - xform/ue/oe/
    # - xform/ua/oa/
    # - xform/i(ng|k)/e$1/
    # - xform/iek/ek/
    # --------------------------------------------------------------------------
    # 元音韻母/複合韻母
    - derive/iek/ik/
    # 與白話字相容
    - derive/i(ng|k)/e$1/
    - derive/au/ao/
    - derive/ua/oa/
    - derive/ue/oe/
    # 與漳州腔相容
    - derive/ou/oo/
    - derive/ei/e/
    # ------------------------------------------------------
    # 鼻音韻母轉換：ann ==> nna ==> Na ==> Nㄚ ==> ㆩ
    - derive/([iu]?(ai|au|oo|[aiueo]))nn/N$1/

    # --------------------------------------------------------------------------
    # 【聲母】
    # --------------------------------------------------------------------------
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # - derive/ts/ch/
    - xform/^tsh/chh/     # ㄘ
    - xform/^ts(?!h)/ch/  # ㄗ

    #==========================================================================
    # 【變調處理】
    #==========================================================================

    #--------------------------------------------------------------------------
    # 舒聲變調規則 (17325)
    #--------------------------------------------------------------------------
    - derive/1/7/  # 第一調 → 第七調 (kim1 → kim7)
    - derive/7/3/  # 第七調 → 第三調
    - derive/3/2/  # 第三調 → 第二調
    - derive/2/1/  # 第二調 → 第一調
    - derive/5/7/  # 第五調 → 第七調

    #--------------------------------------------------------------------------
    # 入聲變調處理 (48)
    #--------------------------------------------------------------------------
    # 入聲尾韻為 h 的變調
    - derive/(?<![ptk])4/2/      # -h 第四調 → 第二調
    - derive/(?<![ptk])8/3/      # -h 第八調 → 第三調
    #--------------------------------------------------------------------------
    # 入聲尾韻為 p/t/k 的變調
    #--------------------------------------------------------------------------
    - derive/[ptk]4/8/  # -p/-t/-k 第四調 → 第八調
    - derive/[ptk]8/4/  # -p/-t/-k 第八調 → 第四調

    #==========================================================================
    # 【入聲韻尾處理作業】
    # 鼻音韻尾：am an ang im in ing un ong iam ian iang iong uan uang
    # -m  ==> -p
    # -n  ==> -t
    # -ng ==> -k
    #--------------------------------------------------------------------------
    # ng: iang, iong, uang, ang, ing, ong
    # - derive/((ia|io|ua|[aio]))(ng)[17325]/${1}k0/
    # m: iam am im
    # - derive/((ia|[ai]))m[17325]/${1}p0/
    # n: ian uan an in un
    # - derive/((ia|ua|[au]))n[17325]/${1}t0/
    #--------------------------------------------------------------------------
    # 【字典編碼】：【0】，對映【按鍵】：【.】，所有【入聲韻尾】：-h/-p/-t/-k [0] = [48]
    # 【字典編碼】：【9】，對映【按鍵】：【7】，所有【入聲韻尾】：-h/-p/-t/-k [9]
    # 【字典編碼】：【&】，對映【按鍵】：【M】，所有【入聲韻尾】：-h/-p/-t/-k [48]
    #==========================================================================
    - derive/([ptkh])[48]$/${1}0/
    - derive/([ptkh])[48]$/${1}9/     # 暫不實作【輕聲調】，以【入聲調】代用

    #=======================================================================
    # 簡化輸入設定
    #=======================================================================
    # 無調號輸入
    - derive/^([a-z]+)\d$/$1/
    # 只輸入【聲母】
    - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).*$/$1/
    # 只輸入【聲母】與【調號】
    - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).+(\d)$/$1$2/
    # 鼻算韻母以 L 代
    - abbrev/L([iu]?(ai|au|oo|[aiueo]))/L/

    #=======================================================================
    # 定義聲調的「調號」與「按鍵」的對映規則
    #=======================================================================
    - xlit|123574890L&|;\_/-[]7.NM|

translator:
  dictionary: ji_khoo_tl
  prism: phing_im_poj
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    #==========================================================================
    # 輸入編輯列
    #==========================================================================
    # 分隔符號
    - xform/'/ /
    #==========================================================================
    # 按鍵 → 調號數字
    #==========================================================================
    - xlit|;\_/-[]7.NM|123574890N&|
    - xform/9/輕/
    - xform/&/入/
    #--------------------------------------------------------------------------
    # 輸入校調
    #--------------------------------------------------------------------------
    - xform/(^| )tsh/chh/
    - xform/(^| )ts/ch/
    #--------------------------------------------------------------------------
    - xform/iek/ik/
    - xform/i(ng|k)/e$1/
    - xform/ee/e/
    - xform/au/ao/
    - xform/ua/oa/
    - xform/ue/oe/
    # 【元音韻母】 oo [ɔ] = o͘ = ㆦ
    - xform/ou/oo/
    #--------------------------------------------------------------------------
    # 鼻化符號以【上標 ⁿ】顯示
    # a/e/i/oo/u/uai/iau/ai/au/ia/io/iu/ua/ui
    - xform/([iu]?(ai|au|oo|[aiueo]))nn/${1}ⁿ/

    #==========================================================================
    # 定義【調符】對映規則
    #==========================================================================
    # 鼻化韻母轉換：改 nn 後綴，成 n 前綴
    # ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    # onn（台羅拼音）= oonn（台語注音二式）= oⁿ（白話字）
    # - xform/Loo(\d)/oo${1}ⁿ/
    #--------------------------------------------------------------------------
    - xform/onn(\d)/o͘${1}ⁿ/
    #--------------------------------------------------------------------------
    - xform/iauⁿ(\d)/ia${1}uⁿ/
    - xform/uaiⁿ(\d)/ua${1}iⁿ/
    - xform/aiⁿ(\d)/a${1}iⁿ/
    - xform/auⁿ(\d)/a${1}uⁿ/
    - xform/iaⁿ(\d)/ia${1}ⁿ/
    - xform/ioⁿ(\d)/io${1}ⁿ/
    - xform/iuⁿ(\d)/iu${1}ⁿ/
    - xform/uaⁿ(\d)/ua${1}ⁿ/
    - xform/uiⁿ(\d)/ui${1}ⁿ/
    - xform/([aiue])ⁿ(\d)/${1}${2}ⁿ/
    # --------------------------------------------------------------------------
    # 處理一般韻母
    - xform/oo([1732548])/o͘${1}/
    - xform/(.*?)([aoe])(.*?)([1732548])/$1$2$4$3/
    #------------------------------------------------------
    # [POJ oo 韻母] oo 已轉為 o͘，直接對應調符
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘4/o͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # [1] 陰平調（高音調）
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    # [2] 上聲調（高降調）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # [3] 陰去調（低音調）_ （劃底線符號）
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/ng3/ǹg/
    # [4] 陰入調（低促調）[
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/mh4/mh/
    - xform/ngh4/ngh/
    # [5] 陽平調（低升調）/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/m5/m̂/
    - xform/ng5/n̂g/
    # [6] 陽上調
    # - xform/a6/ǎ/
    # - xform/e6/ě/
    # - xform/i6/ǐ/
    # - xform/u6/ǔ/
    # - xform/o6/ǒ/
    # - xform/ng6/ňg/
    # [7] 陽去調（中音調）-
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/m7/m̄/
    - xform/ng7/n̄g/
    # [8] 陽入調（高促調）]
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    - xform/mh8/m̍h/
    - xform/ngh8/n̍gh/
    #--------------------------------------------------------------------------
    # 省略【聲母】的調號顯示
    - xform/[14]//

  comment_format:
    __patch:
      # 【候選清單】使用【單欄】：【白話字】
      - lib_comment_poj:/hau_suan_tuann

# reverse_lookup:
#   dictionary: luna_pinyin
#   prefix: "`"
#   tips: 〔拼音〕
#   preedit_format:
#     - xform/([nljqxy])v/$1ü/

key_binder:
  import_preset: default
  bindings:
    #---------------------------------------------------
    # 使用【_】鍵，輸入【調號】：3 （低音調）
    - { when: composing, accept: underscore, send: underscore }
    - { when: has_menu, accept: underscore, send: underscore }
    #---------------------------------------------------
    # 使用【-】鍵，輸入【調號】：7 （中音調）
    - { when: composing, accept: minus, send: minus }
    - { when: has_menu, accept: minus, send: minus }
    #---------------------------------------------------
    # 使用 【.】鍵，輸入【調號】：0（輕聲及入聲調）
    - { when: composing, accept: period, send: period }
    - { when: has_menu, accept: period, send: period }
    #---------------------------------------------------
    # 翻頁
    # - { accept: comma, send: Page_Up, when: has_menu }         # 選下一個字
    # - { accept: period, send: Page_Down, when: has_menu }      # 選上一個字
    - { accept: "Control+p", send: Page_Up, when: composing }
    - { accept: "Control+n", send: Page_Down, when: composing }
    #---------------------------------------------------
    # Vim Mode
    #---------------------------------------------------
    - { when: has_menu, accept: "Control+h", send: Page_Up }
    - { when: has_menu, accept: "Control+l", send: Page_Down }
    - { when: has_menu, accept: "Control+k", send: Up }
    - { when: has_menu, accept: "Control+j", send: Down }
    #---------------------------------------------------

editor:
  bindings:
    Return: commit_composition              # 【漢字標音輸出】選項設定
    Control+Return: commit_raw_input        # 【鍵盤按鍵】（未經 preedit_format 轉換的原始輸入）
    Shift+Return: commit_script_text        # 【輸入編輯列】（經 preedit_format 轉換後的結構）
    Control+Shift+Return: commit_comment    # 【候選字清單】選擇項目

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    uppercase: ^[A-Z][-_+.'0-9A-Za-z]*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    punct: '`[^\s]$'
    reverse_lookup: "`[a-z]*$"

menu:
  alternative_select_labels: [①, ②, ③, ④, ⑤] # 修改候選標籤
  alternative_select_keys: "12345"
  page_size: 5 #選單每䈎顯示個數

style:
  horizontal: false
  font_face: "霞鶩文楷 TC, 新細明體"
  comment_font_face: "Cascadia Next TC Medium, 霞鶩文楷 TC, BopomofoRuby1909-v1, 新細明體"
  comment_font_size: 18

punctuator:
  import_preset: keymap_piau_tian
