# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: phing_im_poj
  name: 拼音輸入法【白話字】
  version: "v0.1.0.2"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【輸入類型】：拼音輸入法
    【拼音系統】：白話字【教會羅馬字拼音方案】
    【字典編碼】：台羅音標
    【注音輸入】：羅馬拼音字母（siaⁿ1：siann;）
    【侯選清單】：〔siaⁿ¹〕【ㄙㄧㄚ¹】
    【聲調標示】：
      (1) 台羅八聲調；
      (2) 使用數值標示聲調，以利閱讀。
  #------------------------------------------------------
  # 定義使用者按下鍵盤時，輸入法能接受的按鍵
  #------------------------------------------------------
  # 舒聲 [12357]
  # 6: [N/A]
  # 1: 陰平調（高音調）;
  # 7: 陽去調（中音調）-
  # 3: 陰去調（低音調）_ （劃底線符號）
  # 2: 上聲調（高降調）\
  # 5: 陽平調（低升調）/
  # 4: 陰入調（低促調）[
  # 8: 陽入調（高促調）]
  # 輕聲及入聲 [48] = 0
  # 0: .
  #------------------------------------------------------

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  # 【候選清單】漢字標音格式（310.md §候選清單之漢字標音格式）
  # reset: 0 → 第一個選項為預設 → 方音符號
  - options: [ hau_suan_piau_im_tps, hau_suan_piau_im_tlpa ]
    reset: 0
    states: [ 方音符號, 台語音標 ]
  # 【輸入編輯列】漢字標音格式（310.md §輸入編輯列之漢字標音格式）
  # reset: 0 → 第一個選項為預設 → 十五音
  - options:
      [ key_in_piau_im_sni, key_in_piau_im_tps, key_in_piau_im_tlpa,
        key_in_piau_im_tl, key_in_piau_im_poj, key_in_piau_im_bp,
        key_in_piau_im_bpm2, key_in_piau_im_ipa ]
    reset: 4
    states: [ 十五音, 方音符號, 台語音標, 台羅拼音, 白話字, 閩拼方案, 台語注音二式, 國際音標 ]

engine:
  processors:
    - lua_processor@aux_commit    # 選擇【輸入法】的輸出：【羅馬拼音字母】、【方音符號】、【用調號呈現之方音符號】
    - lua_processor@jump_select   # 在【候選字清單】移動【選擇游標】
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
    # - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier
    # 為 filter 除錯用
    # - lua_filter@append_ok_filter
    # - lua_filter@force_mark_filter
    # 重組【候選字清單】中的【羅馬拼音字母】及【注音符號】
    - lua_filter@reformat_comment_filter

speller:
  alphabet: abcdefghijklmnopqrstuvwxyzN;-_\/[]7.
  initials: abcdefghijklmnopqrstuvwxyzN
  finals: ;-_\/[]7.
  delimiter: "'"
  use_space: true
  algebra:
    #======================================================
    # 調整字典台語音標字母
    # 定義【台語音標】與【音標編碼】的對映關係
    #======================================================
    # 去除零聲母
    # - derive/Ø//
    #------------------------------------------------------
    # 聲調
    #------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    # --------------------------------------------------------------------------
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # - derive/ts/ch/
    - xform/^tsh/chh/     # ㄘ
    - xform/^ts(?!h)/ch/  # ㄗ（拼音字母 c 之後不是接 h 的【c】換成【z】）
    #==========================================================================
    # 【閩南話變調規則】
    # 為強化使用者輸入之便利性，即便輸入【變調】，仍能推算出【本調】之漢字
    # 為字典中的【本調】產生【變調】的衍生拼音
    #==========================================================================
    # 舒聲變調規則 (17325)
    - derive/1/7/  # 第一調 → 第七調 (kim1 → kim7)
    - derive/7/3/  # 第七調 → 第三調
    - derive/3/2/  # 第三調 → 第二調
    - derive/2/1/  # 第二調 → 第一調
    - derive/5/7/  # 第五調 → 第七調
    #--------------------------------------------------------------------------
    # 入聲變調規則 (48)
    # 入聲尾韻為 h 的變調
    - derive/(?<![ptk])4/2/      # -h 第四調 → 第二調
    - derive/(?<![ptk])8/3/      # -h 第八調 → 第三調
    #--------------------------------------------------------------------------
    # 入聲尾韻為 p/t/k 的變調
    - derive/[ptk]4/8/  # -p/-t/-k 第四調 → 第八調
    - derive/[ptk]8/4/  # -p/-t/-k 第八調 → 第四調
    # --------------------------------------------------------------------------
    # 鼻音韻母轉換：ann ==> nna ==> Na ==> Nㄚ ==> ㆩ
    # --------------------------------------------------------------------------
    # - xform/([iu]?(ai|au|oo|[aiueo]))nn/$1ⁿ/  # 不可轉換：prism 須保留 nn 供鍵盤輸入
    #======================================================
    # 【韻母】相容衍生
    # 台羅拼音轉白話字
    #======================================================
    # - xform/oo/o͘/      # 不可在 algebra 轉換：使用者無法從鍵盤輸入 o͘，改由 preedit_format 顯示層處理
    - xform/ou/oo/        # ou = oo
    - xform/ua[nt]/oa$1/  # uan ==> oan; uat ==> oat
    - xform/ue/oe/
    - xform/ua/oa/
    - xform/i(ng|k)/e$1/
    - xform/iek/ek/
    #--------------------------------------------------------------------------
    # 入聲韻尾
    # -m  ==> -p
    # -n  ==> -t
    # -ng ==> -k
    #--------------------------------------------------------------------------
    # 【字典編碼】：【9】，以【按鍵】：【.】，輸入所有【入聲韻尾】：-p/-t/-k [48]
    # 【字典編碼】：【&】，以【按鍵】：【.】，輸入所有【入聲韻尾】：-p/-t/-k [48]
    # - derive/p[48]$/p9/
    # - derive/t[48]$/t9/
    # - derive/k[48]$/k9/
    # - derive/h[48]$/h9/
    - derive/([ptkh])[48]$/${1}9/
    #--------------------------------------------------------------------------
    # 【字典編碼】：【0】代表【輕聲調】/【字典編碼】：【8】代表【陽入調】（台羅拼音第8聲）
    # 【鍵盤按鍵】：【7】，可輸入：【輕聲符號】即【字典編碼】：【0】或【8】
    # - derive/(([ia]|oo))m0/$1p0/   # 用 ㄚㄅ． 來拍 ㄚㆴ
    # - derive/([iuae])n0/$1t0/  # 用 ㄚㄉ． 來拍 ㄚㆵ
    # - derive/([iao])ng0/$1k0/  # 用 ㄚㄍ． 來拍 ㄚㆻ
    # - abbrev/((\w+0)|[ptkh]8)/0/
    - derive/[48]/0/
    #=======================================================================
    # 簡化輸入設定
    #=======================================================================
    # 拼音字母可略去聲調，推算出完整拼音
    - derive/^([a-z]+)\d$/$1/
    # 只輸入【聲母】
    # - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).*$/$1/  # 【台羅拼音】的聲母輸入簡化
    - abbrev/^([ptkmnbglsjhiuc]g?h?h?).*/$1/    # 【白話字】的聲母輸入簡化
    # # 只輸入【聲母】與【調號】
    # - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).+(\d)$/$1$2/
    # # 輸入【入聲韻尾】
    # - abbrev/[ptkh]0$/0/
    #=======================================================================
    # 定義聲調的「調號」與「按鍵」的對映規則
    #------------------------------------------------------
    # 舒聲 [173254890]
    # 1: 陰平調（高音調）;
    # 7: 陽去調（中音調）-
    # 3: 陰去調（低音調）_ （劃底線符號）
    # 2: 上聲調（高降調）\
    # 5: 陽平調（低升調）/
    # 4: 陰入調（低促調）[
    # 8: 陽入調（高促調）]
    # 9: 入聲調 [48]=9 .
    # 0: 輕聲及入聲 [90] 7
    #=======================================================================
    - xlit|123574890N|;\_/-[].7N|

translator:
  dictionary: ji_khoo_tl
  prism: phing_im_poj
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    #------------------------------------------------------
    # 定義【鍵盤輸入列】
    # 定義鍵盤輸入【按鍵】，與【拼音字母】顯示對映關聯
    #------------------------------------------------------
    # 分隔符號
    - xform/'/ / # 將音節分割符號 `'` 轉換為空白
    #------------------------------------------------------
    # 【按鍵】與【輸入法調號】對映表
    #  ; ==> 1
    #  - ==> 7
    #  _ ==> 3
    #  \ ==> 2
    #  / ==> 5
    #  [ ==> 4
    #  ] ==> 8
    #------------------------------------------------------
    - xlit|;-_\/[]|1732548|
    #------------------------------------------------------
    # 【元音韻母】 oo [ɔ] = o͘ = ㆦ
    - xform/oo/o͘/
    #------------------------------------------------------
    # 定義【調符】對映規則
    #------------------------------------------------------
    # 自音標解構：【聲母】+【韻母】+【調號】的拼音字母組合，
    # 為【韻母】標注【聲調符號】做準備
    # （字符集使用 [1732548]，即 xlit 轉換後的數字）
    # 注意：o͘ 中的 ͘（U+0358）不在 [aeiou] 及韻尾集合中，
    # 故移位規則不會誤匹配 o͘，o͘ 後面的調號會直接由下方規則處理。
    - xform/(.*?)([aoeOə])(.*?)([1732548])/$1$2$4$3/
    - xform/([iu])([iu])(.*?)([1732548])/$1$2$4$3/
    - xform/([aeiouOəmng])(.*?)([1732548])/$1$3$2/
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1732548])/$1$3$2/
    - xform/([ae])([iueo])([1732548])/$1$3$2/
    # [POJ oo 韻母] oo 已轉為 o͘，直接對應調符
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘4/o͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # [1] 陰平調（高音調）
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    # [2] 上聲調（高降調）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # [3] 陰去調（低音調）_ （劃底線符號）
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/ng3/ǹg/
    # [4] 陰入調（低促調）[
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/mh4/mh/
    - xform/ngh4/ngh/
    # [5] 陽平調（低升調）/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/m5/m̂/
    - xform/ng5/n̂g/
    # [6] 陽上調
    # - xform/a6/ǎ/
    # - xform/e6/ě/
    # - xform/i6/ǐ/
    # - xform/u6/ǔ/
    # - xform/o6/ǒ/
    # - xform/ng6/ňg/
    # [7] 陽去調（中音調）-
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/m7/m̄/
    - xform/ng7/n̄g/
    # [8] 陽入調（高促調）]
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    - xform/mh8/m̍h/
    - xform/ngh8/n̍gh/
    #------------------------------------------------------
    # 後處理（調符已定位後執行）
    #------------------------------------------------------
    - xform/nn/ⁿ/      # 鼻化韻母 nn → ⁿ（須在調符代換後，以免破壞 n* 匹配）
    - xform/tsh/chh/   # TLPA → POJ 聲母：tsh → chh
    - xform/ts/ch/     # TLPA → POJ 聲母：ts → ch
    - xform/ua/oa/     # TLPA → POJ 韻母：ua → oa
    - xform/ue/oe/     # TLPA → POJ 韻母：ue → oe
    - xform/iek/ek/    # TLPA → POJ 韻母：iek → ek
    - xform/i(ng|k)/e$1/    # TLPA → POJ 韻母：ing/ik → eng/ek
  comment_format:
    #==============================================================================
    # 雙欄【候選清單】
    # 左欄：白話字；右欄：注音符號。
    #==============================================================================
    #
    #------------------------------------------------------
    # 聲調
    #------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    #------------------------------------------------------
    # 韻母
    #------------------------------------------------------
    - derive/ur/u/
    - derive/or/o/
    # 韻母 ing/ik → eng/ek（須在移位前） ----
    - xform/i(ng|k)/e$1/
    #------------------------------------------------------
    # 声母
    #------------------------------------------------------
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    - xform/tsh/c/ # ㄘ
    - xform/ts(?!h)/z/ # ㄗ（拼音字母 ts 之後不是接 h 的【c】換成【z】）
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ /   # 多重空白壓成一格（美化）
    #------------------------------------------------------
    # 連續輸入適用之音節拆解【音節】=【聲母】+【韻母】+【聲調】
    #   1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    #   2) 無聲母起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    #   3) 一般情況（有聲母）
    #   這三條都用詞界 \b 逐一命中每個 token
    #------------------------------------------------------
    # 1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    #    【輪入範例】： "giam1 m7 ga1"
    #    \b((?:m|ng)\d)\b 會匹配獨立的 m7
    #    不會 匹配 giam1 中的 m1（因為前面有 a，不是詞界）
    #    結果："giam1 〔〉Øm7〕 【》Øm7】 ga1"
    #------------------------------------------------------
    # 在 (?:m|ng) 中：
    # ?: 表示「我只想要群組化，但不要捕獲」
    # m|ng 表示「匹配 m 或 ng」
    # - xform/\b((?:m|ng)\d)\b/〔Ø$1〕 【》Ø$1】/
    # - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 2) 零聲母（無聲母）起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    #    【輪入範例】： "giam1 ai2 ua3"
    #    匹配獨立的 ai2 和 ua3
    #    不會 匹配 giam1 中的 iam1
    #    結果："giam1 【》Øai2】 〔〉Øai2〕 【》Øua3】 〔〉Øua3〕"
    # - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/〔Ø$1〕 【》Ø$1】/
    # - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 3) 一般情況（有聲母）
    #    【輪入範例】： "giam1 tshui2"
    #    匹配 giam1 和 tshui2
    #    結果："【》giam1】 〔giam1〕 【》tshui2】 〔tshui2〕"
    # - xform/\b([a-z]+\d)\b/〔$1〕 【》$1】/
    # - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/
    # 兩對音節之間，以兩個空白隔開
    # - xform/〕\s+【/〕  【/
    #------------------------------------------------------
    # 為候選字之拼音字母，建立轉換格式
    #------------------------------------------------------
    # 【零聲母】組合型式
    # 1. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 2. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 3. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    #------------------------------------------------------
    # 以【介音韻母】、【元音韻母】開始的無聲母音標
    # - xform/^([iu]?(ai|au|O|[aiueo]).*)$/〔〉Ø$1〕 【》Ø$1】/
    - xform/^([iu]?(ai|au|oo|[aiueo]).*)$/〔〉$1〕 【》$1】/
    # 以【鼻音韻母】開始的無聲母音標
    # - xform/^((m|ng)(\d))$/〔〉Ø$1〕【》Ø$1】/
    - xform/^((m|ng)(\d))$/〔〉$1〕【》$1】/
    # 以【聲母】開始的音標
    # - xform/^([a-z]+\d)$/〔〉$1〕 【》$1】/
    - xform/^(ph|p|th|t|kh|k|ng|b|m|n|l|g|z|c|j|s|h)([a-z]+)(\d)$/〔〉$1$2$3〕 【》$1$2$3】〉/ # 聲母校調
    #------------------------------------------------------
    # 以下韻母 oo 與 o 的處理作業，不可隨意調動，置於前面
    #------------------------------------------------------
    # 【元音韻母】 oo [ɔ] (= o͘ = ㆦ)，其【字典編碼】使用： O
    # - xform/oo/o͘/
    - xform/oo/O/
    # 拼音字母 o [ə] = ㄜ，其【字典編碼】使用： ə
    # 【判斷條件】：當 o 沒被用於以下【韻母】時，需將 o 轉換為 ə
    #  以下【韻母】之 o 拼音字母，發音為： [ɔ] ，而不是 [ə]
    #  (1) oo;
    #  (2) ionn, iong, iok;
    #  (3) onn, ong, ok;
    #  (4) om, op
    - xform/o(nn|ng|k|m|p)/O$1/   # o [ɔ] = ㆦ
    - xform/o/ə/                  # o [ə] = ㄜ
    #------------------------------------------------------
    # 韻母校調
    #------------------------------------------------------
    # 【鼻音韻母】使用【鼻音前綴識別符號】：
    # a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui
    # - derive/(oo)nn/onn/ # ㆧ [oonn] = O + nn
    # - derive/([iu]?(ai|au|[aiueO]))nn/$1ⁿ/
    - derive/([iu]?(ai|au|[aiueo]))nn/$1ⁿ/
    # 此行務必置於上行之後
    # - derive/([iu]?(ai|au|[aiueO]))nn/L$1/
    - derive/([iu]?(ai|au|[aiueo]))nn/L$1/
    #======================================================
    # 右欄：注音符號
    #======================================================
    #
    #------------------------------------------------------
    # 定義【聲母】與【方音符號】對映規則
    #------------------------------------------------------
    # 消除【零聲母】
    # - xform/》Ø/》/
    #------------------------------------------------------
    # 舌齒音
    - derive/》ji/ㆢㄧ》/
    - derive/》zi/ㄐㄧ》/
    - derive/》ci/ㄑㄧ》/
    - derive/》si/ㄒㄧ》/
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    # 舌齒音（齒齦顎音）
    - xform/》j/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    #------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》ph/ㄆ》/
    - xform/》p(?!h)(?!\d)/ㄅ》/
    - xform/》m(?!\d)/ㄇ》/ # m 不僅為聲母，亦為韻化聲母
    - xform/》b/ㆠ》/
    #------------------------------------------------------
    # 舌根音
    - xform/》kh/ㄎ》/
    - xform/》k(?!h)(?!\d)/ㄍ》/
    - xform/》ng(?!\d)/ㄫ》/
    - xform/》g/ㆣ》/
    #------------------------------------------------------
    # 舌尖音
    - xform/》th/ㄊ》/
    - xform/》t(?!h)(?!\d)/ㄉ》/
    - xform/》n(?!g)(?!\d)/ㄋ》/
    - xform/》l/ㄌ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h(?!\d)/ㄏ》/   # h 不僅為聲母，亦為入聲韻尾
    #======================================================
    # 定義【韻母】與【方音符號】對映規則
    #======================================================

    #------------------------------------------------------
    # i
    #------------------------------------------------------
    # 姜 iang / 堅 ian / 兼 iam
    - xform/》iang/ㄧㄤ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》ia([kt])/ㄧㄚ》$1/
    - xform/》ia(m|p)/ㄧㄚ》$1/
    # 經 ing / 巾 in / 金 im
    - xform/》i(ng|k)/ㄧ》$1/
    - xform/》i(n|t)/ㄧ》$1/
    - xform/》i(m|p)/ㄧ》$1/
    # 嘄 Niau / 嬌 iau
    - xform/》(L?)(iau)/$1ㄧㄠ》/
    # 驚 Nia / 迦 ia
    - xform/》(L?)(ia)/$1ㄧㄚ》/
    # 恭 iong
    - xform/》iO(ng|k)/ㄧㆦ》$1/
    - xform/》io(ng|k)/ㄧㆦ》$1/
    # 薑 Nio / 茄 io
    - xform/》(iə)/ㄧㄜ》/
    - xform/》(L)(iə)/$1ㄧㆦ》/
    # 牛 Niu / 丩 iu
    - xform/》(L?)(iu)/$1ㄧㄨ》/
    # 泉腔
    # - xform/》ir/ㄦ》/	    # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    - xform/》ir/ㆨ》/ # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    # 梔 Ni / 居 i
    - xform/》(L?)(i)/$1ㄧ》/
    #------------------------------------------------------
    # u
    #------------------------------------------------------
    # 閂 Nuai / 乖 uai
    - xform/》(L?)(uai)/$1ㄨㄞ》/
    # 光 uang / 觀 uan
    - xform/》uang/ㄨㄤ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》ua([kt])/ㄨㄚ》$1/
    # 官 Nua / 瓜 ua
    - xform/》(L?)(ua)/$1ㄨㄚ》/
    # 褌 Nui / 規 ui
    - xform/》(L?)(ui)/$1ㄨㄧ》/
    # 糜 Nue / 檜 ue
    - xform/》(L?)(ue)/$1ㄨㆤ》/
    # 君 un
    - xform/》u(n|t)/ㄨ》$1/
    # 方音
    - xform/》ur/ㄨ》/
    # 艍 u
    - xform/》u/ㄨ》/
    #------------------------------------------------------
    # a
    #------------------------------------------------------
    # 江 ang / 干 an / 甘 am
    - xform/》ang/ㄤ》/
    - xform/》an/ㄢ》/
    - xform/》a([kt])/ㄚ》$1/
    - xform/》a(m|p)/ㄚ》$1/
    # 閒 Nai / 皆 ai
    - xform/》(L?)(ai)/$1ㄞ》/
    # 爻 Nau / 交 au
    - xform/》(L?)(au)/$1ㄠ》/
    # 監 Na / 膠 a
    - xform/》(L?)(a)/$1ㄚ》/
    #------------------------------------------------------
    # e
    #------------------------------------------------------
    # 泉腔: erng, erk, eru, ere, ern er
    - xform/》er(ng|k)/ㄧ》$1/ # 等 [terng2], 德 [terk4]
    - xform/》er(n|t)/ㄧ》$1/ # 【恩】：ern1
    - xform/》ere/ㄨㆤ》/ # 火【鷄】:kere1
    - xform/》er/ㄜ》/ # 【火】鷄: her2
    # 稽 ei / 嘉 ee
    - xform/》ei/ㆤ》/
    - xform/》ee/ㆤ》/
    # 更 Ne / 伽 e
    - xform/》(L?)(e)/$1ㆤ》/
    #------------------------------------------------------
    # oo
    #------------------------------------------------------
    # 公 ong / 箴 om
    - xform/》O(ng|k)/ㆦ》$1/
    - xform/》o(ng|k)/ㆦ》$1/
    # 公 ong / 箴 om
    - xform/》O(m|p)/ㆦ》$1/
    - xform/》o(m|p)/ㆦ》$1/
    # 姑 Noo / 沽 oo
    - xform/》(L?)(O)/$1ㆦ》/
    - xform/》(L?)(oo)/$1ㆦ》/
    - xform/》(L?)(o͘)/$1ㆦ》/
    #------------------------------------------------------
    # o
    #------------------------------------------------------
    # 姑 No / 高 o
    # - xform/》(L?)(ə)/$1ㄜ》/ # 扛 Nə
    - xform/》ə/ㄜ》/ # 高 o
    #======================================================
    # 校調【鼻化韻母】輸出格式：
    # （1）無【鼻化韻母前綴符號】，如：【方音符號】
    #    【方音符號】： nia = Lia = ㄥㄧㄚ = ㆪㄚ = ㄧㆩ
    # （2）有【鼻化韻母前綴符號】，如：【閩拼方案】、【台語音標注音】
    #    【閩拼方案】： nia = Lia = ㄥㄧㄚ
    #    【台語音標】： nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    #
    # Liau, Lia, Lio, Liu
    # Luai, Lua, Lui, Lue
    # Li, Lu, La, Lo, Le, Lai, Lau
    #======================================================
    #
    #------------------------------------------------------
    # （1）無【鼻化韻母前綴符號】之【方音符號】
    #------------------------------------------------------
    # 介音 i 開頭之鼻韻母
    - xform/Lㄧㄠ/ㄧㆯ/ # Liau = iaunn
    - xform/Lㄧㄚ/ㄧㆩ/ # Lia = iann
    - xform/Lㄧㆦ/ㄧㆧ/ # LiO = iOnn
    - xform/Lㄧㄨ/ㄧㆫ/ # Liu = iunn
    # 介音 u 開頭之鼻韻母
    - xform/Lㄨㄞ/ㄨㆮ/ # Luai = uainn
    - xform/Lㄨㄚ/ㄨㆩ/ # Lua = uann
    - xform/Lㄨㄧ/ㄨㆪ/ # Lui = uinn
    - xform/Lㄨㆤ/ㄨㆥ/ # Lue = uenn
    # 元音/複合鼻韻母
    - xform/Lㄧ/ㆪ/ # Li = inn
    - xform/Lㄨ/ㆫ/ # Lu = unn
    - xform/Lㄚ/ㆩ/ # La = ann
    - xform/Lㆦ/ㆧ/ # LO = Onn
    - xform/Lㆤ/ㆥ/ # Le = enn
    - xform/Lㄞ/ㆮ/ # Lai = ainn
    - xform/Lㄠ/ㆯ/ # Lau = aunn
    #------------------------------------------------------
    # 將【鼻化韻母後綴識別符號】轉換成【方音符號】之鼻化韻母
    # 【註】：萬不可刪此段，否則【方音符號】的鼻化韻母將無法轉換
    #------------------------------------------------------
    - xform/ㄧ》ⁿ/ㆪ》/ # Li = inn
    - xform/ㄨ》ⁿ/ㆫ》/ # Lu = unn
    - xform/ㄚ》ⁿ/ㆩ》/ # La = ann
    - xform/ㆦ》ⁿ/ㆧ》/ # LO = Onn
    - xform/ㆤ》ⁿ/ㆥ》/ # Le = enn
    - xform/ㄞ》ⁿ/ㆮ》/ # Lai = ainn
    - xform/ㄠ》ⁿ/ㆯ》/ # Lau = aunn
    #------------------------------------------------------
    # （2）無【鼻化韻母前綴符號】之【閩拼方案】
    #------------------------------------------------------
    # # 介音 i 開頭之鼻韻母
    # - xform/Lㄧㄠ/ㄥㄧㄠ/ # Liau = iaunn
    # - xform/Lㄧㄚ/ㄥㄧㄚ/ # Lia = iann
    # - xform/Lㄧㄛ/ㄥㄧㄛ/ # LiO = iOnn
    # - xform/Lㄧㄨ/ㄥㄧㄨ/ # Liu = iunn
    # # 介音 u 開頭之鼻韻母
    # - xform/Lㄨㄞ/ㄥㄨㄞ/ # Luai = uainn
    # - xform/Lㄨㄚ/ㄥㄨㄚ/ # Lua = uann
    # - xform/Lㄨㄧ/ㄥㄨㄧ/ # Lui = uinn
    # - xform/Lㄨㆤ/ㄥㄨㆤ/ # Lue = uenn
    # # 元音/複合鼻韻母
    # - xform/Lㄧ/ㄥㄧ/ # ㆪ Li = inn
    # - xform/Lㄨ/ㄥㄨ/ # ㆫ Lu = unn
    # - xform/Lㄚ/ㄥㄚ/ # ㆩ La = ann
    # - xform/Lㆦ/ㄥㆦ/ # ㆧ LO = Onn
    # - xform/Lㆤ/ㄥㆤ/ # ㆥ Le = enn
    # - xform/Lㄞ/ㄥㄞ/ # ㆮ Lai = ainn
    # - xform/Lㄠ/ㄥㄠ/ # ㆯ Lau = aunn
    #------------------------------------------------------
    # （2）無【鼻化韻母前綴符號】之【閩拼方案】
    #------------------------------------------------------
    # 【台語音標】鼻化韻母前綴識別符：nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    - xform/》L/》ㄥ/
    # 處理其餘的 L（如果還有的話）
    - xform/L/ㄥ/
    # 造字用之【鼻化韻母前綴符號】
    # - xform/ㄥ// # \uF8F4 = 63732
    #------------------------------------------------------
    # 鼻音韻尾
    # 陽聲韻： 姆[m-] / 鋼[ng-] / n
    #------------------------------------------------------
    - xform/》m/ㆬ》/
    - xform/》ng/ㆭ》/
    - xform/》n/ㄣ》/
    #------------------------------------------------------
    # 入聲韻 p t k h
    #------------------------------------------------------
    - xform/》p([480])/ㆴ》$1/
    - xform/》t([480])/ㆵ》$1/
    - xform/》k([480])/ㆻ》$1/
    - xform/》h([480])/ㆷ》$1/
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㆡ((ㄥ)?ㄧ)/ㆢ$1/
    - xform/ㄗ((ㄥ)?ㄧ)/ㄐ$1/
    - xform/ㄘ((ㄥ)?ㄧ)/ㄑ$1/
    - xform/ㄙ((ㄥ)?ㄧ)/ㄒ$1/
    # 國/台語注音符號複合韻母校調
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    # 方音符號複合韻母校調
    # 陽聲韻尾校調  ㆬ、ㄣ、ㆭ
    - xform/ㄧㆭ/ㄧㄥ/
    - xform/ㄚㆬ/ㆰ/
    - xform/ㄚㆭ/ㄤ/
    - xform/ㆦㆬ/ㆱ/
    - xform/ㆦㆭ/ㆲ/
    #------------------------------------------------------
    # - xform/》1/ˉ/        # 1 ¹ ˉ   陰平
    # - xform/》6/˫/ # 7 ⁷ ˫   陽去
    - xform/》1//   # 1 ¹ ˉ   陰平
    - xform/》2/ˋ/ # 2 ² ˋ   上声：不分陰上或陽上
    - xform/》3/˪/  # 3 ³ ˪   陰去
    - xform/》4//   # 1 ¹ ˉ   陰入
    - xform/》5/ˊ/ # 5 ⁵ ˊ   陽平
    - xform/》7/˫/  # 4 ⁴     陰入
    - xform/》8/˙/ # 8 ⁸ ˙   陽入
    - xform/》0/˙/ # 0 ⁰ ˙   入声
    #======================================================
    # 左欄：白話字（POJ）
    #======================================================
    # ---- 1. 聲調正規化 ----
    # - xform/6/7/
    # ---- 2. 聲母 ----
    - xform/〔〉c/〔chh〉/
    - xform/〔〉z/〔ch〉/
    - xform/〔〉(ph|p|th|t|kh|k|ng|b|m|n|l|g|j|s|h)/〔$1〉/ # 聲母校調
    # ---- 3. 韻母 ----
    # - xform/i(ng|k)/e$1/
    # 將【字典編碼】： O，轉換成【羅馬拼音字母】：o [ɔ] = ㆦ
    - xform/〉iO(ng|k)(\d)/io$2$1〉/
    - xform/〉O(ng|k|m|p)(\d)/o$2$1〉/
    # 將【字典編碼】： ə，轉換成【羅馬拼音字母】：o [ə] = ㄜ
    # - xform/〔([^〕]*)ə/〔$1o/
    # ---- 4. oo 韻母：整體加入調號標記，避免被移位拆開 ----
    # - xform/oo([12345678])/o͘$1/
    # - xform/o͘1/o͘/
    # - xform/o͘2/ó͘/
    # - xform/o͘3/ò͘/
    # - xform/o͘4/o͘/
    # - xform/o͘5/ô͘/
    # - xform/o͘7/ō͘/
    # - xform/o͘8/o̍͘/

    # 將【字典編碼】： O，轉換成【羅馬拼音字母】：o [ɔ] = ㆦ
    - xform/O1/o͘/
    - xform/O2/ó͘/
    - xform/O3/ò͘/
    - xform/O4/o͘/
    - xform/O5/ô͘/
    - xform/O7/ō͘/
    - xform/O8/o̍͘/

    # 將【字典編碼】： ə，轉換成【羅馬拼音字母】：o [ə] = ㄜ
    - xform/ə1/o/
    - xform/ə2/ó/
    - xform/ə3/ò/
    - xform/ə4/o/
    - xform/ə5/ô/
    - xform/ə7/ō/
    - xform/ə8/o̍/

    - xform/o1/o/
    - xform/o2/ó/
    - xform/o3/ò/
    - xform/o4/o/
    - xform/o5/ô/
    - xform/o7/ō/
    - xform/o8/o̍/

    # ---- 5. 調符移位 ----
    # 含有 a, o, e, O, ə 的母音，調號標在上
    # - xform/〉(.*?)([aoeOə])(.*?)([12345678])/$1$2$4$3/
    - xform/〉(.*?)([aoeOə])(.*?)([12345678])/$1$2$4$3/
    # 只有 i, u 的複合母音（iu, ui 等），調號標於後側
    - xform/〉([iu])([iu])(.*?)([12345678])/$1$2$4$3/
    # 單母音（如 i, u, m, ng 等），調號標在上
    # - xform/〉([aeiouOəmng])(.*?)([12345678])/$1$3$2/
    - xform/〉(m|ng|[aiueOə])(.*?)([12345678])/$1$3$2/
    # 預防其他未盡情況
    - xform/〉([aeiou])(r?m?n*h?g?p?t?k?)([12345678])/$1$3$2/
    - xform/〉([ae])([iueo])([12345678])/$1$3$2/
    # ---- 6. 一般調符代換 ----
    - xform/a1/a/
    - xform/a2/á/
    - xform/a3/à/
    - xform/a4/a/
    - xform/a5/â/
    - xform/a7/ā/
    - xform/a8/a̍/

    - xform/i1/i/
    - xform/i2/í/
    - xform/i3/ì/
    - xform/i4/i/
    - xform/i5/î/
    - xform/i7/ī/
    - xform/i8/i̍/

    - xform/u1/u/
    - xform/u2/ú/
    - xform/u3/ù/
    - xform/u4/u/
    - xform/u5/û/
    - xform/u7/ū/
    - xform/u8/u̍/

    - xform/e1/e/
    - xform/e2/é/
    - xform/e3/è/
    - xform/e4/e/
    - xform/e5/ê/
    - xform/e7/ē/
    - xform/e8/e̍/

    - xform/m1/m/
    - xform/m2/ḿ/
    - xform/m3/m̀/
    - xform/m4/m/
    - xform/m5/m̂/
    - xform/m7/m̄/
    - xform/m8/m̍/

    - xform/ng1/ng/
    - xform/ng2/ńg/
    - xform/ng3/ǹg/
    - xform/ng4/ng/
    - xform/ng5/ŋg/
    - xform/ng7/n̄g/
    - xform/ng8/ŋ̍g/

    # ---- 8. 後處理 ----
    - xform/nn/ⁿ/
    - xform/ua/oa/
    - xform/ue/oe/
    # 收尾校調，將聲母與韻母重新組合
    # - xform/〔Ø/〔/   # 消除【零聲母】的前綴識別符號
    - xform/〔(ph|th|kh|ng|chh|ch|[bpmtnlgksh])〉/〔$1/ # 聲母校調
    - xform/〔〉/〔/
    - xform/〉〕/〕/

# reverse_lookup:
#   dictionary: luna_pinyin
#   prefix: "`"
#   tips: 〔拼音〕
#   preedit_format:
#     - xform/([nljqxy])v/$1ü/

key_binder:
  import_preset: default
  bindings:
    #---------------------------------------------------
    # 使用【_】鍵，輸入【調號】：3 （低音調）
    - { when: composing, accept: underscore, send: underscore }
    - { when: has_menu, accept: underscore, send: underscore }
    #---------------------------------------------------
    # 使用【-】鍵，輸入【調號】：7 （中音調）
    - { when: composing, accept: minus, send: minus }
    - { when: has_menu, accept: minus, send: minus }
    #---------------------------------------------------
    # 使用 【.】鍵，輸入【調號】：0（輕聲及入聲調）
    - { when: composing, accept: period, send: period }
    - { when: has_menu, accept: period, send: period }
    #---------------------------------------------------
    # 翻頁
    # - { accept: comma, send: Page_Up, when: has_menu }         # 選下一個字
    # - { accept: period, send: Page_Down, when: has_menu }      # 選上一個字
    - { accept: "Control+p", send: Page_Up, when: composing }
    - { accept: "Control+n", send: Page_Down, when: composing }
    #---------------------------------------------------
    # Vim Mode
    #---------------------------------------------------
    - { when: has_menu, accept: "Control+h", send: Page_Up }
    - { when: has_menu, accept: "Control+l", send: Page_Down }
    - { when: has_menu, accept: "Control+k", send: Up }
    - { when: has_menu, accept: "Control+j", send: Down }
    #---------------------------------------------------

editor:
  bindings:
    # (1) 輸出拼音字母：Enter（supers_tone=ON） → giam¹ ga¹ ✅
    # (2) 輸出拼音字母：Enter（supers_tone=OFF） → giam1 ga1 ✅
    # (3) 輸出注音符號：Ctrl+Enter → ㄍㄧㆰ ㄍㄚ（不變）
    # (4) 輸出帶調號的注音符號（上標）：Shift+Enter（supers_tone=ON） → ㄍㄧㆰ¹ ㄍㄚ¹（不變）
    # (5) 輸出帶調號的注音符號（一般）：Shift+Enter（supers_tone=OFF） → ㄍㄧㆰ1 ㄍㄚ1（不變）
    # (6) 輸入候選字清單之【拼音字母】及【注音符號】：Ctrl+Shift+Enter → 〔giam1〕 〔ga1〕 【ㄍㄧㆰ】 【ㄍㄚ】（不變）
    space: commit # 以【候選字清單】中，被【候選游標】標示的【漢字】，將之輸出
    Control+Shift+Return: commit_comment  # 輸出【台語注音二式】的【羅馬拼音字母】+【方音符號】的【注音符號】

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    uppercase: ^[A-Z][-_+.'0-9A-Za-z]*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    punct: '`[^\s]$'
    reverse_lookup: "`[a-z]*$"

menu:
  alternative_select_labels: [①, ②, ③, ④, ⑤] # 修改候選標籤
  alternative_select_keys: "12345"
  page_size: 5 #選單每䈎顯示個數

style:
  horizontal: false
  font_face: "霞鶩文楷 TC, 新細明體"
  # comment_font_face: "BopomofoRuby1909-v1, 新細明體"
  comment_font_face: "霞鶩文楷 TC, 新細明體"
  comment_font_size: 18

punctuator:
  import_preset: keymap_piau_tian
