# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: phing_im_poj
  name: 拼音輸入法【白話字】
  version: "v0.1.0.1"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【輸入類型】：拼音輸入法
    【拼音系統】：白話字【教會羅馬字拼音方案】
    【字典編碼】：台羅音標
    【注音輸入】：羅馬拼音字母（siaⁿ1：siann;）
    【侯選清單】：〔siaⁿ¹〕【ㄙㄧㄚ¹】
    【聲調標示】：
      (1) 台羅八聲調；
      (2) 使用數值標示聲調，以利閱讀。
  #------------------------------------------------------
  # 定義使用者按下鍵盤時，輸入法能接受的按鍵
  #------------------------------------------------------
  # 舒聲 [12357]
  # 6: [N/A]
  # 1: 陰平調（高音調）;
  # 7: 陽去調（中音調）-
  # 3: 陰去調（低音調）_ （劃底線符號）
  # 2: 上聲調（高降調）\
  # 5: 陽平調（低升調）/
  # 4: 陰入調（低促調）[
  # 8: 陽入調（高促調）]
  # 輕聲及入聲 [48] = 0
  # 0: .
  #------------------------------------------------------

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  - name: supers_tone
    reset: 1
    states: [一般, 上標]

engine:
  processors:
    - lua_processor@aux_commit    # 選擇【輸入法】的輸出：【羅馬拼音字母】、【方音符號】、【用調號呈現之方音符號】
    - lua_processor@jump_select   # 在【候選字清單】移動【選擇游標】
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
    # - fluency_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - uniquifier
    # 為 filter 除錯用
    # - lua_filter@append_ok_filter
    # - lua_filter@force_mark_filter
    # 重組【候選字清單】中的【羅馬拼音字母】及【注音符號】
    - lua_filter@reformat_comment_filter

speller:
  alphabet: abcdefghijklmnopqrstuvwxyzN;-_\/[]7.
  initials: abcdefghijklmnopqrstuvwxyzN
  finals: ;-_\/[]7.
  delimiter: "'"
  use_space: true
  algebra:
    #======================================================
    # 調整字典台語音標字母
    # 定義【台語音標】與【音標編碼】的對映關係
    #======================================================
    # 去除零聲母
    # - derive/Ø//
    #------------------------------------------------------
    # 聲調
    #------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    # --------------------------------------------------------------------------
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # 舌尖前音（齒齦音）: z[c], c[ch], j[j], s[s]
    # - derive/ts/ch/
    - xform/^tsh/chh/     # ㄘ
    - xform/^ts(?!h)/ch/  # ㄗ（拼音字母 c 之後不是接 h 的【c】換成【z】）
    #==========================================================================
    # 【閩南話變調規則】
    # 為強化使用者輸入之便利性，即便輸入【變調】，仍能推算出【本調】之漢字
    # 為字典中的【本調】產生【變調】的衍生拼音
    #==========================================================================
    # 舒聲變調規則 (17325)
    - derive/1/7/  # 第一調 → 第七調 (kim1 → kim7)
    - derive/7/3/  # 第七調 → 第三調
    - derive/3/2/  # 第三調 → 第二調
    - derive/2/1/  # 第二調 → 第一調
    - derive/5/7/  # 第五調 → 第七調
    #--------------------------------------------------------------------------
    # 入聲變調規則 (48)
    # 入聲尾韻為 h 的變調
    - derive/(?<![ptk])4/2/      # -h 第四調 → 第二調
    - derive/(?<![ptk])8/3/      # -h 第八調 → 第三調
    #--------------------------------------------------------------------------
    # 入聲尾韻為 p/t/k 的變調
    - derive/[ptk]4/8/  # -p/-t/-k 第四調 → 第八調
    - derive/[ptk]8/4/  # -p/-t/-k 第八調 → 第四調
    # --------------------------------------------------------------------------
    # 鼻音韻母轉換：ann ==> nna ==> Na ==> Nㄚ ==> ㆩ
    # --------------------------------------------------------------------------
    # - xform/([iu]?(ai|au|oo|[aiueo]))nn/$1ⁿ/  # 不可轉換：prism 須保留 nn 供鍵盤輸入
    #======================================================
    # 【韻母】相容衍生
    # 台羅拼音轉白話字
    #======================================================
    # - xform/oo/o͘/      # 不可在 algebra 轉換：使用者無法從鍵盤輸入 o͘，改由 preedit_format 顯示層處理
    - xform/ou/oo/        # ou = oo
    - xform/ue/oe/
    - xform/ua/oa/
    - xform/i(ng|k)/e$1/
    - xform/iek/ik/
    #--------------------------------------------------------------------------
    # 入聲韻尾
    # -m  ==> -p
    # -n  ==> -t
    # -ng ==> -k
    #--------------------------------------------------------------------------
    # 【字典編碼】：【9】，以【按鍵】：【.】，輸入所有【入聲韻尾】：-p/-t/-k [48]
    # 【字典編碼】：【&】，以【按鍵】：【.】，輸入所有【入聲韻尾】：-p/-t/-k [48]
    # - derive/p[48]$/p9/
    # - derive/t[48]$/t9/
    # - derive/k[48]$/k9/
    # - derive/h[48]$/h9/
    - derive/([ptkh])[48]$/${1}9/
    #--------------------------------------------------------------------------
    # 【字典編碼】：【0】代表【輕聲調】/【字典編碼】：【8】代表【陽入調】（台羅拼音第8聲）
    # 【鍵盤按鍵】：【7】，可輸入：【輕聲符號】即【字典編碼】：【0】或【8】
    # - derive/(([ia]|oo))m0/$1p0/   # 用 ㄚㄅ． 來拍 ㄚㆴ
    # - derive/([iuae])n0/$1t0/  # 用 ㄚㄉ． 來拍 ㄚㆵ
    # - derive/([iao])ng0/$1k0/  # 用 ㄚㄍ． 來拍 ㄚㆻ
    # - abbrev/((\w+0)|[ptkh]8)/0/
    - derive/[48]/0/
    #=======================================================================
    # 簡化輸入設定
    #=======================================================================
    # 拼音字母可略去聲調，推算出完整拼音
    - derive/^([a-z]+)\d$/$1/
    # 只輸入【聲母】
    # - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).*$/$1/  # 【台羅拼音】的聲母輸入簡化
    - abbrev/^([ptkmnbglsjhiuc]g?h?h?).*/$1/    # 【白話字】的聲母輸入簡化
    # # 只輸入【聲母】與【調號】
    # - abbrev/^([pbmtnlkgzcjsh]g?s?h?h?).+(\d)$/$1$2/
    # # 輸入【入聲韻尾】
    # - abbrev/[ptkh]0$/0/
    #=======================================================================
    # 定義聲調的「調號」與「按鍵」的對映規則
    #------------------------------------------------------
    # 舒聲 [173254890]
    # 1: 陰平調（高音調）;
    # 7: 陽去調（中音調）-
    # 3: 陰去調（低音調）_ （劃底線符號）
    # 2: 上聲調（高降調）\
    # 5: 陽平調（低升調）/
    # 4: 陰入調（低促調）[
    # 8: 陽入調（高促調）]
    # 9: 入聲調 [48]=9 .
    # 0: 輕聲及入聲 [90] 7
    #=======================================================================
    - xlit|123574890N|;\_/-[].7N|

translator:
  dictionary: ji_khoo_tl
  prism: phing_im_poj
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  comment_format:
    # comment_format 直接處理字典原碼（台羅拼音 + 數字調號 1-8），無需 xlit
    # ---- 1. 聲調正規化 ----
    - xform/6/7/
    # ---- 2. 聲母：TLPA → POJ ----
    - xform/tsh/chh/
    - xform/ts(?!h)/ch/
    # ---- 3. 韻母 ing/ik → eng/ek（須在移位前） ----
    - xform/i(ng|k)/e$1/
    # ---- 4. oo 韻母：整體加入調號標記，避免被移位拆開 ----
    - xform/oo([12345678])/o͘$1/
    # ---- 5. 調符移位 ----
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([12345678])/$1$3$2/
    - xform/([ae])([iueo])([12345678])/$1$3$2/
    # ---- 6. o͘ 調符代換 ----
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘4/o͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # ---- 7. 一般調符代換 ----
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    # ---- 8. 後處理 ----
    - xform/nn/ⁿ/
    - xform/ua/oa/
    - xform/ue/oe/
  preedit_format:
    #------------------------------------------------------
    # 定義【鍵盤輸入列】
    # 定義鍵盤輸入【按鍵】，與【拼音字母】顯示對映關聯
    #------------------------------------------------------
    # 分隔符號
    - xform/'/ / # 將音節分割符號 `'` 轉換為空白
    #------------------------------------------------------
    # 【按鍵】與【輸入法調號】對映表
    #  ; ==> 1
    #  - ==> 7
    #  _ ==> 3
    #  \ ==> 2
    #  / ==> 5
    #  [ ==> 4
    #  ] ==> 8
    #------------------------------------------------------
    - xlit|;-_\/[]|1732548|
    #------------------------------------------------------
    # oo → o͘ 須在調符移位前執行，以保持 oo 的完整性
    - xform/oo/o͘/
    #------------------------------------------------------
    # 定義【調符】對映規則
    #------------------------------------------------------
    # 自音標解構：【聲母】+【韻母】+【調號】的拼音字母組合，
    # 為【韻母】標注【聲調符號】做準備
    # （字符集使用 [1732548]，即 xlit 轉換後的數字）
    # 注意：o͘ 中的 ͘（U+0358）不在 [aeiou] 及韻尾集合中，
    # 故移位規則不會誤匹配 o͘，o͘ 後面的調號會直接由下方規則處理。
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1732548])/$1$3$2/
    - xform/([ae])([iueo])([1732548])/$1$3$2/
    # [POJ oo 韻母] oo 已轉為 o͘，直接對應調符
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘4/o͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # [1] 陰平調（高音調）
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    # [2] 上聲調（高降調）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # [3] 陰去調（低音調）_ （劃底線符號）
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/ng3/ǹg/
    # [4] 陰入調（低促調）[
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/mh4/mh/
    - xform/ngh4/ngh/
    # [5] 陽平調（低升調）/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/m5/m̂/
    - xform/ng5/n̂g/
    # [6] 陽上調
    # - xform/a6/ǎ/
    # - xform/e6/ě/
    # - xform/i6/ǐ/
    # - xform/u6/ǔ/
    # - xform/o6/ǒ/
    # - xform/ng6/ňg/
    # [7] 陽去調（中音調）-
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/m7/m̄/
    - xform/ng7/n̄g/
    # [8] 陽入調（高促調）]
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    - xform/mh8/m̍h/
    - xform/ngh8/n̍gh/
    #------------------------------------------------------
    # 後處理（調符已定位後執行）
    #------------------------------------------------------
    - xform/nn/ⁿ/      # 鼻化韻母 nn → ⁿ（須在調符代換後，以免破壞 n* 匹配）
    - xform/tsh/chh/   # TLPA → POJ 聲母：tsh → chh
    - xform/ts/ch/     # TLPA → POJ 聲母：ts → ch
    - xform/ua/oa/     # TLPA → POJ 韻母：ua → oa
    - xform/ue/oe/     # TLPA → POJ 韻母：ue → oe
    - xform/iek/ek/    # TLPA → POJ 韻母：iek → ek
    - xform/i(ng|k)/e$1/    # TLPA → POJ 韻母：ing/ik → eng/ek

# reverse_lookup:
