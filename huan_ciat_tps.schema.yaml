    - xform/ㄇ/毛/  # m【a】 ==>  [m]
    - xform/ㄌ/柳/  # l【x】 ==>  [l]
    - xform/ㄫ/語/  # ŋ【G】 ==>  [ng]
    #--------------------------------------------------------------------------
    - xform/ㆠ/門/  # b【!】 ==>  [b]
    - xform/ㄅ/邊/  # p【1】 ==>  [p]
    - xform/ㄆ/頗/  # P【q】 ==>  [ph]
    - xform/ㄋ/耐/  # n【s】 ==>  [n]
    - xform/ㄉ/地/  # t【2】 ==>  [t]
    - xform/ㄊ/他/  # T【w】 ==>  [th]
