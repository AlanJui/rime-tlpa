# Rime schema
# vim: set sw=2 sts=2 et nowrap:
# encoding: utf-8

schema:
  schema_id: huan_ciat_tps
  name: 反切輸入法【方音符號】
  version: "v0.1.0"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    使用者輸入【方音符號】按鍵，輸入法會將【方音符號】轉換成【十五音】的【聲母】、【韻母】
    與【聲調】；同時輸入法亦會根據使用者已輸入的【方音符號】，推測可能的【漢字】及其【讀音】，
    並顯示於【候選字清單】中，供使用者選擇。漢字的【讀音】以兩種方式呈現：一為【十五音反切】；
    另一為【方音符號】。

    【拼音系統】：台語音標+（TLPA+）
    【字典編碼】：【台羅拼音】
    【輸入類型】：注音輸入法
    【注音符號】：極簡化方音符號，適合懶地背記按鍵位置的使用者。
    【特性簡介】：
      1. 使用者輸入的【方音符號】按鍵，會轉換成【十五音】的【聲母】、【韻母】與【聲調】；
         如使用者輸入：ㄒㄧㄣˊ，輸入法的【輸入列】會顯示：【時巾五】
      2. 【侯選清單】：以【十五音反切】、【方音符號】兩欄標示，如：〔巾五時〕【ㄒㄧㄣˊ】
      3. 【聲調標示】：
          (a) 採【台羅八聲調】為【調名】；
          (b) 調號採與【注音符號】相容的【方音符號】。

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  # 【輸入編輯列】漢字標音格式（310.md §輸入編輯列之漢字標音格式）
  # reset: 0 → 第一個選項為預設 → 十五音
  - options:
      [ key_in_piau_im_sni, key_in_piau_im_tps, key_in_piau_im_tlpa,
        key_in_piau_im_tl, key_in_piau_im_poj, key_in_piau_im_bp,
        key_in_piau_im_bpm2, key_in_piau_im_ipa ]
    reset: 0
    states: [ 十五音, 方音符號, 台語音標, 台羅拼音, 白話字, 閩拼方案, 台語注音二式, 國際音標 ]
  # # 【候選清單】漢字標音格式（暫停實作）
  # # reset: 0 → 第一個選項為預設 → 方音符號
  # - options: [ hau_suan_piau_im_tps, hau_suan_piau_im_tlpa ]
  #   reset: 0
  #   states: [ 方音符號, 台語音標 ]

engine:
  processors:
    - lua_processor@aux_commit    # 輸出【漢字標音】，而非【漢字】
    - lua_processor@jump_select   # 務必置頂，用以攔截【快捷鍵】，如：Ctrl+M, Ctrl+<, Ctrl+>
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier
    # 為 filter 除錯用
    # - lua_filter@append_ok_filter
    # - lua_filter@force_mark_filter
    - lua_filter@reformat_comment_filter

speller:
  alphabet: "!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-=\"5346][7"
  initials: "!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="
  finals: "\"5346][7."
  delimiter: "'"
  use_space: true
  #=============================================================================
  # 定義【注音符號】編碼及【鍵盤按鍵】對映之【注音編碼】
  #=============================================================================
  algebra:
    #===========================================================================
    # 拼音系統標準化校調
    # 為本輸入方案使用之【字典編碼】，進行【標準化】前置處理
    #===========================================================================
    - xform/6/7/
    # --------------------------------------------------------------------------
    # 區分 oo 及 o 所使用之羅馬拼音字母：【o】與【ə】
    # 將羅馬拼音字母 o 留予 oo [ɔ] 韻使用；使用【拼音符號】 ə [ə]
    # 《範例》：【何】：【ho5】= 【hə5】
    # --------------------------------------------------------------------------
    # 變更【元音韻母】的羅馬拼音字母： oo 為 O
    - xform/oo/O/ # ㆦ [oo]
    # --------------------------------------------------------------------------
    # 下之【韻母】乍看為 o，實則需當 oo [ɔ] 韻使用
    # onn|iong|iok|ong|ok|om|op
    # - xform/io(?nn|ng|k)/iO$1/
    - xform/ionn/iOnn/
    - xform/iong/iOng/
    - xform/iok/iOk/ # 台語注音二式無此韻母，其拼音為：[iook] ==> [iOk] ==> ㄧㆦㄍ
    # - xform/o(?onn|nn|ng|k|m|p)/O$1/
    - xform/onn/Onn/ # ㆧ [oonn] = O + nn
    - xform/ong/Ong/
    - xform/ok/Ok/
    - xform/om/Om/
    - xform/op/Op/
    # --------------------------------------------------------------------------
    # 變更 ㄜ /o/ 韻的羅馬拼音字母：[or] ==> [o] ==> ㄜ [or]
    # - derive/or/ə/
    # o 之【字典編碼】改為： ə
    - xform/o/ə/ # ㄜ [ə] - 只轉換獨立的 o
    # --------------------------------------------------------------------------
    # 【複合韻母】
    - derive/ai/I/ # ㄞ [ai]
    - derive/au/U/ # ㄠ [au]
    # --------------------------------------------------------------------------
    # 【鼻化韻母】
    # --------------------------------------------------------------------------
    # 可用【鼻化韻母後綴識別符號】輸入
    - derive/ann/d/ # ㆩ [ann]
    - derive/inn/f/ # ㆪ [inn]
    - derive/unn/q/ # ㆫ [unn]
    - derive/enn/r/ # ㆥ [enn]
    - derive/Onn/v/ # ㆧ [onn]
    - derive/Inn/x/ # ㆮ [ainn]
    - derive/Unn/y/ # ㆯ [aunn]
    # --------------------------------------------------------------------------
    # 【鼻化韻母】輸入，可用連續兩次的輸入達成
    #--------------------------------------------------------------------------
    - derive/([aiueOIU])nn/$1$1/
    # -------------------------------------------------------------------------
    # 【鼻音韻母】使用【鼻音前綴識別符號】：ñ
    #--------------------------------------------------------------------------
    # a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui
    # 【註】：台羅拼音使用 onn [ɔ̃] ==> ㆧ，如： 唔（onn），沒有所謂的 oonn 韻母
    - derive/([iu]?[aiueOIU])nn/L$1/
    # 為所有【鼻化韻母】建置【字典編碼】：【L】
    - abbrev/L([iu]?[aiueOIU])/L/
    #==========================================================================
    # 【閩南話變調規則】
    # 為強化使用者輸入之便利性，即便輸入【變調】，仍能推算出【本調】之漢字
    # 為字典中的【本調】產生【變調】的衍生拼音
    #==========================================================================
    # 舒聲變調規則 (17325)
    - derive/1/7/ # 第一調 → 第七調 (kim1 → kim7)
    - derive/7/3/ # 第七調 → 第三調
    - derive/3/2/ # 第三調 → 第二調
    - derive/2/1/ # 第二調 → 第一調
    - derive/5/7/ # 第五調 → 第七調
    #--------------------------------------------------------------------------
    # 入聲變調規則 (48)
    # 入聲尾韻為 h 的變調
    - derive/(?<![ptk])4/2/ # -h 第四調 → 第二調
    - derive/(?<![ptk])8/3/ # -h 第八調 → 第三調
    #--------------------------------------------------------------------------
    # 入聲尾韻為 p/t/k 的變調
    - derive/[ptk]4/8/ # -p/-t/-k 第四調 → 第八調
    - derive/[ptk]8/4/ # -p/-t/-k 第八調 → 第四調
    #==========================================================================
    # 【聲母】羅馬拼音字母替換/衍生
    #  - 唇音/雙唇音: p, ph, b, m ( BP: b, p, bb, m )
    #  - 舌音/舌尖中音（齒齦音）: t, th, n, l (BP: d, t, ln, l)
    #  - 齒音/舌尖前音（齒齦音）: ts/z, tsh/c, j, s ( BP: z, c, j, s )
    #  - 齒音/舌尖前音（齦顎音）: zi, ci, ji, si ( BP:j, ch, jj, sh )
    #  - 牙音/舌根音（軟顎音）: k, kh, g, ng ( BP: k, kh, g, ng )
    #  - 喉音（聲門音）：h ( BP: h )
    #==========================================================================
    # 帶【鼻音】之【聲母】
    # - xform/^m/b/ # ㄇ [m]
    # - xform/^l/n/ # ㄌ [l]
    # - xform/^g/g/ # ㆣ [g]
    #--------------------------------------------------------------------------
    # - xform/p(?!h)/p/ # ㄅ[ p ]
    - xform/^ph/P/ # ㄆ [ph]
    - xform/^th/T/ # ㄊ [th]
    - xform/^kh/K/ # ㄎ [kh]
    - xform/^ng(?!\d)/ŋ/ # ㄫ [ng]
    #--------------------------------------------------------------------------
    # 【舌齒音（齒齦顎音）】可用【舌齒音 + i 】替換
    # - ㆡ[j] + ㄧ[i] = ㆢ[J] + ㄧ[i]
    # - ㄗ[z] + ㄧ[i] = ㄐ[Z] + ㄧ[i]
    # - ㄘ[c] + ㄧ[i] = ㄑ[C] + ㄧ[i]
    # - ㄙ[s] + ㄧ[i] = ㄒ[S] + ㄧ[i]
    #--------------------------------------------------------------------------
    # 台羅拼音轉【台語音標+】
    - xform/ts(?!h)/z/ # ㄗ [ts]
    - xform/tsh/c/ # ㄘ [tsh]
    # 舌尖前音（齦顎音）:
    - derive/^j(?i)/J/ # ㆢ[ji]
    - derive/^z(?i)/Z/ # ㄐ[zi]
    - derive/^c(?i)/C/ # ㄑ[ci]
    - derive/^s(?i)/S/ # ㄒ[si]
    #==========================================================================
    # 【字典編碼】：將字典檔中的【台羅拼音】轉換成本輸入方案，使用之【字典編碼】
    #==========================================================================
    #
    # --------------------------------------------------------------------------
    # 【元音韻母】與【複合韻母】：ㄞ[ai]、ㄠ[au]
    # --------------------------------------------------------------------------
    # 【元音韻母】
    #  ㄚ [a]
    #  ㄧ [i]
    #  ㄨ [u]
    #  ㆤ [e]
    #  ㆦ [oo]
    - xform/ir/w/ # ㆨ [ir]
    # --------------------------------------------------------------------------
    # 衍生【地方腔韻母】
    # --------------------------------------------------------------------------
    - derive/er(ng|k)/i$1/
    - derive/er(G|k)/i$1/
    - derive/er(n|t)/u$1/
    - derive/er/e/
    # 泉州腔
    - derive/ir(ng|k)/i$1/
    - derive/ir(n|t)/u$1/
    - derive/ire/ue/
    - derive/ir/e/
    # 漳州腔
    - derive/ou/O/
    - derive/ei/e/
    - derive/ee/e/ # 漳州/泉州腔
    # 廈門腔
    - derive/ur/u/
    #==========================================================================
    # 鼻音韻尾（m/ng/n）
    #==========================================================================
    # ng ：預設當【韻母ㆭ】
    - xform/ng(?=\d)/G/ # ㆭ (W) = -ng：ng 後接調號，當【韻尾韻母】ㆭ = ㄥ
    # n ：預設當【聲母ㄋ】)
    - xform/n(?=\d)/N/ # ㄣ (N) = -n： n  後接調號，當【韻尾韻母】ㄣ，
    # m ：預設當【聲母ㄇ】
    - xform/m(?=\d)/M/ # ㆬ (M) = -m： m  後接調號，當【韻尾韻母】ㆬ = ㄇ
    # --------------------------------------------------------------------------
    # 校調【複合韻母】，改成【方音符號】或【國/台語共用注音符號】
    # -------------------------------------------------------------------------
    # 校調【複合韻母】改成【國/台語共用注音符號】
    - derive/aG/A/ # ㄤ aG [ang] = a + ng
    - derive/aN/@/ # ㄢ aN [an] = a + n
    # 校調【複合韻母】改成【方音符號】
    - derive/aM/Y/ # ㆰ aM [am] = a + m
    - derive/OG/H/ # ㆲ OG [ong] = o + ng
    - derive/OM/W/ # ㆱ OM [oom] = o + m
    #==========================================================================
    # 為【入聲韻尾】衍生【羅馬拼音字母】：
    # (1) -m  ==> -p
    # (2) -n  ==> -t
    # (3) -ng ==> -k
    #--------------------------------------------------------------------------
    # (1) ap, ip, iap,
    # (2) at, it, ut, iat, uat
    # (3) ak, ik, ok, iak, iok
    # (4) ah, ih, uh, eh, ooh, oh, aih, auh, iah, iuh, ioh, uah, uih, ueh, iauh, uaih
    #==========================================================================
    # 依【韻母】建立【入聲韻尾】
    - derive/([iaO])M([480])/$1p$2/ # 用 ㄚㄅ． 來拍 ㄚㆴ
    - derive/([iuae])N([480])/$1t$2/ # 用 ㄚㄉ． 來拍 ㄚㆵ
    - derive/([iaOə])G([480])/$1k$2/ # 用 ㄚㄍ． 來拍 ㄚㆻ
    - derive/h([480])/h$1/
    #--------------------------------------------------------------------------
    # 可用【送氣聲母】來替換【入聲韻尾】
    # ㄆ(ph) ==>  ㄅ(p) ==> ㆴ(r)
    # ㄊ(th) ==>  ㄉ(t) ==> ㆵ(f)
    # ㄎ(kh) ==>  ㄍ(k) ==> ㆻ(q)
    - derive/p([480])/P$1/ # 用 ㄚ(ㄅ/ㄆ)． 來拍 ㄚㆴ
    - derive/t([480])/T$1/ # 用 ㄚ(ㄉ/ㄊ)． 來拍 ㄚㆵ
    - derive/k([480])/K$1/ # 用 ㄚ(ㄍ/ㄎ)． 來拍 ㄚㆻ
    #--------------------------------------------------------------------------
    # 入聲韻尾標準按鍵：p/t/k/h，使用【字典編碼】為：R/F/Q/V
    - derive/[pP]([480])/R$1/
    - derive/[tT]([480])/F$1/
    - derive/[kK]([480])/Q$1/
    - derive/h([480])/V$1/
    #--------------------------------------------------------------------------
    # 【入聲調】併入【輕聲調】，可使用【按鍵】：【7】（國語注音符號之輕聲調），輸入【字典編碼】：0
    # - derive/[480]/0/
    - derive/[48]/&/
    #--------------------------------------------------------------------------
    # 【字典編碼】：【0】代表【輕聲調】/【陽入調】（台羅拼音第8聲）
    # 使用按鍵：【7】輸入【字典編碼】：【0】
    - abbrev/(\w+0|[ptkh]8)/0/
    #--------------------------------------------------------------------------
    # 透過所有的【鼻音韻尾】，建立所有的【入聲韻尾】
    # am/an/ang/im/in/ing/un/ong/iam/ian/iang/iong/uan/uang
    # 所有的【入聲韻尾】，以【字典編碼】：【&】代表
    # 使用按鍵：【.】，可輸入【字典編碼】：【&】
    #--------------------------------------------------------------------------
    # M = -m; N = -n; G = -ng
    # I = ai
    # U = au
    # Y = aM  = am
    # @ = aN  = an
    # A = aG  = ang
    # H = oG = ong
    # W = oM = om
    # 所有【入聲韻尾】之【字典編碼】組合： aM/aN/aG/oG/ioG/... 等等
    # [imuaOəeIUY@AHMNG]+ - 匹配一個或多個韻母字符
    - abbrev/[iuaOəeIUY@AHWMNG]+[48]/&/
    #--------------------------------------------------------------------------
    # 【字典編碼】：【！】代表所有【陽聲韻】
    # - derive/(([iaO])M([480])|([iuae])N([480])|([iaOə])G([480])|h([480]))/!/ #
    # - abbrev/[iuaOəeIUY@AHWMNG]+[12357]/!/
    - derive/[48]/!/
    #==========================================================================
    # 【字典編碼】與【鍵盤按鍵】對映
    #==========================================================================
    # 【字典編碼】/【鍵盤按鍵】/【注音符號】
    # 【1】==>【:】==>【ˉ】   # 按鍵【[】輸入：第1調（陰平調）的【高平調】符號
    # 【7】==>【5】==>【˫】   # 按鍵【5】輸入：第7調（陽去調）的【中平調】符號
    # 【3】==>【3】==>【˪】   # 按鍵【3】輸入：第3調（陰去調）的【低平調】符號
    # 【2】==>【4】==>【ˋ】   # 按鍵【4】輸入：第2調（上聲調）的【高降調】符號
    # 【5】==>【6】==>【ˊ】   # 按鍵【6】輸入：第5調（陽平調）的【低升調】符號
    # 【4】==>【[】==>【ˉ】   # 按鍵【[】輸入：第4調（陰入調）的【低促聲調】符號
    # 【8】==>【]】==>【˙】   # 按鍵【]】輸入：第4調（陽入調）的【高促聲調】符號
    # 【0】==>【7】==>【˙】   # 按鍵【7】輸入：第4/8調，所有入声調
    #--------------------------------------------------------------------------
    # 【L】==>【-】==>【ㄥ】  # 按鍵【N】輸入：ㄥ【鼻化韻母前綴符號】
    #--------------------------------------------------------------------------
    # 零聲母前置識別：【Ø】，鍵盤按鍵：[=]
    # 例：iau ==> Øiau, au ==> Øau, a ==> Øa
    # - xform/Ø/英/
    #--------------------------------------------------------------------------
    - derive/^([aiuOeəwIUY@AHWMNG])/Ø$1/
    #--------------------------------------------------------------------------
    # 【按鍵編碼】與【字典編碼】對映
    - xlit|bpPmntTlgkKŋjzcshJZCSaiwueOəMNGRFQVIUY@AWHdfqrvxyLØ1732584&|!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="5346][7|

translator:
  dictionary: ji_khoo_tl
  prism: huan_ciat_tps
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    # 將連續輸入的分隔符號：【'】換成空白
    - xform/'/ /
    #==========================================================================
    # 定義【鍵盤輸入列】：按鍵與方音符號對映
    #--------------------------------------------------------------------------
    # 全對映：（1）【注音符號按鍵】；（2）【調號按鍵】；（3）【功能按鍵】
    #==========================================================================
    # （1）【注音符號按鍵】
    - xlit|!1qas2wxEedNYyhncRrfv8uKj,ikmp/btgz9lM0;Oo*UJ<I(L-="5346][7|ㆠㄅㄆㄇㄋㄉㄊㄌㆣㄍㄎㄫㆡㄗㄘㄙㄏㆢㄐㄑㄒㄚㄧㆨㄨㆤㆦㄜㆬㄣㆭㆴㆵㆻㆷㄞㄠㆰㄢㄤㆱㆲㆩㆪㆫㆥㆧㆮㆯㄥØ一七三二五八四入|
    #--------------------------------------------------------------------------
    # （2）【調號按鍵】
    #     -【"】高音調（陰平）： 一
    #     -【5】中音調（陽去）： 七
    #     -【3】低音調（陰去）： 三
    #     -【4】高降調（上声）： 二
    #     -【6】低升調（陽平）： 五
    #     -【[】低促調（陰入）： 四
    #     -【]】高促調（陽入）： 八
    #--------------------------------------------------------------------------
    #     -【7】促聲調（陰入/陽入）：【字典編碼】：【4】/【8】
    #     -【7】輕聲調（輕聲）：【字典編碼】：【0】
    #--------------------------------------------------------------------------
    # - xform/一//
    # - xform/七/˫/
    # - xform/三/˪/
    # - xform/二/ˋ/
    # - xform/五/ˊ/
    # - xform/八/˙/
    # - xform/四//
    #--------------------------------------------------------------------------
    # 入聲尾韻不用【標準按鍵】改用【声母按鍵】之相容處理
    #--------------------------------------------------------------------------
    - xform/ㄅ(四|八)$/ㆴ$1/  # ㄚㆴ
    - xform/ㄉ(四|八)$/ㆵ$1/  # ㄚㆵ
    - xform/ㄍ(四|八)$/ㆻ$1/  # ㄚㆻ
    - xform/ㄏ(四|八)$/ㆷ$1/  # ㄚㆷ
    #--------------------------------------------------------------------------
    # 【鼻化之元音韻母】（方音符號：ñ）輸入校調
    #--------------------------------------------------------------------------
    # 【元音韻母】連續輸入兩次，等同輸入【鼻化之元音韻母】
    - xform/ㄧㄧ/ㆪ/
    - xform/ㄨㄨ/ㆫ/
    - xform/ㄚㄚ/ㆩ/
    - xform/ㆦㆦ/ㆧ/
    - xform/ㆤㆤ/ㆥ/
    - xform/ㄞㄞ/ㆮ/
    - xform/ㄠㄠ/ㆯ/
    #------------------------------------------------------
    #【鼻化之元音韻母】可用【前綴識別】輸入
    #------------------------------------------------------
    - xform/ㄥㄧ/ㆪ/
    - xform/ㄥㄨ/ㆫ/
    - xform/ㄥㄚ/ㆩ/
    - xform/ㄥㆦ/ㆧ/
    - xform/ㄥㆤ/ㆥ/
    - xform/ㄥㄞ/ㆮ/
    - xform/ㄥㄠ/ㆯ/
    #------------------------------------------------------
    # 【鼻化之元音韻母】輸入過程校調
    - xform/ㆪㆦ/ㄧㆧ/
    - xform/ㆪㄨ/ㄧㆫ/
    - xform/ㆪㄚ/ㄧㆩ/
    - xform/ㆪㄠ/ㄧㆯ/
    - xform/ㆫㄚ/ㄨㆩ/
    - xform/ㆫㄞ/ㄨㆮ/
    #------------------------------------------------------
    # 韻母組合輸入調整
    #------------------------------------------------------
    - xform/ㄧㆭ/ㄧㄥ/  # ing
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    - xform/ㄚㆭ/ㄤ/    # ang
    - xform/ㄚㆬ/ㆰ/    # am
    - xform/ㆦㆭ/ㆲ/    # ong
    - xform/ㆦㆬ/ㆱ/    # om
    #--------------------------------------------------------------------------
    # 校調
    #--------------------------------------------------------------------------
    # 聲母輸入校調（務必置於【鼻化韻母】校調之後）
    # - derive/ji/Ji/  # Ji(ㆢ) = j(ㆡ) + i
    # - derive/zi/Zi/  # ji(ㄐ) = z(ㄗ) + i
    # - derive/ci/Ci/  # Ci(ㄑ) = c(ㄘ) + i
    # - derive/si/Si/  # Si(ㄒ) = s(ㄙ) + i
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    #==========================================================================
    # 聲母：【注音符號】轉【十五音】
    #==========================================================================
    # 零聲母：【注音符號】由【聲母類】起頭，需加上【零聲母識別符號】：英
    - xform/Ø/英/
    # 處理「以韻母」開頭之音節，務必使用 xform 轉換（避免使用 RIME regex ，因其處理多位元組 Unicode 交替群組的相容問題）
    - xform/^ㄚ/英ㄚ/    # 元音韻母
    - xform/^ㄧ/英ㄧ/
    - xform/^ㄨ/英ㄨ/
    - xform/^ㆤ/英ㆤ/
    - xform/^ㆦ/英ㆦ/
    - xform/^ㄜ/英ㄜ/
    - xform/^ㄞ/英ㄞ/    # 複合韻母
    - xform/^ㄠ/英ㄠ/
    - xform/^ㄤ/英ㄤ/
    - xform/^ㆰ/英ㆰ/
    - xform/^ㆱ/英ㆱ/
    - xform/^ㆲ/英ㆲ/
    - xform/^ㆨ/英ㆨ/
    - xform/^ㆩ/英ㆩ/    # 鼻化韻母
    - xform/^ㆪ/英ㆪ/
    - xform/^ㆫ/英ㆫ/
