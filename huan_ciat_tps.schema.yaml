    - xform/^ㆯ/英ㆯ/
    - xform/^ㆬ/英ㆬ/    # 韻化輔音
    - xform/^ㆭ/英ㆭ/
    #--------------------------------------------------------------------------
    # 声母：【注音符號】→【十五音聲母】
    # - xform/ㄇ/門/  # m【a】 ==>  [m]
    # - xform/ㄋ/柳/  # n【s】 ==>  [n]
    # - xform/ㄫ/雅/  # ŋ【G】 ==>  [ng]
