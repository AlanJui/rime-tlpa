# 【候選清單】程式舘：台語注音二式（BPM2）
# lib_comment_bpm2.yaml
# version: "v0.0.0.1"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    # ---- 0. 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔$1〕【》$1】/

    # ---- 1. 聲母：BPM2 → TLPA ----
    # 齒音/舌齒音（多字母先處理）
    - xform/》jji/j》i/   # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/》ji/z》i/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/》chi/c》i/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/》shi/s》i/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    - xform/》zz/j》/     # zz(ㆡ) → j（濁音）
    - xform/》z/z》/      # z(ㄗ) → z
    - xform/》c/c》/      # c(ㄘ) → c
    - xform/》s/s》/      # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/》ng/ng》/    # ng(ㄫ) → ng
    # 舌根音
    - xform/》gg/g》/     # gg(ㆣ) → g（濁音）
    - xform/》g/k》/      # g(ㄍ) → k
    - xform/》k/kh》/     # k(ㄎ) → kh
    # 唇音
    - xform/》bb/b》/     # bb(ㆠ) → b（濁音）
    - xform/》b/p》/      # b(ㄅ) → p
    - xform/》p/ph》/     # p(ㄆ) → ph
    - xform/》m/m》/      # m(ㄇ) → m
    # 舌尖音
    - xform/》d/t》/      # d(ㄉ) → t
    - xform/》t/th》/     # t(ㄊ) → th
    - xform/》n/n》/      # n(ㄋ) → n
    - xform/》l/l》/      # l(ㄌ) → l
    # 聲門音
    - xform/》h/h》/      # h(ㄏ) → h

    # ---- 2. 韻母：TLPA → BP ----
    - xform/》or/o》/     # or(ㄜ) → o
    - xform/》oo/oo》/    # oo(ㆦ) → oo
    - xform/》oom/om》/   # oom(ㆱ) → om
    - xform/》oonn/onn》/ # oonn(ㆧ) → onn
    - xform/》ong/ong》/  # ong(ㆲ) → ong

    #==============================================================================
    # 台語注音二式（BPM2）直接顯示字典原碼（BPM2 拼音 + 數字調號）
    # 規則：
    #   - 聲調 6 統一改為 7
    #   - 第 1 調（陰平）、第 4 調（陰入）略去不寫
    #   - nn 保留原樣，不轉換成上標 ⁿ
    #==============================================================================
    - xform/6/7/    # 聲調 6 改為 7
    - xform/1〕/〕/    # 第 1 調（陰平）略去不寫
    - xform/4〕/〕/    # 第 4 調（陰入）略去不寫
    # ---- 7. 清除定位符號 ----
    - xform/》//
