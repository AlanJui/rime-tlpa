# 【候選清單】程式舘：台語注音二式（BPM2）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bpm2.yaml
# version: "v0.0.0.2"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    - xform/^(.*)$/〔$1〕【》$1】/
    # --------------------------------------------------------------------------
    # 左欄【聲母】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    # - xform/(〔)tsh/${1}c/
    # - xform/(〔)ts/${1}z/
    # --------------------------------------------------------------------------
    # 左欄【韻母】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    # - xform/ou/oo/
    # - xform/iek/ik/
    # --------------------------------------------------------------------------
    # 左欄【聲調】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    # - xform/6/7/ # 聲調 6 改為 7
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    # 右欄多音節：' 後面插入 》 標記（lookahead 限右欄 【...】 內）
    - xform/'(?=[^〕】]*】)/ 》/
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    # # ---- 1. 聲母：BPM2 → TLPA ----
    # # 齒音/舌齒音（多字母先處理）
    # - xform/》jji/j》i/   # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    # - xform/》ji/z》i/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    # - xform/》chi/c》i/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    # - xform/》shi/s》i/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    # - xform/》zz/j》/     # zz(ㆡ) → j（濁音）
    # - xform/》z/z》/      # z(ㄗ) → z
    # - xform/》c/c》/      # c(ㄘ) → c
    # - xform/》s/s》/      # s(ㄙ) → s
    # # 舌根音/鼻音（濁音）
    # - xform/》ng/ng》/    # ng(ㄫ) → ng
    # # 舌根音
    # - xform/》gg/g》/     # gg(ㆣ) → g（濁音）
    # - xform/》g/k》/      # g(ㄍ) → k
    # - xform/》k/kh》/     # k(ㄎ) → kh
    # # 唇音
    # - xform/》bb/b》/     # bb(ㆠ) → b（濁音）
    # - xform/》b/p》/      # b(ㄅ) → p
    # - xform/》p/ph》/     # p(ㄆ) → ph
    # - xform/》m/m》/      # m(ㄇ) → m
    # # 舌尖音
    # - xform/》d/t》/      # d(ㄉ) → t
    # - xform/》t/th》/     # t(ㄊ) → th
    # - xform/》n/n》/      # n(ㄋ) → n
    # - xform/》l/l》/      # l(ㄌ) → l
    # # 聲門音
    # - xform/》h/h》/      # h(ㄏ) → h

    # # ---- 2. 韻母：TLPA → BP ----
    # - xform/》ik/iek》/   #
    # - xform/》or/o》/     # or(ㄜ) → o
    # - xform/》oo/oo》/    # oo(ㆦ) → oo
    # - xform/》oom/om》/   # oom(ㆱ) → om
    # - xform/》oonn/onn》/ # oonn(ㆧ) → onn
    # - xform/》ong/ong》/  # ong(ㆲ) → ong

    # ---- 3. 聲調校調 ----
    #==============================================================================
    # 台語注音二式（BPM2）直接顯示字典原碼（BPM2 拼音 + 數字調號）
    # 規則：
    #   - 聲調 6 統一改為 7
    #   - 第 1 調（陰平）、第 4 調（陰入）略去不寫
    #   - nn 保留原樣，不轉換成上標 ⁿ
    #   - xform/([14])〕/〕/
    #==============================================================================
    - xform/6〕/7〕/    # 聲調 6 改為 7
    - xform/1〕/〕/    # 第 1 調（陰平）略去不寫
    - xform/4〕/〕/    # 第 4 調（陰入）略去不寫

    #======================================================
    # 右欄：台語注音符號（TLPA 注音符號）
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/

    #======================================================
    # 声母轉換作業
    #======================================================
    # 【零聲母】轉換
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    #------------------------------------------------------
    # 音節以【鼻音韻母】開頭
    - xform/》([iu]?(ai|au|oo|[aiueo]))nn/》L$1/
    # 音節以【韻化輔音】開始（syllabic m / ng）
    - xform/》(m)(\d)/ㆬ》$2/
    - xform/》(ng)(\d)/ㆭ》$2/
    #======================================================
    - xform/》ng(?!\d)/ㄫ》/
    #------------------------------------------------------
    - xform/》jji/ㆢ》i/
    - xform/》ji/ㄐ》i/
    - xform/》chi/ㄑ》i/
    - xform/》shi/ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/》zz/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》m/ㄇ》/
    - xform/》bb/ㆠ》/
    - xform/》b/ㄅ》/
    - xform/》p/ㄆ》/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/》ng/ㄫ》/
    - xform/》gg/ㆣ》/
    - xform/》g/ㄍ》/
    - xform/》k/ㄎ》/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/》n/ㄋ》/  # 絕對不可將 n 置於 ng 之前
    - xform/》l/ㄌ》/
    - xform/》d/ㄉ》/
    - xform/》t/ㄊ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h/ㄏ》/
    #======================================================
    # 韻母轉換作業
    #======================================================
    #
    #------------------------------------------------------
    # 【鼻音韻母】使用之【識別符號】變更成【前綴識別】
    # 鼻音韻母： ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #------------------------------------------------------
    - xform/》([iu]?(ai|au|oo|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》Luaih/ㄨㆮㆷ》/
    - xform/》Liah/ㄧㆩㆷ》/
    - xform/》Liau/ㄧㆯ》/
    - xform/》Liuh/ㄧㆫㆷ》/
    - xform/》Luai/ㄨㆮ》/
    - xform/》Lah/ㆩㆷ》/
    - xform/》Lai/ㆮ》/
    - xform/》Leh/ㆥㆷ》/
    - xform/》Lia/ㄧㆩ》/
    - xform/》Lio/ㄧㆧ》/
    - xform/》Liu/ㄧㆫ》/
    - xform/》Loh/ㆧㆷ》/
    - xform/》Loo/ㆧ》/
    - xform/》Lua/ㄨㆩ》/
    - xform/》Lui/ㄨㆪ》/
    - xform/》La/ㆩ》/
    - xform/》Le/ㆥ》/
    - xform/》Li/ㆪ》/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㆷ》/
    - xform/》iong/ㄧㆲ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㆷ》/
    - xform/》uih/ㄨㄧㆷ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㆷ》/
    - xform/》auh/ㄠㆷ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㆷ》/
    - xform/》iam/ㄧㆰ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㆴ》/
    - xform/》iat/ㄧㄚㆵ》/
    - xform/》iak/ㄧㄚㆻ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》iek/ㄧㆤㆻ》/
    - xform/》ioh/ㄧㄜㆷ》/
    - xform/》iook/ㄧㆦㆻ》/
    - xform/》ooh/ㆦㆷ》/
    - xform/》ong/ㆲ》/
    - xform/》uah/ㄨㄚㆷ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㆵ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㆤㆷ》/
    - xform/》ngh/ㆭㆷ》/
    - xform/》ah/ㄚㆷ》/
    - xform/》am/ㆰ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㆴ》/
    - xform/》at/ㄚㆵ》/
    - xform/》ak/ㄚㆻ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㆤㆷ》/
    - xform/》ih/ㄧㆷ》/
    - xform/》im/ㄧㆬ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/一ㆴ》/
    - xform/》it/ㄧㆵ》/
    # - xform/》ik/ㄧㆻ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》oo/ㆦ》/
    - xform/》or/ㄜ》/
    - xform/》oh/ㄜㆷ》/
    - xform/》oom/ㆱ》/
    - xform/》op/ㆦㆴ》/
    - xform/》ok/ㆦㆻ》/
    - xform/》uh/ㄨㆷ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㆵ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㆤ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㆬㆷ》/
    - xform/》ng/ㆭ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㆤ》/
    - xform/》i/ㄧ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㆬ》/
    #======================================================
    # 【聲調】
    #======================================================
    # 台語音標的【注音符號】，其【調號】值，使用【上標數值】格式顯示
    - xform/》1//    # 1
    - xform/》6/˫/   # 6
    - xform/》7/˫/   # 7
    - xform/》3/˪/   # 3
    - xform/》2/ˋ/  # 2
    - xform/》5/ˊ/  # 5
    - xform/》4//    # 4
    - xform/》8/˙/   # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
