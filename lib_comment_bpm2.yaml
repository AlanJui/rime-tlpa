# 【候選清單】程式舘：台語注音二式（BPM2）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bpm2.yaml
# version: "v0.0.0.3"

hau_suan_tuann:
    #==============================================================================
    # 定義【候選字清單】
    # 左欄：台語注音二式（BPM2）；右欄：方音符號（TFS）
    #==============================================================================
  __append:
    #==========================================================================
    # 格式校調
    #==========================================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    #==========================================================================
    # 為【侯選清單】之【漢字標音】拆解【音節】=【聲母】+【韻母】+【聲調】
    #--------------------------------------------------------------------------
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    - xform/\b(n([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d))\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/

    #==========================================================================
    # 【注音系統】声母轉換作業
    #==========================================================================
    # 拆解【聲母】+【韻母】+【聲調】
    # - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/
    #------------------------------------------------------
    # 舌齒音
    - xform/【》jji/【ㆢ》i/
    - xform/【》ji/【ㄐ》i/
    - xform/【》chi/【ㄑ》i/
    - xform/【》shi/【ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/【》zz/【ㆡ》/
    - xform/【》z/【ㄗ》/
    - xform/【》c/【ㄘ》/
    - xform/【》s/【ㄙ》/
    #------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/【》m/【ㄇ》/
    - xform/【》bb/【ㆠ》/
    - xform/【》b/【ㄅ》/
    - xform/【》p/【ㄆ》/
    #------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/【》ng(?!\d)/【ㄫ》/
    - xform/【》gg/【ㆣ》/
    - xform/【》g/【ㄍ》/
    - xform/【》k/【ㄎ》/
    #------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/【》n/【ㄋ》/  # 絕對不可將 n 置於 ng 之前
    - xform/【》l/【ㄌ》/
    - xform/【》d/【ㄉ》/
    - xform/【》t/【ㄊ》/
    #------------------------------------------------------
    # 喉音
    - xform/【》h/【ㄏ》/
    #--------------------------------------------------------------------------
    # 零聲母特別處理
    #--------------------------------------------------------------------------
    # 音節以【韻化輔音】開始
    - xform/【》Øm(\d)$/【ㆬ》$1/
    - xform/【》Øng(\d)$/【ㆭ》$1/
    #------------------------------------------------------
    # 消除【零聲母】
    - xform/【》Ø/【Ø》/

    #==========================================================================
    # 【注音系統】韻母轉換作業
    #==========================================================================
    - xform/》([iu]?(?:ai|au|oo|[aiueo]))nn/》L$1/
    - xform/》([iu]?(?:ai|au|oo|[aiueo]))/》$1/
    #------------------------------------------------------
    - xform/》Luaih/ㄨㆮㆷ》/
    - xform/》Liah/ㄧㆩㆷ》/
    - xform/》Liau/ㄧㆯ》/
    - xform/》Liuh/ㄧㆫㆷ》/
    - xform/》Luai/ㄨㆮ》/
    - xform/》Lah/ㆩㆷ》/
    - xform/》Lai/ㆮ》/
    - xform/》Leh/ㆥㆷ》/
    - xform/》Lia/ㄧㆩ》/
    - xform/》Lio/ㄧㆧ》/
    - xform/》Liu/ㄧㆫ》/
    - xform/》Loh/ㆧㆷ》/
    - xform/》Loo/ㆧ》/
    - xform/》Lua/ㄨㆩ》/
    - xform/》Lui/ㄨㆪ》/
    - xform/》La/ㆩ》/
    - xform/》Le/ㆥ》/
    - xform/》Li/ㆪ》/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㆷ》/
    - xform/》iong/ㄧㆲ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㆷ》/
    - xform/》uih/ㄨㄧㆷ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㆷ》/
    - xform/》auh/ㄠㆷ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㆷ》/
    - xform/》iam/ㄧㆰ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㆴ》/
    - xform/》iat/ㄧㄚㆵ》/
    - xform/》iak/ㄧㄚㆻ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》iek/ㄧㆤㆻ》/
    - xform/》ioh/ㄧㄜㆷ》/
    - xform/》iook/ㄧㆦㆻ》/
    - xform/》ooh/ㆦㆷ》/
    - xform/》ong/ㆲ》/
    - xform/》uah/ㄨㄚㆷ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㆵ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㆤㆷ》/
    - xform/》ngh/ㆭㆷ》/
    - xform/》ah/ㄚㆷ》/
    - xform/》am/ㆰ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㆴ》/
    - xform/》at/ㄚㆵ》/
    - xform/》ak/ㄚㆻ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㆤㆷ》/
    - xform/》ih/ㄧㆷ》/
    - xform/》im/ㄧㆬ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/一ㆴ》/
    - xform/》it/ㄧㆵ》/
    # - xform/》ik/ㄧㆻ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》oo/ㆦ》/
    - xform/》or/ㄜ》/
    - xform/》oh/ㄜㆷ》/
    - xform/》oom/ㆱ》/
    - xform/》op/ㆦㆴ》/
    - xform/》ok/ㆦㆻ》/
    - xform/》uh/ㄨㆷ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㆵ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㆤ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㆬㆷ》/
    - xform/》ng/ㆭ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㆤ》/
    - xform/》i/ㄧ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㆬ》/
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
    #==========================================================================
    # 【注音系統】聲調轉換作業
    #==========================================================================
    - xform/》1//    # 1
    - xform/》6/˫/   # 6
    - xform/》7/˫/   # 7
    - xform/》3/˪/   # 3
    - xform/》2/ˋ/  # 2
    - xform/》5/ˊ/  # 5
    - xform/》4//    # 4
    - xform/》8/˙/   # 8
    #==========================================================================
    # 終結校調
    #==========================================================================
    # 消除【零聲母】
    - xform/【Ø/【/


    #==========================================================================
    # 拼音系統轉換：台語注音二式（BPM2）轉換成台語注音二式（BPM2）
    #==========================================================================

    #--------------------------------------------------------------------------
    # 聲母轉換
    #--------------------------------------------------------------------------
    - xform/〔〉Ø/〔Ø〉/
    # # 齒音/舌齒音（多字母先處理）
    # - xform/》jji/j》i/   # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    # - xform/》ji/z》i/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    # - xform/》chi/c》i/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    # - xform/》shi/s》i/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    # - xform/》zz/j》/     # zz(ㆡ) → j（濁音）
    # - xform/》z/z》/      # z(ㄗ) → z
    # - xform/》c/c》/      # c(ㄘ) → c
    # - xform/》s/s》/      # s(ㄙ) → s
    # # 舌根音/鼻音（濁音）
    # - xform/》ng/ng》/    # ng(ㄫ) → ng
    # # 舌根音
    # - xform/》gg/g》/     # gg(ㆣ) → g（濁音）
    # - xform/》g/k》/      # g(ㄍ) → k
    # - xform/》k/kh》/     # k(ㄎ) → kh
    # # 唇音
    # - xform/》bb/b》/     # bb(ㆠ) → b（濁音）
    # - xform/》b/p》/      # b(ㄅ) → p
    # - xform/》p/ph》/     # p(ㄆ) → ph
    # - xform/》m/m》/      # m(ㄇ) → m
    # # 舌尖音
    # - xform/》d/t》/      # d(ㄉ) → t
    # - xform/》t/th》/     # t(ㄊ) → th
    # - xform/》n/n》/      # n(ㄋ) → n
    # - xform/》l/l》/      # l(ㄌ) → l
    # # 聲門音
    # - xform/》h/h》/      # h(ㄏ) → h

    #--------------------------------------------------------------------------
    # 韻母轉換
    #--------------------------------------------------------------------------
    # - xform/》ik/iek》/   #
    # - xform/》or/o》/     # or(ㄜ) → o
    # - xform/》oo/oo》/    # oo(ㆦ) → oo
    # - xform/》oom/om》/   # oom(ㆱ) → om
    # - xform/》oonn/onn》/ # oonn(ㆧ) → onn
    # - xform/》ong/ong》/  # ong(ㆲ) → ong

    #--------------------------------------------------------------------------
    # 聲調轉換
    #--------------------------------------------------------------------------
    # 台語注音二式（BPM2）直接顯示字典原碼（BPM2 拼音 + 數字調號）
    # 規則：
    #   - 聲調 6 統一改為 7
    #   - 第 1 調（陰平）、第 4 調（陰入）略去不寫
    #   - nn 保留原樣，不轉換成上標 ⁿ
    #   - xform/([14])〕/〕/
    #--------------------------------------------------------------------------
    - xform/6〕/7〕/    # 聲調 6 改為 7
    - xform/1〕/〕/    # 第 1 調（陰平）略去不寫
    - xform/4〕/〕/    # 第 4 調（陰入）略去不寫

    # --------------------------------------------------------------------------
    # 收尾校調
    # --------------------------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    - xform/〔Ø/〔/
    # 消除【指標符號】
    # - xform/〔〉/〔/
    - xform/〉//