# 【候選清單】程式舘：台羅拼音（TL）
# lib_comment_tl.yaml
# version: "v0.2.0"

hau_suan_tuann:
    #==============================================================================
    # 定義【候選字清單】
    # 左欄：台羅拼音（TL）；右欄：方音符號（TFS）
    #==============================================================================
  __append:
    #==========================================================================
    # 格式校調
    #==========================================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    #==========================================================================
    # 為【侯選清單】之【漢字標音】拆解【音節】=【聲母】+【韻母】+【聲調】
    #--------------------------------------------------------------------------
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    - xform/\b(n([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d))\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/

    #==========================================================================
    # 【注音系統】声母轉換作業
    #==========================================================================
    # 舌齒音
    - derive/【》ji/【ㆢ》i/
    - derive/【》zi/【ㄐ》i/
    - derive/【》ci/【ㄑ》i/
    - derive/【》si/【ㄒ》i/
    # 舌齒音（齒齦顎音）
    - xform/【》j/【ㆡ》/
    - xform/【》ts(?!h)/【ㄗ》/
    - xform/【》tsh/【ㄘ》/
    - xform/【》s/【ㄙ》/
    #------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/【》ph/【ㄆ》/
    - xform/【》p(?!h)(?!\d)/【ㄅ》/
    - xform/【》m(?!\d)/【ㄇ》/ # m 不僅為聲母，亦為韻化聲母
    - xform/【》b/【ㆠ》/
    #------------------------------------------------------
    # 舌根音
    - xform/【》kh/【ㄎ》/
    - xform/【》k(?!h)(?!\d)/【ㄍ》/
    - xform/【》ng(?!\d)/【ㄫ》/
    - xform/【》g/【ㆣ》/
    #------------------------------------------------------
    # 舌尖音
    - xform/【》th/【ㄊ》/
    - xform/【》t(?!h)(?!\d)/【ㄉ》/
    - xform/【》n(?!g)(?!\d)/【ㄋ》/
    - xform/【》l/【ㄌ》/
    #------------------------------------------------------
    # 喉音
    - xform/【》h(?!\d)/【ㄏ》/   # h 不僅為聲母，亦為入聲韻尾

    #--------------------------------------------------------------------------
    # 零聲母特別處理
    #--------------------------------------------------------------------------
    # 音節以【韻化輔音】開始
    - xform/【》Øm(\d)$/【ㆬ》$1/
    - xform/【》Øng(\d)$/【ㆭ》$1/
    #------------------------------------------------------
    # 消除【零聲母】
    - xform/【》Ø/【Ø》/

    #==========================================================================
    # 【注音系統】韻母轉換作業
    #==========================================================================
    - xform/》([iu]?(?:ai|au|oo|[aiueo]))nn/》L$1/
    - xform/》([iu]?(?:ai|au|oo|[aiueo]))/》$1/
    #------------------------------------------------------
    # i
    #------------------------------------------------------
    # 姜 iang / 堅 ian / 兼 iam
    - xform/》iang/ㄧㄤ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》ia([kt])/ㄧㄚ》$1/
    - xform/》ia(m|p)/ㄧㄚ》$1/
    # 經 ing / 巾 in / 金 im
    - xform/》i(ng|k)/ㄧ》$1/
    - xform/》i(n|t)/ㄧ》$1/
    - xform/》i(m|p)/ㄧ》$1/
    # 嘄 Niau / 嬌 iau
    - xform/》(L?)(iau)/$1ㄧㄠ》/
    # 驚 Nia / 迦 ia
    - xform/》(L?)(ia)/$1ㄧㄚ》/
    # 恭 iong
    - xform/》io(ng|k)/ㄧㆦ》$1/
    # 薑 Nio / 茄 io
    # - xform/》(iə)/ㄧㄜ》/
    # - xform/》(L)(iə)/$1ㄧㆦ》/
    - xform/》(io)/ㄧㄜ》/
    - xform/》(L)(io)/$1ㄧㆦ》/
    # 牛 Niu / 丩 iu
    - xform/》(L?)(iu)/$1ㄧㄨ》/
    # 泉腔
    # - xform/》ir/ㄦ》/	    # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    - xform/》ir/ㆨ》/ # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    # 梔 Ni / 居 i
    - xform/》(L?)(i)/$1ㄧ》/
    #------------------------------------------------------
    # u
    #------------------------------------------------------
    # 閂 Nuai / 乖 uai
    - xform/》(L?)(uai)/$1ㄨㄞ》/
    # 光 uang / 觀 uan
    - xform/》uang/ㄨㄤ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》ua([kt])/ㄨㄚ》$1/
    # 官 Nua / 瓜 ua
    - xform/》(L?)(ua)/$1ㄨㄚ》/
    # 褌 Nui / 規 ui
    - xform/》(L?)(ui)/$1ㄨㄧ》/
    # 糜 Nue / 檜 ue
    - xform/》(L?)(ue)/$1ㄨㆤ》/
    # 君 un
    - xform/》u(n|t)/ㄨ》$1/
    # 方音
    - xform/》ur/ㄨ》/
    # 艍 u
    - xform/》u/ㄨ》/
    #------------------------------------------------------
    # a
    #------------------------------------------------------
    # 江 ang / 干 an / 甘 am
    - xform/》ang/ㄤ》/
    - xform/》an/ㄢ》/
    - xform/》a([kt])/ㄚ》$1/
    - xform/》a(m|p)/ㄚ》$1/
    # 閒 Nai / 皆 ai
    - xform/》(L?)(ai)/$1ㄞ》/
    # 爻 Nau / 交 au
    - xform/》(L?)(au)/$1ㄠ》/
    # 監 Na / 膠 a
    - xform/》(L?)(a)/$1ㄚ》/
    #------------------------------------------------------
    # e
    #------------------------------------------------------
    # 泉腔: erng, erk, eru, ere, ern er
    - xform/》er(ng|k)/ㄧ》$1/ # 等 [terng2], 德 [terk4]
    - xform/》er(n|t)/ㄧ》$1/ # 【恩】：ern1
    - xform/》ere/ㄨㆤ》/ # 火【鷄】:kere1
    - xform/》er/ㄜ》/ # 【火】鷄: her2
    # 稽 ei / 嘉 ee
    - xform/》ei/ㆤ》/
    - xform/》ee/ㆤ》/
    # 更 Ne / 伽 e
    - xform/》(L?)(e)/$1ㆤ》/
    #------------------------------------------------------
    # oo
    #------------------------------------------------------
    # 公 ong / 箴 om
    - xform/》o(ng|k)/ㆦ》$1/
    - xform/》o(m|p)/ㆦ》$1/
    # 姑 Noo / 沽 oo
    - xform/》oo/ㆦ》/
    - xform/》(L)(o)/$1ㆦ》/
    #------------------------------------------------------
    # o
    #------------------------------------------------------
    # 扛 No / 高 o
    # - xform/》(L?)(o)/$1ㄜ》/ # 扛 No
    - xform/》o/ㄜ》/ # 高 o
    #======================================================
    # 校調【鼻化韻母】輸出格式：
    # （1）無【鼻化韻母前綴符號】，如：【方音符號】
    #    【方音符號】： Nia = Lia = ㄥㄧㄚ = ㆪㄚ = ㄧㆩ
    # （2）有【鼻化韻母前綴符號】，如：【閩拼方案】、【台語音標注音】
    #    【閩拼方案】： Nia = Lia = ㄥㄧㄚ
    #    【台語音標】： Nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    #
    # Liau, Lia, LiO, Liu
    # Luai, Lua, Lui, Lue
    # Li, Lu, La, LO, Le, Lai, Lau
    #======================================================
    #
    #------------------------------------------------------
    # （1）無【鼻化韻母前綴符號】之【方音符號】
    # 【台語音標】用【注音符號】：iann = Lia = ⁰ㄧㄚ = ㄧㆩ
    #------------------------------------------------------
    # 介音 i 開頭之鼻韻母
    - xform/Lㄧㄠ/ㄧㆯ/ # Liau = iaunn
    - xform/Lㄧㄚ/ㄧㆩ/ # Lia = iann
    - xform/Lㄧㆦ/ㄧㆧ/ # LiO = iOnn
    - xform/Lㄧㄨ/ㄧㆫ/ # Liu = iunn
    # 介音 u 開頭之鼻韻母
    - xform/Lㄨㄞ/ㄨㆮ/ # Luai = uainn
    - xform/Lㄨㄚ/ㄨㆩ/ # Lua = uann
    - xform/Lㄨㄧ/ㄨㆪ/ # Lui = uinn
    - xform/Lㄨㆤ/ㄨㆥ/ # Lue = uenn
    # 元音/複合鼻韻母
    - xform/Lㄧ/ㆪ/ # Li = inn
    - xform/Lㄨ/ㆫ/ # Lu = unn
    - xform/Lㄚ/ㆩ/ # La = ann
    - xform/Lㆦ/ㆧ/ # LO = Onn
    - xform/Lㆤ/ㆥ/ # Le = enn
    - xform/Lㄞ/ㆮ/ # Lai = ainn
    - xform/Lㄠ/ㆯ/ # Lau = aunn
    #------------------------------------------------------
    # 鼻音韻尾
    # 陽聲韻： 姆[m-] / 鋼[ng-] / n
    #------------------------------------------------------
    - xform/》m/ㆬ》/
    - xform/》ng/ㆭ》/
    - xform/》n/ㄣ》/
    #------------------------------------------------------
    # 入聲韻 p t k h
    #------------------------------------------------------
    - xform/》p([480])/ㆴ》$1/
    - xform/》t([480])/ㆵ》$1/
    - xform/》k([480])/ㆻ》$1/
    - xform/》h([480])/ㆷ》$1/
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㆡ((ㄥ)?(ㄧ|ㆪ))/ㆢ$1/
    - xform/ㄗ((ㄥ)?(ㄧ|ㆪ))/ㄐ$1/
    - xform/ㄘ((ㄥ)?(ㄧ|ㆪ))/ㄑ$1/
    - xform/ㄙ((ㄥ)?(ㄧ|ㆪ))/ㄒ$1/
    # 國/台語注音符號複合韻母校調
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    # 方音符號複合韻母校調
    # 陽聲韻尾校調  ㆬ、ㄣ、ㆭ
    - xform/ㄧㆭ/ㄧㄥ/
    - xform/ㄚㆬ/ㆰ/
    - xform/ㄚㆭ/ㄤ/
    - xform/ㆦㆬ/ㆱ/
    - xform/ㆦㆭ/ㆲ/

    #==========================================================================
    # 【注音系統】聲調轉換作業
    #==========================================================================
    # - xform/》1/ˉ/        # 1 ¹ ˉ   陰平
    # - xform/》6/˫/ # 7 ⁷ ˫   陽去
    - xform/》1//   # 1 ¹ ˉ   陰平
    - xform/》2/ˋ/ # 2 ² ˋ   上声：不分陰上或陽上
    - xform/》3/˪/  # 3 ³ ˪   陰去
    - xform/》4//   # 1 ¹ ˉ   陰入
    - xform/》5/ˊ/ # 5 ⁵ ˊ   陽平
    - xform/》7/˫/  # 4 ⁴     陰入
    - xform/》8/˙/ # 8 ⁸ ˙   陽入
    - xform/》0/˙/ # 0 ⁰ ˙   入声

    #==========================================================================
    # 終結校調
    #==========================================================================
    # 消除【零聲母】
    - xform/【Ø/【/


    #==========================================================================
    # 拼音系統轉換：台羅拼音（TL）轉換成台語音標（TLPA）
    #==========================================================================

    #--------------------------------------------------------------------------
    # 聲母轉換
    #--------------------------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/〔〉j/〔j〉/
    - xform/〔〉ts(?!h)/〔ts〉/
    - xform/〔〉tsh/〔tsh〉/
    - xform/〔〉s/〔s〉/
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/〔〉m(?!\d)/〔m〉/    # 韻化輔音
    - xform/〔〉b/〔b〉/
    - xform/〔〉p(?!h)/〔p〉/
    - xform/〔〉ph/〔ph〉/
    # 舌根音（軟顎音）
    - xform/〔〉ng(?!\d)/〔ng〉/    # 韻化輔音
    - xform/〔〉g/〔g〉/
    - xform/〔〉k(?!h)/〔k〉/
    - xform/〔〉kh/〔kh〉/
    # 舌尖音（齒齦音）
    - xform/〔〉n(?!g)/〔n〉/
    - xform/〔〉l/〔l〉/
    - xform/〔〉t(?!h)/〔t〉/
    - xform/〔〉th/〔th〉/
    # 喉音
    - xform/〔〉h/〔h〉/
    # --------------------------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    - xform/〔〉Ø/〔Ø〉/

    #--------------------------------------------------------------------------
    # 韻母轉換
    #--------------------------------------------------------------------------
    - xform/〉iek/ik/
    - xform/〉ur/u/
    - xform/〉ee/e/
    - xform/〉ou/oo/
    #------------------------------------------------------
    # 【元音韻母】 oo [ɔ] = o͘ = ㆦ
    # - xform/〉o([1732548])nn/o͘${1}ⁿ/
    # - xform/〉oo([1732548])/o͘${1}/

    #===========================================================================
    # 定義【調符】對映規則
    #===========================================================================
    # 鼻化韻母上調符
    - xform/〉([iu]?(?:ai|ao|oo|[aiueo]))nn/〉L$1/
    # --------------------------------------------------------------------------
    - xform/〉Liau(\d)/ia${1}uⁿ/
    - xform/〉Luai(\d)/ua${1}iⁿ/
    - xform/〉Lai(\d)/a${1}iⁿ/
    - xform/〉Lau(\d)/a${1}uⁿ/
    - xform/〉Lia(\d)/ia${1}ⁿ/
    - xform/〉Lio(\d)/io${1}ⁿ/
    - xform/〉Liu(\d)/iu${1}ⁿ/
    - xform/〉Lua(\d)/ua${1}ⁿ/
    - xform/〉Lui(\d)/ui${1}ⁿ/
    - xform/〉L([aiue])(\d)/${1}${2}ⁿ/
    # --------------------------------------------------------------------------
    # 一般韻母上調符
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1732548])/$1$3$2/
    # --------------------------------------------------------------------------
    # ---- 白話字 oo = o͘ ----
    # - xform/o͘1/o͘/
    # - xform/o͘2/ó͘/
    # - xform/o͘3/ò͘/
    # - xform/o͘4/o͘/
    # - xform/o͘5/ǒ͘/
    # - xform/o͘6/ó͘/
    # - xform/o͘7/ō͘/
    # - xform/o͘8/o̍͘/
    # - xform/》o͘9/ő͘/
    #------------------------------------------------------
    - xform/oo1/oo/
    - xform/oo2/óo/
    - xform/oo3/òo/
    - xform/oo4/oo/
    - xform/oo5/ôo/
    - xform/oo7/ōo/
    - xform/oo8/o̍o/
    #------------------------------------------------------
    # [1] 陰平調（高音調）
    - xform/a1/a/
    - xform/i1/i/
    - xform/u1/u/
    - xform/e1/e/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    # [2] 上聲調（高降調）
    - xform/a2/á/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/e2/é/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # [3] 陰去調（低音調）_ （劃底線符號）
    - xform/a3/à/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/e3/è/
    - xform/o3/ò/
    - xform/ng3/ǹg/
    # [4] 陰入調（低促調）[
    - xform/a4/a/
    - xform/i4/i/
    - xform/u4/u/
    - xform/e4/e/
    - xform/o4/o/
    - xform/mh4/mh/
    - xform/ngh4/ngh/
    # [5] 陽平調（低升調）/
    - xform/a5/â/
    - xform/i5/î/
    - xform/u5/û/
    - xform/e5/ê/
    - xform/o5/ô/
    - xform/m5/m̂/
    - xform/ng5/n̂g/
    # [6] 陽上調
    # - xform/a6/ǎ/
    # - xform/e6/ě/
    # - xform/i6/ǐ/
    # - xform/u6/ǔ/
    # - xform/o6/ǒ/
    # - xform/ng6/ňg/
    # [7] 陽去調（中音調）-
    - xform/a7/ā/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/e7/ē/
    - xform/o7/ō/
    - xform/m7/m̄/
    - xform/ng7/n̄g/
    # [8] 陽入調（高促調）]
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    - xform/mh8/m̍h/
    - xform/ngh8/n̍gh/

    # --------------------------------------------------------------------------
    # 收尾校調
    # --------------------------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    - xform/〔Ø/〔/
    # 消除【指標符號】
    # - xform/〔〉/〔/
    - xform/〉//
