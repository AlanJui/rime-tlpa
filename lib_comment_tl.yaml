# 【候選清單】程式舘：台羅拼音（TLPA）
# lib_comment_tl.yaml
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    # comment_format 直接處理字典原碼（台羅拼音 + 數字調號 1-8），無需 xlit
    # ---- 0. 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔$1〕【$1】/
    # ---- 1. 聲調正規化 ----
    - xform/〔([^〕]*)6([^〕]*)〕/〔${1}7${2}〕/
    # ---- 2. 聲母 ----
    # - xform/〔([^〕]*)tsh([^〕]*)〕/〔${1}chh${2}〕/
    # - xform/〔([^〕]*)ts(?!h)([^〕]*)〕/〔${1}ch${2}〕/
    # ---- 3. 韻母 ing/ik → eng/ek（須在移位前） ----
    # - xform/〔([^〕]*)i(ng|k)([^〕]*)〕/〔${1}e${2}${3}〕/
    # ---- 4. oo 韻母：整體加入調號標記，避免被移位拆開 ----
    # - xform/〔([^〕]*)oo([12345678])([^〕]*)〕/〔${1}o͘${2}${3}〕/
    - xform/〔([^〕]*)oo([12345678])([^〕]*)〕/〔${1}o${2}o${3}〕/
    # ---- 5. 調符移位 ----
    # 含有 a, o, e, O, ə 的母音，調號標在上
    - xform/〔([^〕]*?)([aoeOə])([^〕]*?)([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    # 只有 i, u 的複合母音（iu, ui 等），調號標於後側
    - xform/〔([^〕]*?)([iu])([iu])([^〕]*?)([12345678])([^〕]*)〕/〔${1}${2}${3}${5}${4}${6}〕/
    # 單母音（如 i, u, m, ng 等），調號標在上
    - xform/〔([^〕]*?)([aeiouOəmng])([^〕]*?)([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    # 預防其他未盡情況
    - xform/〔([^〕]*?)([aeiou])(r?m?n*h?g?p?t?k?)([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    - xform/〔([^〕]*?)([ae])([iueo])([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    # ---- 6. oo (o͘) 調符代換 ----
    # - xform/〔([^〕]*)o͘1([^〕]*)〕/〔${1}o͘${2}〕/
    # - xform/〔([^〕]*)o͘2([^〕]*)〕/〔${1}ó͘${2}〕/
    # - xform/〔([^〕]*)o͘3([^〕]*)〕/〔${1}ò͘${2}〕/
    # - xform/〔([^〕]*)o͘4([^〕]*)〕/〔${1}o͘${2}〕/
    # - xform/〔([^〕]*)o͘5([^〕]*)〕/〔${1}ô͘${2}〕/
    # - xform/〔([^〕]*)o͘7([^〕]*)〕/〔${1}ō͘${2}〕/
    # - xform/〔([^〕]*)o͘8([^〕]*)〕/〔${1}o̍͘${2}〕/
    # ---- 7. 一般調符代換 ----
    - xform/〔([^〕]*)a1([^〕]*)〕/〔${1}a${2}〕/
    - xform/〔([^〕]*)e1([^〕]*)〕/〔${1}e${2}〕/
    - xform/〔([^〕]*)i1([^〕]*)〕/〔${1}i${2}〕/
    - xform/〔([^〕]*)u1([^〕]*)〕/〔${1}u${2}〕/
    - xform/〔([^〕]*)o1([^〕]*)〕/〔${1}o${2}〕/
    - xform/〔([^〕]*)m1([^〕]*)〕/〔${1}m${2}〕/
    - xform/〔([^〕]*)ng1([^〕]*)〕/〔${1}ng${2}〕/
    - xform/〔([^〕]*)a2([^〕]*)〕/〔${1}á${2}〕/
    - xform/〔([^〕]*)e2([^〕]*)〕/〔${1}é${2}〕/
    - xform/〔([^〕]*)i2([^〕]*)〕/〔${1}í${2}〕/
    - xform/〔([^〕]*)u2([^〕]*)〕/〔${1}ú${2}〕/
    - xform/〔([^〕]*)o2([^〕]*)〕/〔${1}ó${2}〕/
    - xform/〔([^〕]*)a3([^〕]*)〕/〔${1}à${2}〕/
    - xform/〔([^〕]*)e3([^〕]*)〕/〔${1}è${2}〕/
    - xform/〔([^〕]*)i3([^〕]*)〕/〔${1}ì${2}〕/
    - xform/〔([^〕]*)u3([^〕]*)〕/〔${1}ù${2}〕/
    - xform/〔([^〕]*)o3([^〕]*)〕/〔${1}ò${2}〕/
    - xform/〔([^〕]*)a4([^〕]*)〕/〔${1}a${2}〕/
    - xform/〔([^〕]*)e4([^〕]*)〕/〔${1}e${2}〕/
    - xform/〔([^〕]*)i4([^〕]*)〕/〔${1}i${2}〕/
    - xform/〔([^〕]*)u4([^〕]*)〕/〔${1}u${2}〕/
    - xform/〔([^〕]*)o4([^〕]*)〕/〔${1}o${2}〕/
    - xform/〔([^〕]*)a5([^〕]*)〕/〔${1}â${2}〕/
    - xform/〔([^〕]*)e5([^〕]*)〕/〔${1}ê${2}〕/
    - xform/〔([^〕]*)i5([^〕]*)〕/〔${1}î${2}〕/
    - xform/〔([^〕]*)u5([^〕]*)〕/〔${1}û${2}〕/
    - xform/〔([^〕]*)o5([^〕]*)〕/〔${1}ô${2}〕/
    - xform/〔([^〕]*)a7([^〕]*)〕/〔${1}ā${2}〕/
    - xform/〔([^〕]*)e7([^〕]*)〕/〔${1}ē${2}〕/
    - xform/〔([^〕]*)i7([^〕]*)〕/〔${1}ī${2}〕/
    - xform/〔([^〕]*)u7([^〕]*)〕/〔${1}ū${2}〕/
    - xform/〔([^〕]*)o7([^〕]*)〕/〔${1}ō${2}〕/
    - xform/〔([^〕]*)a8([^〕]*)〕/〔${1}a̍${2}〕/
    - xform/〔([^〕]*)e8([^〕]*)〕/〔${1}e̍${2}〕/
    - xform/〔([^〕]*)i8([^〕]*)〕/〔${1}i̍${2}〕/
    - xform/〔([^〕]*)u8([^〕]*)〕/〔${1}u̍${2}〕/
    - xform/〔([^〕]*)o8([^〕]*)〕/〔${1}o̍${2}〕/
    # ---- 8. 後處理 ----
    # - xform/〔([^〕]*)nn([^〕]*)〕/〔${1}ⁿ${2}〕/
    # - xform/〔([^〕]*)ua([^〕]*)〕/〔${1}oa${2}〕/
    # - xform/〔([^〕]*)ue([^〕]*)〕/〔${1}oe${2}〕/
