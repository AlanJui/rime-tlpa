# 【候選清單】程式舘：閩拼方案（BP）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bp.yaml
# version: "v0.1.0.3"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    - xform/^(.*)$/〔@$1〕【》$1】/

    # ---- 1. 聲母：BPM2 → BP ----
    - xform/〔@jji/〔j@i/   # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/〔@ji/〔z@i/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/〔@chi/〔c@i/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/〔@shi/〔s@i/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    # ------------------------------------------------------------------------
    - xform/〔@zz/〔j@/     # zz(ㆡ) → j（濁音）
    - xform/〔@z/〔z@/      # z(ㄗ) → z
    - xform/〔@c/〔c@/      # c(ㄘ) → c
    - xform/〔@s/〔s@/      # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/〔@ng/〔ggn@/
    # 舌根音   〔
    - xform/〔@gg/〔gg@/
    - xform/〔@g/〔g@/
    - xform/〔@k/〔k@/
    # 唇音
    - xform/〔@m/〔bbn@/
    - xform/〔@bb/〔bb@/
    - xform/〔@b/〔b@/
    - xform/〔@p/〔p@/
    # 舌尖音
    - xform/〔@n/〔ln@/
    - xform/〔@l/〔l@/
    - xform/〔@d/〔d@/
    - xform/〔@t/〔t@/
    # 聲門音
    - xform/〔@h/〔h@/

    # ---- 2. 韻母：TLPA → BP ----
    # 鼻化韻母：自 nn 後綴，改 n 前綴
    - xform/@onn/@noo/          # onn(ㆧ) → noo（須先於一般規則）
    - xform/@([iu]?(?:ai|ao|oo|[aiueo]))nn/@n$1/  # ann→na, inn→ni, unn→nu 等

    # ---- 3. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # i 為介音（ia, io, iu...）→ i 改成 y
    - xform/〔@iau/〔yao/
    - xform/〔@ia/〔ya/
    - xform/〔@io/〔yo/
    - xform/〔@iu/〔yu/
    # i 為主要元音（i + 調號）→ 前加 y
    # - xform/@i([;/\\_\-\[\]])/yi$1@/
    - xform/〔@i(\d)/@yi$1/
    # u 為介音（ua, ui, ue...）→ u 改成 w
    - xform/〔@ua/〔wa/
    - xform/〔@ui/〔wi/
    - xform/〔@ue/〔we/
    # u 為主要元音（u + 調號）→ 前加 w
    # - xform/@u([;/\\_\-\[\]])/wu$1@/
    - xform/〔@u(\d)/〔wu$1/

    # ---- 4. 為置放聲調符號調整 ----
    - xform/@iaunnh(\d)/ni@a${1}uh/
    - xform/@iaunn(\d)/ni@a${1}u/
    - xform/@uainn(\d)/nu@a${1}i/
    - xform/@ainn(\d)/n@a${1}inn/
    - xform/@aunn(\d)/n@a${1}onn/
    - xform/@iunn(\d)/n@i${1}unn/
    - xform/@uinn(\d)/u@i${1}nn/
    # 待確定
    - xform/@eh(\d)/n@e${1}h/
    - xform/@uann(\d)/nu@a${1}nn/
    - xform/@iann(\d)/ni@a${1}nn/
    - xform/@aenn(\d)/@a${1}enn/
    # 可能有音無字
    - xform/@ah(\d)/n@a${1}h/
    - xform/@oh(\d)/n@o${1}h/
    - xform/@ih(\d)/n@i${1}h/
    - xform/@ionn(\d)/ni@o${1}nn/

    - xform/@iong(\d)/i@o${1}ng/
    - xform/@iang(\d)/i@a${1}ng/
    - xform/@iauh(\d)/i@a${1}oh/
    - xform/@uaih(\d)/nu@a${1}ih/
    - xform/@auh(\d)/@na${1}oh/
    - xform/@iah(\d)/ni@a${1}h/
    - xform/@eeh(\d)/@e${1}eh/
    - xform/@ang(\d)/@a${1}ng/
