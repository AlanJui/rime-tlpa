    - xform/》mh(\d)/》m${1}h/
    - xform/》ng(\d)/》n${1}g/
    - xform/》oh(\d)/》o${1}h/
    - xform/》ok(\d)/》o${1}k/
    - xform/》oo(\d)/》o${1}o/
    - xform/》op(\d)/》o${1}p/
    - xform/》ua(\d)/》u${1}a/
    - xform/》ue(\d)/》u${1}e/
    - xform/》uh(\d)/》u${1}h/
    - xform/》ui(\d)/》u${1}i/
    - xform/》un(\d)/》u${1}n/
    - xform/》ut(\d)/》u${1}t/
    - xform/》om(\d)/》o${1}m/



    - xform/》eu(\d)/》e${1}u/
    - xform/》ek(\d)/》e${1}k/
    - xform/》a(\d)/》a${1}/
    - xform/》e(\d)/》e${1}/
    - xform/》i(\d)/》i${1}/
    - xform/》m(\d)/》m${1}/
    - xform/》o(\d)/》o${1}/
    - xform/》u(\d)/》u${1}/

    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform/》oo1/ōo/   # 陰平調： 閩拼 1；台羅 1
    - xform/》oo5/óo/   # 陽平調： 閩拼 2；台羅 5
    - xform/》oo2/ǒo/   # 陰上調： 閩拼 3；台羅 2
    - xform/》oo6/ǒo/   # 陽上調： 閩拼 4；台羅 6
    - xform/》oo3/òo/   # 陰去調： 閩拼 5；台羅 3
    - xform/》oo7/ôo/   # 陽去調： 閩拼 6；台羅 7
    - xform/》oo4/ōo/   # 陰入調： 閩拼 7；台羅 4
    - xform/》oo8/óo/   # 陽入調： 閩拼 8；台羅 8

    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform/》a1/ā/
    - xform/》e1/ē/
    - xform/》i1/ī/
    - xform/》u1/ū/
    - xform/》o1/ō/
    - xform/》m1/m̄/
    - xform/》n1/n̄/
    # BP 2: á（下平/陽平，acute U+0301）
    - xform/》a5/á/
    - xform/》e5/é/
    - xform/》i5/í/
    - xform/》u5/ú/
    - xform/》o5/ó/
    - xform/》m5/ḿ/
    - xform/》n5/ń/
    # BP 3: ǎ（上聲，caron U+030C）
    - xform/》a2/ǎ/
    - xform/》e2/ě/
    - xform/》i2/ǐ/
    - xform/》u2/ǔ/
    - xform/》o2/ǒ/
    # BP 4: ǎ（上聲/陽上，同上聲，少用）
    - xform/》a6/ǎ/
    - xform/》e6/ě/
    - xform/》i6/ǐ/
    - xform/》u6/ǔ/
    - xform/》o6/ǒ/
    # BP 5: à（上去/陰去，grave U+0300）
    - xform/》a3/à/
    - xform/》e3/è/
    - xform/》i3/ì/
    - xform/》u3/ù/
    - xform/》o3/ò/
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform/》a7/â/
    - xform/》e7/ê/
    - xform/》i7/î/
    - xform/》u7/û/
    - xform/》o7/ô/
    - xform/》n7/n̂/
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform/》a4/ā/
    - xform/》e4/ē/
    - xform/》i4/ī/
    - xform/》u4/ū/
    - xform/》o4/ō/
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform/》a8/á/
    - xform/》e8/é/
    - xform/》i8/í/
    - xform/》u8/ú/
    - xform/》o8/ó/

    # ---- 7. 清除定位符號 ----
    - xform/》//
