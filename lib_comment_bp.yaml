    - xform/@ann(\d)/@a${1}nn/
    - xform/@inn(\d)/@i${1}nn/
    - xform/@uae(\d)/u@a${1}e/
    - xform/@ioo(\d)/@i${1}oo/
    - xform/@eng(\d)/@e${1}ng/
    - xform/@ee(\d)/@e${1}e/
