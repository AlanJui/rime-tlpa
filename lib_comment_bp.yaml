# 【候選清單】程式舘：閩拼方案（BP）
# lib_comment_bp.yaml
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    # ---- 0. 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔$1〕【$1】/
    # ---- 1. 聲母：TLPA → BP ----
    - xform/〔tsh([A-Za-z0-9_]*[^〕]*)〕/〔c${1}〕/
    - xform/〔ts(?!h)([A-Za-z0-9_]*[^〕]*)〕/〔z${1}〕/
    - xform/〔ng([A-Za-z0-9_]*[^〕]*)〕/〔ggn${1}〕/
    - xform/〔b([A-Za-z0-9_]*[^〕]*)〕/〔bb${1}〕/
    - xform/〔p(?!h)([A-Za-z0-9_]*[^〕]*)〕/〔b${1}〕/
    - xform/〔ph([A-Za-z0-9_]*[^〕]*)〕/〔p${1}〕/
    - xform/〔m([A-Za-z0-9_]*[^〕]*)〕/〔bbn${1}〕/
    - xform/〔t(?!h)([A-Za-z0-9_]*[^〕]*)〕/〔d${1}〕/
    - xform/〔th([A-Za-z0-9_]*[^〕]*)〕/〔t${1}〕/
    - xform/〔n([A-Za-z0-9_]*[^〕]*)〕/〔ln${1}〕/
    - xform/〔g(?!g)([A-Za-z0-9_]*[^〕]*)〕/〔gg${1}〕/
    - xform/〔k(?!h)([A-Za-z0-9_]*[^〕]*)〕/〔g${1}〕/
    - xform/〔kh([A-Za-z0-9_]*[^〕]*)〕/〔k${1}〕/
    - xform/〔j([A-Za-z0-9_]*[^〕]*)〕/〔zz${1}〕/
    # ---- 2. 韻母：TLPA → BP ----
    - xform/〔([^〕]*)ir([^〕]*)〕/〔${1}eu${2}〕/
    - xform/〔([^〕]*)au([^〕]*)〕/〔${1}ao${2}〕/
    - xform/〔([^〕]*)onn([^〕]*)〕/〔${1}noo${2}〕/
    - xform/〔([^〕]*?)([iu]?(?:ai|ao|oo|[aiueo]))nn([^〕]*?)〕/〔${1}n${2}${3}〕/
    # ---- 3. 聲調：TLPA → BP ----
    # 為了不影響【右欄】TLPA，將左欄〔〕內的調號進行轉換：
    # 使用英文字母避免數字替換時產生連鎖反應（Bug fix）
    - xform/〔([^〕]*?)2([^〕]*)〕/〔${1}_TTHREE_${2}〕/
    - xform/〔([^〕]*?)3([^〕]*)〕/〔${1}_TFIVE_${2}〕/
    - xform/〔([^〕]*?)4([^〕]*)〕/〔${1}_TSEVEN_${2}〕/
    - xform/〔([^〕]*?)5([^〕]*)〕/〔${1}_TTWO_${2}〕/
    - xform/〔([^〕]*?)6([^〕]*)〕/〔${1}_TFOUR_${2}〕/
    - xform/〔([^〕]*?)7([^〕]*)〕/〔${1}_TSIX_${2}〕/
    # 將英文字母還原為目標數字
    - xform/〔([^〕]*?)_TTHREE_([^〕]*)〕/〔${1}3${2}〕/
    - xform/〔([^〕]*?)_TFIVE_([^〕]*)〕/〔${1}5${2}〕/
    - xform/〔([^〕]*?)_TSEVEN_([^〕]*)〕/〔${1}7${2}〕/
    - xform/〔([^〕]*?)_TTWO_([^〕]*)〕/〔${1}2${2}〕/
    - xform/〔([^〕]*?)_TFOUR_([^〕]*)〕/〔${1}4${2}〕/
    - xform/〔([^〕]*?)_TSIX_([^〕]*)〕/〔${1}6${2}〕/
    # ---- 3b. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # i 為介音（ia, io, iu...）→ i 改成 y
    - xform/〔ia([A-Za-z0-9_]*[^〕]*)〕/〔ya${1}〕/
    - xform/〔io([A-Za-z0-9_]*[^〕]*)〕/〔yo${1}〕/
    - xform/〔iu([A-Za-z0-9_]*[^〕]*)〕/〔yu${1}〕/
    # i 為主要元音（i + 調號）→ 前加 y
    - xform/〔i(\d)([A-Za-z0-9_]*[^〕]*)〕/〔yi$1${1}〕/
    # u 為介音（ua, ui, ue...）→ u 改成 w
    - xform/〔ua([A-Za-z0-9_]*[^〕]*)〕/〔wa${1}〕/
    - xform/〔ui([A-Za-z0-9_]*[^〕]*)〕/〔wi${1}〕/
    - xform/〔ue([A-Za-z0-9_]*[^〕]*)〕/〔we${1}〕/
    # u 為主要元音（u + 調號）→ 前加 w
    - xform/〔u(\d)([A-Za-z0-9_]*[^〕]*)〕/〔wu$1${1}〕/
    # ---- 4. 調符移位 ----
    - xform/〔([^〕]*?)([aeiou])(r?m?n*h?g?p?t?k?)([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    - xform/〔([^〕]*?)([ae])([iueo])([12345678])([^〕]*)〕/〔${1}${2}${4}${3}${5}〕/
    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform/〔([^〕]*?)oo1([^〕]*?)〕/〔${1}ōo${2}〕/
    - xform/〔([^〕]*?)oo2([^〕]*?)〕/〔${1}óo${2}〕/
    - xform/〔([^〕]*?)oo3([^〕]*?)〕/〔${1}ǒo${2}〕/
    - xform/〔([^〕]*?)oo4([^〕]*?)〕/〔${1}ǒo${2}〕/
    - xform/〔([^〕]*?)oo5([^〕]*?)〕/〔${1}òo${2}〕/
    - xform/〔([^〕]*?)oo6([^〕]*?)〕/〔${1}ôo${2}〕/
    - xform/〔([^〕]*?)oo7([^〕]*?)〕/〔${1}ōo${2}〕/
    - xform/〔([^〕]*?)oo8([^〕]*?)〕/〔${1}óo${2}〕/
    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform/〔([^〕]*?)a1([^〕]*?)〕/〔${1}ā${2}〕/
    - xform/〔([^〕]*?)e1([^〕]*?)〕/〔${1}ē${2}〕/
    - xform/〔([^〕]*?)i1([^〕]*?)〕/〔${1}ī${2}〕/
    - xform/〔([^〕]*?)u1([^〕]*?)〕/〔${1}ū${2}〕/
    - xform/〔([^〕]*?)o1([^〕]*?)〕/〔${1}ō${2}〕/
    - xform/〔([^〕]*?)m1([^〕]*?)〕/〔${1}m̄${2}〕/
    - xform/〔([^〕]*?)ng1([^〕]*?)〕/〔${1}n̄g${2}〕/
    # BP 2: á（下平/陽平，acute U+0301）
    - xform/〔([^〕]*?)a2([^〕]*?)〕/〔${1}á${2}〕/
    - xform/〔([^〕]*?)e2([^〕]*?)〕/〔${1}é${2}〕/
    - xform/〔([^〕]*?)i2([^〕]*?)〕/〔${1}í${2}〕/
    - xform/〔([^〕]*?)u2([^〕]*?)〕/〔${1}ú${2}〕/
    - xform/〔([^〕]*?)o2([^〕]*?)〕/〔${1}ó${2}〕/
    - xform/〔([^〕]*?)m2([^〕]*?)〕/〔${1}ḿ${2}〕/
    - xform/〔([^〕]*?)ng2([^〕]*?)〕/〔${1}ńg${2}〕/
    # BP 3: ǎ（上聲，caron U+030C）
    - xform/〔([^〕]*?)a3([^〕]*?)〕/〔${1}ǎ${2}〕/
    - xform/〔([^〕]*?)e3([^〕]*?)〕/〔${1}ě${2}〕/
    - xform/〔([^〕]*?)i3([^〕]*?)〕/〔${1}ǐ${2}〕/
    - xform/〔([^〕]*?)u3([^〕]*?)〕/〔${1}ǔ${2}〕/
    - xform/〔([^〕]*?)o3([^〕]*?)〕/〔${1}ǒ${2}〕/
    # BP 4: ǎ（下聲/陽上，同上聲，少用）
    - xform/〔([^〕]*?)a4([^〕]*?)〕/〔${1}ǎ${2}〕/
    - xform/〔([^〕]*?)e4([^〕]*?)〕/〔${1}ě${2}〕/
    - xform/〔([^〕]*?)i4([^〕]*?)〕/〔${1}ǐ${2}〕/
    - xform/〔([^〕]*?)u4([^〕]*?)〕/〔${1}ǔ${2}〕/
    - xform/〔([^〕]*?)o4([^〕]*?)〕/〔${1}ǒ${2}〕/
    # BP 5: à（上去/陰去，grave U+0300）
    - xform/〔([^〕]*?)a5([^〕]*?)〕/〔${1}à${2}〕/
    - xform/〔([^〕]*?)e5([^〕]*?)〕/〔${1}è${2}〕/
    - xform/〔([^〕]*?)i5([^〕]*?)〕/〔${1}ì${2}〕/
    - xform/〔([^〕]*?)u5([^〕]*?)〕/〔${1}ù${2}〕/
    - xform/〔([^〕]*?)o5([^〕]*?)〕/〔${1}ò${2}〕/
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform/〔([^〕]*?)a6([^〕]*?)〕/〔${1}â${2}〕/
    - xform/〔([^〕]*?)e6([^〕]*?)〕/〔${1}ê${2}〕/
    - xform/〔([^〕]*?)i6([^〕]*?)〕/〔${1}î${2}〕/
    - xform/〔([^〕]*?)u6([^〕]*?)〕/〔${1}û${2}〕/
    - xform/〔([^〕]*?)o6([^〕]*?)〕/〔${1}ô${2}〕/
    - xform/〔([^〕]*?)ng6([^〕]*?)〕/〔${1}n̂g${2}〕/
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform/〔([^〕]*?)a7([^〕]*?)〕/〔${1}ā${2}〕/
    - xform/〔([^〕]*?)e7([^〕]*?)〕/〔${1}ē${2}〕/
    - xform/〔([^〕]*?)i7([^〕]*?)〕/〔${1}ī${2}〕/
    - xform/〔([^〕]*?)u7([^〕]*?)〕/〔${1}ū${2}〕/
    - xform/〔([^〕]*?)o7([^〕]*?)〕/〔${1}ō${2}〕/
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform/〔([^〕]*?)a8([^〕]*?)〕/〔${1}á${2}〕/
    - xform/〔([^〕]*?)e8([^〕]*?)〕/〔${1}é${2}〕/
    - xform/〔([^〕]*?)i8([^〕]*?)〕/〔${1}í${2}〕/
    - xform/〔([^〕]*?)u8([^〕]*?)〕/〔${1}ú${2}〕/
    - xform/〔([^〕]*?)o8([^〕]*?)〕/〔${1}ó${2}〕/
    # ---- 7. 移除殘留數字調號 ----
    - xform/〔([^〕]*?)\d([^〕]*?)〕/〔${1}${2}〕/