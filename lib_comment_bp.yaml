# 【候選清單】程式舘：閩拼方案（BP）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bp.yaml
# version: "v0.1.0.10"

hau_suan_tuann:
  __append:
    #==========================================================================
    # BPM2 → BP 聲調轉換（同步替換，無衝突）
    # BPM2: 1  2  3  4  5  6  7  8
    # BP:   1  3  5  7  2  4  6  8
    #==========================================================================
    - xlit|234567|357246|
    #==========================================================================
    #  韻母：BPM2 → BP
    #==========================================================================
    # oonn → oon -> noo
    - xform/oonn/onn/
    # iook → iok; iong → iong
    # oom → om; oop → op
    - xform/oo([kmp])/o$1/
    # ior → io; or → o
    - xform/or/o/
    # iau → iao; au → ao
    - xform/au/ao/
    # iek → ik; ing → ing
    - xform/iek/ik/
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    # 【零聲母】轉換
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    #------------------------------------------------------
    # 連續漢字輸入拆解【音節】=【聲母】+【韻母】+【聲調】
    #------------------------------------------------------
    # 1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    # 2) 無聲母起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    # 3) 一般情況（有聲母）
    # 這三條都用詞界 \b 逐一命中每個 token
    # 【候選字清單】最後呈現的格式，尚需搭配： RIME 輸入法引擎的 filter
    # lua_filter@reformat_comment_filter
    #------------------------------------------------------
    - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    - xform/\b([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/
    #------------------------------------------------------
    # 格式校調
    #------------------------------------------------------
    # 兩對音節之間，以兩個空白隔開
    # - xform/】\s+〔/】〔/
    # 處理完【零聲母】後，將其識別符號 Ø 移除（不顯示在候選清單中）
    - xform/Ø//
    #======================================================
    # 右欄：改良【式方音符號】
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    # - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/
    #------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    - xform/【》Ø/【》/
    # 音節以【韻化輔音】開始
    - xform/【》(m)(\d)$/【ㆬ》$2/
    - xform/【》(ng)(\d)$/【ㆭ》$2/
    #======================================================
    - xform/【》ng(?!\d)/【ㄫ》/
    #------------------------------------------------------
    - xform/【》jji/【ㆢ》i/
    - xform/【》ji/【ㄐ》i/
    - xform/【》chi/【ㄑ》i/
    - xform/【》shi/【ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/》zz/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》m/ㄇ》/
    - xform/》bb/ㆠ》/
    - xform/》b/ㄅ》/
    - xform/》p/ㄆ》/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/》ng/ㄫ》/
    - xform/》gg/ㆣ》/
    - xform/》g/ㄍ》/
    - xform/》k/ㄎ》/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/》n/ㄋ》/
    - xform/》l/ㄌ》/
    - xform/》d/ㄉ》/
    - xform/》t/ㄊ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h/ㄏ》/
    #------------------------------------------------------
    # 韻母轉換
    #------------------------------------------------------
    # 音節以【鼻音韻母】開頭
    - xform/【》([iu]?(ai|ao|oo|[aiueo]))nn/【》n$1/
    # 音節以【韻母】開頭
    - xform/【》([iu]?(ai|ao|oo|[aiueo]))/【》$1/
    #------------------------------------------------------
    # 【鼻音韻母】使用之【識別符號】變更成【前綴識別】
    # 鼻音韻母： ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #------------------------------------------------------
    - xform/》([iu]?(ai|ao|[aiueo]))nn/》n$1/
    #------------------------------------------------------
    - xform/》nuaih(\d)/ㄨㆮㆷ》${1}/
    - xform/》niah(\d)/ㄧㆩㆷ》${1}/
    - xform/》niao(\d)/ㄧㆯ》${1}/
    - xform/》nioo(\d)/ㄧㆧ》${1}/
    - xform/》niuh(\d)/ㄧㆫㆷ》${1}/
    - xform/》niuh(\d)/ㆧㆷ》${1}/
    - xform/》nuai(\d)/ㄨㆮ》${1}/
    - xform/》nah(\d)/ㆩㆷ》${1}/
    - xform/》nai(\d)/ㆮ》${1}/
    - xform/》neh(\d)/ㆥㆷ》${1}/
    - xform/》nia(\d)/ㄧㆩ》${1}/
    - xform/》niu(\d)/ㄧㆫ》${1}/
    - xform/》na(\d)/ㆩ》${1}/
    - xform/》ne(\d)/ㆥ》${1}/
    - xform/》ni(\d)/ㆪ》${1}/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang(\d)/ㄧㄤ》${1}/
    - xform/》iaoh(\d)/ㄧㄠㆷ》${1}/
    - xform/》iong(\d)/ㄧㆲ》${1}/
    - xform/》uaih(\d)/ㄨㄞㆷ》${1}/
    - xform/》uang(\d)/ㄨㄤ》${1}/
    - xform/》aih(\d)/ㄞㆷ》${1}/
    - xform/》ang(\d)/ㄤ》${1}/
    - xform/》aoh(\d)/ㄠㆷ》${1}/
    - xform/》iah(\d)/ㄧㄚㆷ》${1}/
    - xform/》iak(\d)/ㄧㄚㆻ》${1}/
    - xform/》iam(\d)/ㄧㆰ》${1}/
    - xform/》ian(\d)/ㄧㄢ》${1}/
    - xform/》iao(\d)/ㄧㄠ》${1}/
    - xform/》iap(\d)/ㄧㄚㆴ》${1}/
    - xform/》iat(\d)/ㄧㄚㆵ》${1}/
    - xform/》ing(\d)/ㄧㄥ》${1}/
    - xform/》ioh(\d)/ㄧㄜㆷ》${1}/
    - xform/》iok(\d)/ㄧㆦㆻ》${1}/
    - xform/》ngh(\d)/ㆭㆷ》${1}/
    - xform/》noo(\d)/ㆧ》${1}/
    - xform/》nua(\d)/ㄨㆩ》${1}/
    - xform/》nui(\d)/ㄨㆪ》${1}/
    - xform/》ong(\d)/ㆲ》${1}/
    - xform/》ooh(\d)/ㆦㆷ》${1}/
    - xform/》uah(\d)/ㄨㄚㆷ》${1}/
    - xform/》uai(\d)/ㄨㄞ》${1}/
    - xform/》uan(\d)/ㄨㄢ》${1}/
    - xform/》uat(\d)/ㄨㄚㆵ》${1}/
    - xform/》ueh(\d)/ㄨㆤㆷ》${1}/
    - xform/》uih(\d)/ㄨㄧㆷ》${1}/
    - xform/》ah(\d)/ㄚㆷ》${1}/
    - xform/》ai(\d)/ㄞ》${1}/
    - xform/》ak(\d)/ㄚㆻ》${1}/
    - xform/》am(\d)/ㆰ》${1}/
    - xform/》an(\d)/ㄢ》${1}/
    - xform/》ao(\d)/ㄠ》${1}/
    - xform/》ap(\d)/ㄚㆴ》${1}/
    - xform/》at(\d)/ㄚㆵ》${1}/
    - xform/》eh(\d)/ㆤㆷ》${1}/
    - xform/》ia(\d)/ㄧㄚ》${1}/
    - xform/》ih(\d)/ㄧㆷ》${1}/
    - xform/》ik(\d)/ㄧㆻ》${1}/
    - xform/》im(\d)/ㄧㆬ》${1}/
    - xform/》in(\d)/ㄧㄣ》${1}/
    - xform/》io(\d)/ㄧㄜ》${1}/
    - xform/》ip(\d)/一ㆴ》${1}/
    - xform/》it(\d)/ㄧㆵ》${1}/
    - xform/》iu(\d)/ㄧㄨ》${1}/
    - xform/》mh(\d)/ㆬㆷ》${1}/
    - xform/》ng(\d)/ㆭ》${1}/
    - xform/》oh(\d)/ㄜㆷ》${1}/
    - xform/》ok(\d)/ㆦㆻ》${1}/
    - xform/》om(\d)/ㆱ》${1}/
    - xform/》oo(\d)/ㆦ》${1}/
    - xform/》op(\d)/ㆦㆴ》${1}/
    - xform/》ua(\d)/ㄨㄚ》${1}/
    - xform/》ue(\d)/ㄨㆤ》${1}/
    - xform/》uh(\d)/ㄨㆷ》${1}/
    - xform/》ui(\d)/ㄨㄧ》${1}/
    - xform/》un(\d)/ㄨㄣ》${1}/
    - xform/》ut(\d)/ㄨㆵ》${1}/
    - xform/》a(\d)/ㄚ》${1}/
    - xform/》e(\d)/ㆤ》${1}/
    - xform/》i(\d)/ㄧ》${1}/
    - xform/》m(\d)/ㆬ》${1}/
    - xform/》o(\d)/ㄜ》${1}/
    - xform/》u(\d)/ㄨ》${1}/
    #==========================================================================
    # 【聲調】
    #--------------------------------------------------------------------------
    # BPM2 → BP 聲調轉換：⁰ ¹ ² ³ ⁴ ⁵ ⁶ ⁷ ⁸ ⁹
    # BPM2: 1  7  3  2  5  4  8
    # BP:   1  6  5  3  2  7  8
    #==========================================================================
    # 台語注音第二式（BPM2）八調：1  2  3  4  5  6  7  8
    # - xform/》1//    # 1
    # - xform/》7/˫/   # 7
    # - xform/》3/˪/   # 3
    # - xform/》2/ˋ/  # 2
    # - xform/》5/ˊ/  # 5
    # - xform/》4//    # 4
    # - xform/》8/˙/   # 8
    # 閩拼方案（BP）八調：1  3  5  7  2  4  6  8
    - xform/》1/¹/    # 1
    - xform/》6/⁶/     # 6
    - xform/》5/⁵/    # 5
    - xform/》3/³/    # 3
    - xform/》2/²/    # 2
    - xform/》7/⁷/    # 7
    - xform/》8/⁸/    # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/

    #======================================================
    # 左欄：閩拼方案（BP）
    #======================================================

    #==========================================================================
    # 零聲母， i/u 轉 y/w 校調
    # 根據 i 或 u 之後是否還有其他母音，決定：「加上」 y/w ；或是「代換」成 y/w。
    #==========================================================================
    # 在 i 前加上 y (前加法)
    # 範例：
    #   - i → yi
    #   - in → yin / it → yit
    #   - im → yim / ip → yip
    #   - ing → ying / ik → yik
    #--------------------------------------------------------------------------
    # 將 i 代換為 y (代換法)
    # 範例：
    #   - ia → ya
    #   - iao → yao / ian → yan / iam → yam / iap → yap
    #   - iang → yang / iak → yak
    #   - iong → yong / iok → yok
    #--------------------------------------------------------------------------
    - xform/〔〉ia/〔ya/                 # ia... → ya...
    - xform/〔〉io/〔yo/                 # io... → yo...
    - xform/〔〉iu/〔yu/                 # iu... → yu...
    - xform/〔〉i(ang|ak)(\d)〕/〔y$1$2〕/     # iang1 → yang1, iak8 → yak8
    - xform/〔〉i(ong|ok)(\d)〕/〔y$1$2〕/     # iong2 → yong2, iok8 → yok8
    - xform/〔〉i(a[inp]?)(\d)〕/〔y$1$2〕/    # iao1 → yao1, ian2 → yan2, iam3 → yam3, iap4 → yap4
    - xform/〔〉i(a)(\d)〕/〔y$1$2〕/          # ia1 → ya1
    - xform/〔〉i(\d)〕/〔yi$1〕/              # i1 → yi1
    - xform/〔〉i(ng|k)(\d)〕/〔yi$1$2〕/      # ing1 → ying1, ik8 → yik8
    - xform/〔〉i(n|t)(\d)〕/〔yi$1$2〕/       # in1 → yin1, it8 → yit8
    - xform/〔〉i(m|p)(\d)〕/〔yi$1$2〕/       # im1 → yim1, ip8 → yip8
    #==========================================================================
    # 在 u 前加上 w (前加法)
    # 範例：
    #   - u → wu
    #   - un → wun / ut → wut
    #   - uh → wuh
    #--------------------------------------------------------------------------
    # 將 u 代換為 w (代換法)
    # 範例：
    #   - ue → we / ui → wi
    #   - uan → wan / uai → wai / uap → wap
    #   - uang → wang / uak → wak
    #--------------------------------------------------------------------------
    - xform/〔〉u(a)(ng|k)(\d)〕/〔w$1$2$3〕/  # uang1 → wang1, uak8 → wak8
    - xform/〔〉u(h)(\d)〕/〔wu$1$2〕/         # uh4 → wuh4
    - xform/〔〉u(n|t)(\d)〕/〔wu$1$2〕/       # un2 → wun2, ut8 → wut8
    - xform/〔〉u(a[inp]?)(\d)〕/〔w$1$2〕/    # uan2 → wan2, uai7 → wai7, uap8 → wap8
    - xform/〔〉u([ei])(\d)〕/〔w$1$2〕/       # ue3 → we3, ui7 → wi7
    - xform/〔〉u(\d)〕/〔wu$1〕/              # u3 → wu3
    #------------------------------------------------------
    #  1. 聲母：BPM2 → BP ----
    #------------------------------------------------------
    # 用 (^| ) 取代 ^ ，令每個音節聲母（含連續輸入第2個之後的音節）均可被比對
    - xform/〉jj(?i)/zz/  # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/〉j(?i)/z/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/〉ch(?i)/c/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/〉sh(?i)/s/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    #
    - xform/〉zz/zz/      # zz(ㆡ) → j（濁音）
    - xform/〉z/z/        # z(ㄗ) → z
    - xform/〉c/c/        # c(ㄘ) → c
    - xform/〉s/s/        # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/〉ng/$1ggn/
    # 舌根音
    - xform/〉gg/$1gg/
    - xform/〉g/$1g/
    - xform/〉k/$1k/
    # 唇音
    - xform/〉m/$1bbn/
    - xform/〉bb/$1bb/
    - xform/〉b/$1b/
    - xform/〉p/$1p/
    # 舌尖音
    - xform/〉n/$1ln/
    - xform/〉l/$1l/
    - xform/〉d/$1d/
    - xform/〉t/$1t/
    # 聲門音
    - xform/〉h/$1h/

    #======================================================
    # 校調下一個音節
    #======================================================
    # - xofrm/(\d)$/${1}@/  # 將調號移至下一個音節的開頭（lookahead 限下一個音節）
    # - xform/((bbn|bb|ln|ggn|gg|zz|[bpdtlgkhzcsjyw]).*)(\d)/${1}${2}〉/
    # - xform/((bbn|bb|ln|ggn|gg|zz|[bpdtlgkhzcsjyw]).*)(\d)$/${1}${2}〉/
    #--------------------------------------------------------------------------
    # 鼻化韻母：改 nn 後綴，成 n 前綴
    - xform/([iu]?(ai|ao|[aiueo]))nn/n$1/
    #======================================================
    # ---- 拼音字母上聲調符號 ----
    #======================================================
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1652378])/$1$3$2/
    - xform/([aeo])([iueo])([1652378])/$1$3$2/
    #------------------------------------------------------
    # ---- oo 韻母視作整體處理（須先於單 o 規則）----
    #------------------------------------------------------
    - xform/oo1/ōo/   # 陰平調： 閩拼 1；台羅 1
    - xform/oo2/óo/   # 陽平調： 閩拼 2；台羅 5
    - xform/oo3/ǒo/   # 陰上調： 閩拼 3；台羅 2
    - xform/oo4/ǒo/   # 陽上調： 閩拼 4；台羅 6
    - xform/oo5/òo/   # 陰去調： 閩拼 5；台羅 3
    - xform/oo6/ôo/   # 陽去調： 閩拼 6；台羅 7
    - xform/oo7/ōo/   # 陰入調： 閩拼 7；台羅 4
    - xform/oo8/óo/   # 陽入調： 閩拼 8；台羅 8
    #------------------------------------------------------
    # BP 1: ā（macron）
    - xform/a1/ā/
    - xform/e1/ē/
    - xform/i1/ī/
    - xform/u1/ū/
    - xform/o1/ō/
    - xform/m1/m̄/
    - xform/ng1/n̄g/
    # BP 2: á（acute）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # BP 3: ǎ（caron）
    - xform/a3/ǎ/
    - xform/e3/ě/
    - xform/i3/ǐ/
    - xform/u3/ǔ/
    - xform/o3/ǒ/
    # BP 4: ǎ（陽上，少用）
    - xform/a4/ǎ/
    - xform/e4/ě/
    - xform/i4/ǐ/
    - xform/u4/ǔ/
    - xform/o4/ǒ/
    # BP 5: à（grave）
    - xform/a5/à/
    - xform/e5/è/
    - xform/i5/ì/
    - xform/u5/ù/
    - xform/o5/ò/
    # BP 6: â（circumflex）
    - xform/a6/â/
    - xform/e6/ê/
    - xform/i6/î/
    - xform/u6/û/
    - xform/o6/ô/
    - xform/ng6/n̂g/
    # BP 7: ā（macron，入聲）
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    # BP 8: á（acute，入聲）
    - xform/a8/á/
    - xform/e8/é/
    - xform/i8/í/
    - xform/u8/ú/
    - xform/o8/ó/
