# 【候選清單】程式舘：閩拼方案（BP）
# lib_comment_bp.yaml
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    # ---- 0. 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔》$1〕【$1】/
    # ---- 1. 聲母：TLPA → BP ----
    - xform/》tsh/c》/
    - xform/》ts(?!h)/z》/
    - xform/》ng/ggn》/
    - xform/》b/bb》/
    - xform/》p(?!h)/b》/
    - xform/》ph/p》/
    - xform/》m/bbn》/
    - xform/》t(?!h)/d》/
    - xform/》th/t》/
    - xform/》n/ln》/
    - xform/》g(?!g)/gg》/
    - xform/》k(?!h)/g》/
    - xform/》kh/k》/
    - xform/》j/zz》/
    # ---- 2. 韻母：TLPA → BP ----
    # ---- 3b. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # i 為介音（ia, io, iu...）→ i 改成 y
    - xform/》ia/ya》/
    - xform/》io/yo》/
    - xform/》iu/yu》/
    # i 為主要元音（i + 調號）→ 前加 y
    # - xform/》i([;/\\_\-\[\]])/yi$1》/
    - xform/》i(\d)/yi$1》/
    # u 為介音（ua, ui, ue...）→ u 改成 w
    - xform/》ua/wa》/
    - xform/》ui/wi》/
    - xform/》ue/we》/
    # u 為主要元音（u + 調號）→ 前加 w
    # - xform/》u([;/\\_\-\[\]])/wu$1》/
    - xform/》u(\d)/wu$1》/
    # ---- 4. 調符移位 ----
    - xform/》iaunnh(\d)/ia${1}unnh》/
    - xform/》uainnh(\d)/ua${1}innh》/
    - xform/》aunnh(\d)/a${1}unnh》/
    - xform/》iannh(\d)/ia${1}nnh》/
    - xform/》iaunn(\d)/ia${1}unn》/
    - xform/》uainn(\d)/ua${1}inn》/
    - xform/》iang(\d)/ia${1}ng》/
    - xform/》iauh(\d)/ia${1}uh》/
    - xform/》iong(\d)/io${1}ng》/
    - xform/》ennh(\d)/e${1}nnh》/
    - xform/》onnh(\d)/o${1}nnh》/
    - xform/》annh(\d)/a${1}nnh》/
    - xform/》ainn(\d)/a${1}inn》/
    - xform/》aunn(\d)/a${1}unn》/
    - xform/》iann(\d)/ia${1}nn》/
    - xform/》innh(\d)/》/
    - xform/》iunn(\d)/》/
    - xform/》uann(\d)/ua${1}nn》/
    - xform/》uinn(\d)/ui${1}nn》/
    - xform/》ionn(\d)/io${1}nn》/
    - xform/》aenn(\d)/a${1}enn》/
    - xform/》eeh(\d)/e${1}eh》/
    - xform/》ang(\d)/a${1}ng》/
    - xform/》auh(\d)/a${1}uh》/
    - xform/》iah(\d)/ia${1}h》/
    - xform/》iak(\d)/ia${1}k》/
    - xform/》iam(\d)/ia${1}m》/
    - xform/》ian(\d)/ia${1}n》/
    - xform/》iau(\d)/ia${1}u》/
    - xform/》iap(\d)/ia${1}p》/
    - xform/》iat(\d)/ia${1}t》/
    - xform/》ing(\d)/i${1}ng》/
    - xform/》ioh(\d)/i${1}oh》/
    - xform/》iok(\d)/i${1}ok》/
    - xform/》iuh(\d)/i${1}uh》/
    - xform/》enn(\d)/e${1}nn》/
    - xform/》ngh(\d)/n${1}gh》/
    - xform/》onn(\d)/o${1}nn》/
    - xform/》ong(\d)/o${1}ng》/
