# 【候選清單】程式舘：閩拼方案（BP）
# lib_comment_bp.yaml
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    # ---- 0. 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔》$1〕【$1】/

    # ---- 1. 聲母：TLPA → BP ----
    # 齒音/舌齒音（多字母先處理）
    - xform/》tsh/c》/
    - xform/》ts(?!h)/z》/
    - xform/》j/zz》/
    - xform/》s/s》/
    # 舌根音/鼻音（濁音）
    - xform/》ng/ggn》/
    # 舌根音
    - xform/》g(?!g)/gg》/
    - xform/》k(?!h)/g》/
    - xform/》kh/k》/
    # 唇音
    - xform/》b/bb》/
    - xform/》p(?!h)/b》/
    - xform/》ph/p》/
    - xform/》m/bbn》/
    # 舌尖音
    - xform/》t(?!h)/d》/
    - xform/》th/t》/
    - xform/》n/ln》/
    - xform/》l/l》/
    # 聲門音
    - xform/》h/h》/

    # ---- 3. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # i 為介音（ia, io, iu...）→ i 改成 y
    - xform/〔》ia/〔ya/
    - xform/〔》io/〔yo/
    - xform/〔》iu/〔yu/
    # i 為主要元音（i + 調號）→ 前加 y
    # - xform/》i([;/\\_\-\[\]])/yi$1》/
    - xform/〔》i(\d)/》yi$1/
    # u 為介音（ua, ui, ue...）→ u 改成 w
    - xform/〔》ua/〔wa/
    - xform/〔》ui/〔wi/
    - xform/〔》ue/〔we/
    # u 為主要元音（u + 調號）→ 前加 w
    # - xform/》u([;/\\_\-\[\]])/wu$1》/
    - xform/〔》u(\d)/〔wu$1/

    # ---- 4. 為置放聲調符號調整 ----
    - xform/》iaunnh(\d)/i》a${1}unnh/
    - xform/》uainnh(\d)/u》a${1}innh/
    - xform/》aunnh(\d)/》a${1}unnh/
    - xform/》iannh(\d)/i》a${1}nnh/
    - xform/》iaunn(\d)/i》a${1}unn/
    - xform/》uainn(\d)/u》a${1}inn/
    - xform/》iang(\d)/i》a${1}ng/
    - xform/》iauh(\d)/i》a${1}uh/
    - xform/》iong(\d)/i》o${1}ng/
    - xform/》ennh(\d)/》e${1}nnh/
    - xform/》onnh(\d)/》o${1}nnh/
    - xform/》annh(\d)/》a${1}nnh/
    - xform/》ainn(\d)/》a${1}inn/
    - xform/》aunn(\d)/》a${1}unn/
    - xform/》iann(\d)/i》a${1}nn/
    - xform/》innh(\d)/》i${1}nnh/
    - xform/》iunn(\d)/》i${1}unn/
    - xform/》uann(\d)/u》a${1}nn/
    - xform/》uinn(\d)/u》i${1}nn/
    - xform/》ionn(\d)/i》o${1}nn/

    - xform/》aenn(\d)/》a${1}enn/
    - xform/》eeh(\d)/》e${1}eh/
    - xform/》ang(\d)/》a${1}ng/
    - xform/》auh(\d)/》a${1}uh/
    - xform/》iah(\d)/i》a${1}h/
    - xform/》iak(\d)/i》a${1}k/
    - xform/》iam(\d)/i》a${1}m/
    - xform/》ian(\d)/i》a${1}n/
    - xform/》iau(\d)/i》a${1}u/
    - xform/》iap(\d)/i》a${1}p/
    - xform/》iat(\d)/i》a${1}t/
    - xform/》ing(\d)/》i${1}ng/
    - xform/》ioh(\d)/》i${1}oh/
    - xform/》iok(\d)/》i${1}ok/
    - xform/》iuh(\d)/》i${1}uh/
    - xform/》enn(\d)/》e${1}nn/
    - xform/》ngh(\d)/》n${1}gh/
    - xform/》onn(\d)/》o${1}nn/
    - xform/》ong(\d)/》o${1}ng/
    - xform/》ooh(\d)/》o${1}oh/
    - xform/》uah(\d)/u》a${1}h/
    - xform/》uai(\d)/u》a${1}i/
    - xform/》uan(\d)/u》a${1}n/
    - xform/》uat(\d)/u》a${1}t/
    - xform/》ueh(\d)/u》e${1}h/
    - xform/》ann(\d)/》a${1}nn/
    - xform/》inn(\d)/》i${1}nn/
    - xform/》uae(\d)/u》a${1}e/
    - xform/》ioo(\d)/》i${1}oo/
    - xform/》eng(\d)/》e${1}ng/
    - xform/》ee(\d)/》e${1}e/
    - xform/》ah(\d)/》a${1}h/
    - xform/》ai(\d)/》a${1}i/
    - xform/》ak(\d)/》a${1}k/
    - xform/》am(\d)/》a${1}m/
    - xform/》an(\d)/》a${1}n/
    - xform/》au(\d)/》a${1}u/
    - xform/》ap(\d)/》a${1}p/
    - xform/》at(\d)/》a${1}t/
    - xform/》eh(\d)/》e${1}h/
    - xform/》ir(\d)/》i${1}r/
    - xform/》ia(\d)/i》a${1}/
    - xform/》er(\d)/》e${1}r/
    - xform/》ih(\d)/》i${1}h/
    - xform/》ik(\d)/》i${1}k/
    - xform/》im(\d)/》i${1}m/
    - xform/》in(\d)/》i${1}n/
