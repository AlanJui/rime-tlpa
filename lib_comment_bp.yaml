    - xform/@ue(\d)/@u${1}e/
    - xform/@uh(\d)/@u${1}h/
    - xform/@ui(\d)/@u${1}i/
    - xform/@un(\d)/@u${1}n/
    - xform/@ut(\d)/@u${1}t/
    - xform/@om(\d)/@o${1}m/



    - xform/@eu(\d)/@e${1}u/
    - xform/@ek(\d)/@e${1}k/
    - xform/@a(\d)/@a${1}/
    - xform/@e(\d)/@e${1}/
    - xform/@i(\d)/@i${1}/
    - xform/@m(\d)/@m${1}/
    - xform/@o(\d)/@o${1}/
    - xform/@u(\d)/@u${1}/

    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform/@oo1/ōo/   # 陰平調： 閩拼 1；台羅 1
    - xform/@oo5/óo/   # 陽平調： 閩拼 2；台羅 5
    - xform/@oo2/ǒo/   # 陰上調： 閩拼 3；台羅 2
    - xform/@oo6/ǒo/   # 陽上調： 閩拼 4；台羅 6
    - xform/@oo3/òo/   # 陰去調： 閩拼 5；台羅 3
    - xform/@oo7/ôo/   # 陽去調： 閩拼 6；台羅 7
    - xform/@oo4/ōo/   # 陰入調： 閩拼 7；台羅 4
    - xform/@oo8/óo/   # 陽入調： 閩拼 8；台羅 8

    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform/@a1/ā/
    - xform/@e1/ē/
    - xform/@i1/ī/
    - xform/@u1/ū/
    - xform/@o1/ō/
    - xform/@m1/m̄/
    - xform/@n1/n̄/
    # BP 2: á（下平/陽平，acute U+0301）
    - xform/@a5/á/
    - xform/@e5/é/
    - xform/@i5/í/
    - xform/@u5/ú/
    - xform/@o5/ó/
    - xform/@m5/ḿ/
    - xform/@n5/ń/
    # BP 3: ǎ（上聲，caron U+030C）
    - xform/@a2/ǎ/
    - xform/@e2/ě/
    - xform/@i2/ǐ/
    - xform/@u2/ǔ/
    - xform/@o2/ǒ/
    # BP 4: ǎ（上聲/陽上，同上聲，少用）
    - xform/@a6/ǎ/
    - xform/@e6/ě/
    - xform/@i6/ǐ/
    - xform/@u6/ǔ/
    - xform/@o6/ǒ/
    # BP 5: à（上去/陰去，grave U+0300）
    - xform/@a3/à/
    - xform/@e3/è/
    - xform/@i3/ì/
    - xform/@u3/ù/
    - xform/@o3/ò/
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform/@a7/â/
    - xform/@e7/ê/
    - xform/@i7/î/
    - xform/@u7/û/
    - xform/@o7/ô/
    - xform/@n7/n̂/
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform/@a4/ā/
    - xform/@e4/ē/
    - xform/@i4/ī/
    - xform/@u4/ū/
    - xform/@o4/ō/
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform/@a8/á/
    - xform/@e8/é/
    - xform/@i8/í/
    - xform/@u8/ú/
    - xform/@o8/ó/

    #======================================================
    # 右欄：台語注音符號（TLPA 注音符號）
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/

    #======================================================
    # 声母轉換作業
    #======================================================
    # 【零聲母】轉換
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    #------------------------------------------------------
    # 音節以【鼻音韻母】開頭
    - xform/【》([iu]?(ai|au|oo|[aiueo]))nn/【》L$1/
    # 音節以【韻母】開頭
    - xform/【》([iu]?(ai|au|oo|[aiueo]))/【》$1/
    # 音節以【韻化輔音】開始
    - xform/【》(m)(\d)$/【ㆬ》$2/
    - xform/【》(ng)(\d)$/【ㆭ》$2/
    #======================================================
    - xform/【》ng(?!\d)/【ㄫ》/
    #------------------------------------------------------
    - xform/【》jji/【ㆢ》i/
    - xform/【》ji/【ㄐ》i/
    - xform/【》chi/【ㄑ》i/
    - xform/【》shi/【ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/》zz/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》bbn/ㄇ》/
    - xform/》bb/ㆠ》/
    - xform/》b/ㄅ》/
    - xform/》ph/ㄆ》/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/》ggn/ㄫ》/
    - xform/》gg/ㆣ》/
    - xform/》g/ㄍ》/
    - xform/》k/ㄎ》/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/》ln/ㄋ》/  # 絕對不可將 n 置於 ng 之前
    - xform/》l/ㄌ》/
    - xform/》d/ㄉ》/
    - xform/》t/ㄊ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h/ㄏ》/
    #======================================================
    # 韻母轉換作業
    #======================================================
    #
    #------------------------------------------------------
    # 【鼻音韻母】使用之【識別符號】變更成【前綴識別】
    # 鼻音韻母： ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #------------------------------------------------------
    - xform/》([iu]?(ai|au|oo|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》Luaih/ㄨㆮㆷ》/
    - xform/》Liah/ㄧㆩㆷ》/
    - xform/》Liau/ㄧㆯ》/
    - xform/》Liuh/ㄧㆫㆷ》/
    - xform/》Luai/ㄨㆮ》/
