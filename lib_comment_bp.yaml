# 【候選清單】程式舘：閩拼方案（BP）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bp.yaml
# version: "v0.1.0.3"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    - xform/^(.*)$/〔@$1〕【》$1】/
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    # 右欄多音節：' 後面插入 》 標記（lookahead 限右欄 【...】 內）
    # - xform/'(?=[^〕】]*】)/ 》/
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    # ---- 1. 聲母：BPM2 → BP ----
    - xform/〔@jji/〔j@i/   # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/〔@ji/〔z@i/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/〔@chi/〔c@i/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/〔@shi/〔s@i/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    # ------------------------------------------------------------------------
    - xform/〔@zz/〔j@/     # zz(ㆡ) → j（濁音）
    - xform/〔@z/〔z@/      # z(ㄗ) → z
    - xform/〔@c/〔c@/      # c(ㄘ) → c
    - xform/〔@s/〔s@/      # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/〔@ng/〔ggn@/
    # 舌根音   〔
    - xform/〔@gg/〔gg@/
    - xform/〔@g/〔g@/
    - xform/〔@k/〔k@/
    # 唇音
    - xform/〔@m/〔bbn@/
    - xform/〔@bb/〔bb@/
    - xform/〔@b/〔b@/
    - xform/〔@p/〔p@/
    # 舌尖音
    - xform/〔@n/〔ln@/
    - xform/〔@l/〔l@/
    - xform/〔@d/〔d@/
    - xform/〔@t/〔t@/
    # 聲門音
    - xform/〔@h/〔h@/

    # ---- 2. 韻母：TLPA → BP ----
    # 鼻化韻母：自 nn 後綴，改 n 前綴
    - xform/@onn/@noo/          # onn(ㆧ) → noo（須先於一般規則）
    - xform/@([iu]?(?:ai|ao|oo|[aiueo]))nn/@n$1/  # ann→na, inn→ni, unn→nu 等

    # ---- 3. 為【韻母】上【聲調符號】調整 ----
    - xform/@uainnh(\d)/nu@a${1}ih/
    - xform/@iannh(\d)/ni@a${1}h/
    - xform/@iaunn(\d)/ni@a${1}o/
    - xform/@ioonn(\d)/ni@o${1}o/
    - xform/@iunnh(\d)/n@i${1}uh/
    - xform/@uainn(\d)/nu@a${1}i/
    - xform/@annh(\d)/n@a${1}h/
    - xform/@ainn(\d)/n@a${1}i/
    - xform/@ennh(\d)/n@e${1}h/
    - xform/@iann(\d)/ni@a${1}/
    - xform/@iunn(\d)/n@i${1}u/
    - xform/@onnh(\d)/n@i${1}uh/
    - xform/@ann(\d)/n@a${1}/
    - xform/@enn(\d)/n@e${1}/
    - xform/@inn(\d)/n@i${1}/
    #-----------------------------------------------------------------------
    - xform/@iang(\d)/i@a${1}ng/
    - xform/@iauh(\d)/y@a${1}oh/    # i 為介音 → i 改成 y
    - xform/@iorh(\d)/i@o${1}h/
    - xform/@iong(\d)/i@o${1}ng/
    - xform/@iook(\d)/i@o${1}k/
    - xform/@oonn(\d)/n@o${1}o/
    - xform/@uann(\d)/nu@a${1}/
    - xform/@uang(\d)/u@a${1}ng/
    - xform/@uaih(\d)/u@a${1}ih/
    - xform/@uinn(\d)/n@u${1}i/
    - xform/@ang(\d)/@a${1}ng/
    - xform/@aih(\d)/@a${1}ih/
    - xform/@auh(\d)/@a${1}oh/
    - xform/@ing(\d)/@i${1}ng/
    - xform/@iah(\d)/i@a${1}h/
    - xform/@iam(\d)/i@a${1}m/
    - xform/@ian(\d)/i@a${1}n/
    - xform/@iap(\d)/i@a${1}p/
    - xform/@iat(\d)/i@a${1}t/
    - xform/@iak(\d)/i@a${1}k/
    - xform/@iau(\d)/y@a${1}o/  # i 為介音 → i 改成 y
    - xform/@ior(\d)/y@o${1}/   # i 為介音 → i 改成 y
    - xform/@orh(\d)/@o${1}h/
    - xform/@ooh(\d)/@o${1}oh/
    - xform/@oom(\d)/@o${1}m/
    - xform/@ong(\d)/@o${1}ng/
    - xform/@oop(\d)/@o${1}p/
    - xform/@uah(\d)/u@a${1}h/
    - xform/@uan(\d)/u@a${1}n/
    - xform/@uat(\d)/u@a${1}t/
    - xform/@uai(\d)/u@a${1}i/
    - xform/@ueh(\d)/u@e${1}h/
    - xform/@uih(\d)/@u${1}ih/
    - xform/@ngh(\d)/@n${1}gh/
    - xform/@ah(\d)/@a${1}h/
    - xform/@am(\d)/@a${1}m/
    - xform/@an(\d)/@a${1}n/
    - xform/@ap(\d)/@a${1}p/
    - xform/@at(\d)/@a${1}t/
    - xform/@ak(\d)/@a${1}k/
    - xform/@ai(\d)/@a${1}i/
    - xform/@au(\d)/@a${1}o/
    - xform/@eh(\d)/@e${1}h/
    - xform/@ih(\d)/@i${1}h/
    - xform/@im(\d)/@i${1}m/
    - xform/@in(\d)/@i${1}n/
    - xform/@ip(\d)/@i${1}p/
    - xform/@it(\d)/@i${1}t/
    - xform/@ik(\d)/@i${1}k/
    - xform/@ia(\d)/y@a${1}/  # i 為介音 → i 改成 y
    - xform/@iu(\d)/y@u${1}/  # i 為介音 → i 改成 y
    - xform/@or(\d)/@o${1}/
    - xform/@oo(\d)/@o${1}o/
    - xform/@ok(\d)/@o${1}k/
    - xform/@uh(\d)/@u${1}h/
    - xform/@un(\d)/@u${1}n/
    - xform/@ut(\d)/@u${1}t/
    - xform/@ua(\d)/w@a${1}/  # u 為介音 → u 改成 w
    - xform/@ue(\d)/w@e${1}/  # u 為介音 → u 改成 w
    - xform/@ui(\d)/w@i${1}/  # u 為介音 → u 改成 w
    - xform/@mh(\d)/@m${1}h/
    - xform/@ng(\d)/@n${1}g/
    - xform/@a(\d)/@a${1}/
    - xform/@e(\d)/@e${1}/
    - xform/@i(\d)/y@i${1}/   # i 為元音 → 前加 y
    - xform/@u(\d)/w@u${1}/   # u 為元音 → 前加 w
    - xform/@m(\d)/@m${1}/

    # # ---- 4. 零聲母：i/u 開頭加 y/w（BP 規範） ----
    # # i 為介音（ia, io, iu...）→ i 改成 y
    # - xform/〔iau(\d)/〔yao/
    # - xform/〔ia(\d)/〔ya/
    # - xform/〔io/〔yo/
    # - xform/〔iu/〔yu/
    # # i 為主要元音（i + 調號）→ 前加 y
    # # - xform/@i([;/\\_\-\[\]])/yi$1@/
    # - xform/〔i(\d)/y@i${1}/
    # # u 為介音（ua, ui, ue...）→ u 改成 w
    # - xform/〔@ua/〔wa/
    # - xform/〔@ui/〔wi/
    # - xform/〔@ue/〔we/
    # # u 為主要元音（u + 調號）→ 前加 w
    # # - xform/@u([;/\\_\-\[\]])/wu$1@/
    # - xform/〔@u(\d)/〔wu$1/

    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform/@oo1/ōo/   # 陰平調： 閩拼 1；台羅 1
    - xform/@oo5/óo/   # 陽平調： 閩拼 2；台羅 5
    - xform/@oo2/ǒo/   # 陰上調： 閩拼 3；台羅 2
    - xform/@oo6/ǒo/   # 陽上調： 閩拼 4；台羅 6
    - xform/@oo3/òo/   # 陰去調： 閩拼 5；台羅 3
    - xform/@oo7/ôo/   # 陽去調： 閩拼 6；台羅 7
    - xform/@oo4/ōo/   # 陰入調： 閩拼 7；台羅 4
    - xform/@oo8/óo/   # 陽入調： 閩拼 8；台羅 8

    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform/@a1/ā/
    - xform/@e1/ē/
    - xform/@i1/ī/
    - xform/@u1/ū/
    - xform/@o1/ō/
    - xform/@m1/m̄/
    - xform/@n1/n̄/
    # BP 2: á（下平/陽平，acute U+0301）
    - xform/@a5/á/
    - xform/@e5/é/
    - xform/@i5/í/
    - xform/@u5/ú/
    - xform/@o5/ó/
    - xform/@m5/ḿ/
    - xform/@n5/ń/
    # BP 3: ǎ（上聲，caron U+030C）
    - xform/@a2/ǎ/
    - xform/@e2/ě/
    - xform/@i2/ǐ/
    - xform/@u2/ǔ/
    - xform/@o2/ǒ/
    # BP 4: ǎ（上聲/陽上，同上聲，少用）
    - xform/@a6/ǎ/
    - xform/@e6/ě/
    - xform/@i6/ǐ/
    - xform/@u6/ǔ/
    - xform/@o6/ǒ/
    # BP 5: à（上去/陰去，grave U+0300）
    - xform/@a3/à/
    - xform/@e3/è/
    - xform/@i3/ì/
    - xform/@u3/ù/
    - xform/@o3/ò/
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform/@a7/â/
    - xform/@e7/ê/
    - xform/@i7/î/
    - xform/@u7/û/
    - xform/@o7/ô/
    - xform/@n7/n̂/
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform/@a4/ā/
    - xform/@e4/ē/
    - xform/@i4/ī/
    - xform/@u4/ū/
    - xform/@o4/ō/
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform/@a8/á/
    - xform/@e8/é/
    - xform/@i8/í/
    - xform/@u8/ú/
    - xform/@o8/ó/

    #======================================================
    # 右欄：台語注音符號（TLPA 注音符號）
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/

    #======================================================
    # 声母轉換作業
    #======================================================
    # 【零聲母】轉換
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    #------------------------------------------------------
    # 音節以【鼻音韻母】開頭
    # 音節以【韻母】開頭
    # - xform/【》([iu]?(ai|au|oo|[aiueo]))nn/【》L$1/
    # - xform/【》([iu]?(ai|au|oo|[aiueo]))/【》$1/
    # 音節以【韻化輔音】開始
    - xform/【》(m)(\d)$/【ㆬ》$2/
    - xform/【》(ng)(\d)$/【ㆭ》$2/
    #======================================================
    - xform/【》ng(?!\d)/【ㄫ》/
    #------------------------------------------------------
    - xform/【》jji/【ㆢ》i/
    - xform/【》ji/【ㄐ》i/
    - xform/【》chi/【ㄑ》i/
    - xform/【》shi/【ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/》zz/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》m/ㄇ》/
    - xform/》bb/ㆠ》/
    - xform/》b/ㄅ》/
    - xform/》p/ㄆ》/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/》ng/ㄫ》/
    - xform/》gg/ㆣ》/
    - xform/》g/ㄍ》/
    - xform/》k/ㄎ》/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/》n/ㄋ》/
    - xform/》l/ㄌ》/
    - xform/》d/ㄉ》/
    - xform/》t/ㄊ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h/ㄏ》/
    #======================================================
    # 韻母轉換作業
    #======================================================
    #
    #------------------------------------------------------
    # 【鼻音韻母】使用之【識別符號】變更成【前綴識別】
    # 鼻音韻母： ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #------------------------------------------------------
    # - xform/》([iu]?(ai|au|oo|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》uainnh(\d)/ㄨㆮㆷ》${1}/
    - xform/》iannh(\d)/ㄧㆩㆷ》${1}/
    - xform/》iaunn(\d)/ㄧㆯ》${1}/
    - xform/》ioonn(\d)/ㄧㆧ》${1}/
    - xform/》iunnh(\d)/ㄧㆫㆷ》${1}/
    - xform/》uainn(\d)/ㄨㆮ》${1}/
    - xform/》annh(\d)/ㆩㆷ》${1}/
    - xform/》ainn(\d)/ㆮ》${1}/
    - xform/》ennh(\d)/ㆥㆷ》${1}/
    - xform/》iann(\d)/ㄧㆩ》${1}/
    - xform/》iunn(\d)/ㄧㆫ》${1}/
    - xform/》onnh(\d)/ㆧㆷ》${1}/
    - xform/》ann(\d)/ㆩ》${1}/
    - xform/》enn(\d)/ㆥ》${1}/
    - xform/》inn(\d)/ㆪ》${1}/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang(\d)/ㄧㄤ》${1}/
    - xform/》iauh(\d)/ㄧㄠㆷ》${1}/
    - xform/》iorh(\d)/ㄧㄜㆷ》${1}/
    - xform/》iong(\d)/ㄧㆲ》${1}/
    - xform/》iook(\d)/ㄧㆦㆻ》${1}/
    - xform/》oonn(\d)/ㆧ》${1}/
    - xform/》uann(\d)/ㄨㆩ》${1}/
    - xform/》uang(\d)/ㄨㄤ》${1}/
    - xform/》uaih(\d)/ㄨㄞㆷ》${1}/
    - xform/》uinn(\d)/ㄨㆪ》${1}/
    - xform/》ang(\d)/ㄤ》${1}/
    - xform/》aih(\d)/ㄞㆷ》${1}/
    - xform/》auh(\d)/ㄠㆷ》${1}/
    - xform/》ing(\d)/ㄧㄥ》${1}/
    - xform/》iah(\d)/ㄧㄚㆷ》${1}/
    - xform/》iam(\d)/ㄧㆰ》${1}/
    - xform/》ian(\d)/ㄧㄢ》${1}/
    - xform/》iap(\d)/ㄧㄚㆴ》${1}/
    - xform/》iat(\d)/ㄧㄚㆵ》${1}/
    - xform/》iak(\d)/ㄧㄚㆻ》${1}/
    - xform/》iau(\d)/ㄧㄠ》${1}/
    - xform/》ior(\d)/ㄧㄜ》${1}/
    - xform/》orh(\d)/ㄜㆷ》${1}/
    - xform/》ooh(\d)/ㆦㆷ》${1}/
    - xform/》oom(\d)/ㆱ》${1}/
    - xform/》ong(\d)/ㆲ》${1}/
    - xform/》oop(\d)/ㆦㆴ》${1}/
    - xform/》uah(\d)/ㄨㄚㆷ》${1}/
    - xform/》uan(\d)/ㄨㄢ》${1}/
    - xform/》uat(\d)/ㄨㄚㆵ》${1}/
    - xform/》uai(\d)/ㄨㄞ》${1}/
    - xform/》ueh(\d)/ㄨㆤㆷ》${1}/
    - xform/》uih(\d)/ㄨㄧㆷ》${1}/
    - xform/》ngh(\d)/ㆭㆷ》${1}/
    - xform/》ah(\d)/ㄚㆷ》${1}/
    - xform/》am(\d)/ㆰ》${1}/
    - xform/》an(\d)/ㄢ》${1}/
    - xform/》ap(\d)/ㄚㆴ》${1}/
    - xform/》at(\d)/ㄚㆵ》${1}/
    - xform/》ak(\d)/ㄚㆻ》${1}/
    - xform/》ai(\d)/ㄞ》${1}/
    - xform/》au(\d)/ㄠ》${1}/
    - xform/》eh(\d)/ㆤㆷ》${1}/
    - xform/》ih(\d)/ㄧㆷ》${1}/
    - xform/》im(\d)/ㄧㆬ》${1}/
    - xform/》in(\d)/ㄧㄣ》${1}/
    - xform/》ip(\d)/一ㆴ》${1}/
    - xform/》it(\d)/ㄧㆵ》${1}/
    - xform/》ik(\d)/ㄧㆻ》${1}/
    - xform/》ia(\d)/ㄧㄚ》${1}/
    - xform/》iu(\d)/ㄧㄨ》${1}/
    - xform/》or(\d)/ㄜ》${1}/
    - xform/》oo(\d)/ㆦ》${1}/
    - xform/》ok(\d)/ㆦㆻ》${1}/
    - xform/》uh(\d)/ㄨㆷ》${1}/
    - xform/》un(\d)/ㄨㄣ》${1}/
    - xform/》ut(\d)/ㄨㆵ》${1}/
    - xform/》ua(\d)/ㄨㄚ》${1}/
    - xform/》ue(\d)/ㄨㆤ》${1}/
    - xform/》ui(\d)/ㄨㄧ》${1}/
    - xform/》mh(\d)/ㆬㆷ》${1}/
    - xform/》ng(\d)/ㆭ》${1}/
    - xform/》a(\d)/ㄚ》${1}/
    - xform/》e(\d)/ㆤ》${1}/
    - xform/》i(\d)/ㄧ》${1}/
    - xform/》u(\d)/ㄨ》${1}/
    - xform/》m(\d)/ㆬ》${1}/

    #======================================================
    # 【聲調】
    #======================================================
    # 台語音標的【注音符號】，其【調號】值，使用【上標數值】格式顯示
    - xform/》1//    # 1
    - xform/》6/˫/   # 6
    - xform/》7/˫/   # 7
    - xform/》3/˪/   # 3
    - xform/》2/ˋ/  # 2
    - xform/》5/ˊ/  # 5
    - xform/》4//    # 4
    - xform/》8/˙/   # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/