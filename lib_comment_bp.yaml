# 【候選清單】程式舘：閩拼方案（BP）
# 【字典編碼】：台語注音二式（BPM2）
# lib_comment_bp.yaml
# version: "v0.1.0.15"

hau_suan_tuann:
    #==============================================================================
    # 定義【候選字清單】
    # 拆解【聲母】+【韻母】+【聲調】
    # - xform/【》(?:bb|ng|gg|zz|jj|ch|sh|[mbpnldtgkzcsh])(.*)(\d)$/【》$1$2$3/
    #==============================================================================
  __append:
    #==========================================================================
    # 格式校調
    #==========================================================================
    # 兩對音節之間，以兩個空白隔開
    # - xform/】\s+〔/】〔/

    #==========================================================================
    # 聲調轉換：BPM2 → BP
    # BPM2: 1  2  3  4  5  6  7  8
    # BP:   1  3  5  7  2  4  6  8
    #==========================================================================
    - xlit|234567|357246|

    #==========================================================================
    #  韻母轉換：BPM2 → BP
    #==========================================================================
    # iook → iok; iong → iong
    # oom → om; oop → op
    - xform/oo([kmp])/o$1/
    # ior → io; or → o
    - xform/or/o/
    # iau → iao; au → ao
    - xform/au/ao/
    # iek → ik; ing → ing
    - xform/iek/ik/
    #--------------------------------------------------------------------------
    # 鼻化韻母轉換：改 nn 後綴，成 n 前綴
    # ann ==>  na ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #--------------------------------------------------------------------------
    # oonn → oon -> noo
    # - xform/oonn/noo/
    - xform/([iu]?(?:ai|ao|oo|[aiueo]))nn/n$1/

    #==========================================================================
    # 為【侯選清單】之【漢字標音】拆解【音節】=【聲母】+【韻母】+【聲調】
    #--------------------------------------------------------------------------
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #--------------------------------------------------------------------------
    # 這三條都用詞界 \b 逐一命中每個 token
    # 【候選字清單】最後呈現格式，由【輸入方案用】filter 插件校調：
    # lua_filter@reformat_comment_filter
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    - xform/\b(n([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d))\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/

    #==========================================================================
    # 右欄：改良【式方音符號】
    #==========================================================================

    # --------------------------------------------------------------------------
    # 聲母轉換
    # --------------------------------------------------------------------------
    - xform/【》jji/【ㆢ》i/
    - xform/【》ji/【ㄐ》i/
    - xform/【》chi/【ㄑ》i/
    - xform/【》shi/【ㄒ》i/
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/【》zz/【ㆡ》/
    - xform/【》z/【ㄗ》/
    - xform/【》c/【ㄘ》/
    - xform/【》s/【ㄙ》/
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/【》m(?!\d)/【ㄇ》/    # 韻化輔音
    - xform/【》bb/【ㆠ》/
    - xform/【》b/【ㄅ》/
    - xform/【》p/【ㄆ》/
    # 舌根音（軟顎音）
    - xform/【》ng(?!\d)/【ㄫ》/    # 韻化輔音
    - xform/【》gg/【ㆣ》/
    - xform/【》g/【ㄍ》/
    - xform/【》k/【ㄎ》/
    # 舌尖音（齒齦音）
    - xform/【》n(?!g)/【ㄋ》/
    - xform/【》l/【ㄌ》/
    - xform/【》d/【ㄉ》/
    - xform/【》t/【ㄊ》/
    # 喉音
    - xform/【》h/【ㄏ》/
    #------------------------------------------------------
    # 零聲母特別處理
    #------------------------------------------------------
    # 音節以【韻化輔音】開始
    - xform/【》Øm(\d)$/【ㆬ》$1/
    - xform/【》Øng(\d)$/【ㆭ》$1/
    #------------------------------------------------------
    # 音節以【鼻音韻母】開頭
    - xform/【》Øn([iu]?(?:ai|ao|oo|[aiueo]))/【》n$1/
    # 音節以【韻母】開頭
    - xform/【》Ø([iu]?(?:ai|ao|oo|[aiueo]))/【》$1/
    #------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    # - xform/【Ø/【/
    # - xform/【》Ø/【/

    #==========================================================================
    # 韻母轉換
    #==========================================================================
    # 鼻音韻母轉換
    - xform/》nuaih(\d)/ㄨㆮㆷ》${1}/
    - xform/》niah(\d)/ㄧㆩㆷ》${1}/
    - xform/》niao(\d)/ㄧㆯ》${1}/
    - xform/》nioo(\d)/ㄧㆧ》${1}/
    - xform/》niuh(\d)/ㄧㆫㆷ》${1}/
    - xform/》nooh(\d)/ㆧㆷ》${1}/
    - xform/》nuai(\d)/ㄨㆮ》${1}/
    - xform/》nah(\d)/ㆩㆷ》${1}/
    - xform/》nai(\d)/ㆮ》${1}/
    - xform/》neh(\d)/ㆥㆷ》${1}/
    - xform/》nia(\d)/ㄧㆩ》${1}/
    - xform/》niu(\d)/ㄧㆫ》${1}/
    - xform/》noo(\d)/ㆧ》${1}/
    - xform/》nua(\d)/ㄨㆩ》${1}/
    - xform/》nui(\d)/ㄨㆪ》${1}/
    - xform/》na(\d)/ㆩ》${1}/
    - xform/》ne(\d)/ㆥ》${1}/
    - xform/》ni(\d)/ㆪ》${1}/

    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang(\d)/ㄧㄤ》${1}/
    - xform/》iaoh(\d)/ㄧㄠㆷ》${1}/
    - xform/》iong(\d)/ㄧㆲ》${1}/
    - xform/》uaih(\d)/ㄨㄞㆷ》${1}/
    - xform/》uang(\d)/ㄨㄤ》${1}/
    - xform/》aih(\d)/ㄞㆷ》${1}/
    - xform/》ang(\d)/ㄤ》${1}/
    - xform/》aoh(\d)/ㄠㆷ》${1}/
    - xform/》iah(\d)/ㄧㄚㆷ》${1}/
    - xform/》iak(\d)/ㄧㄚㆻ》${1}/
    - xform/》iam(\d)/ㄧㆰ》${1}/
    - xform/》ian(\d)/ㄧㄢ》${1}/
    - xform/》iao(\d)/ㄧㄠ》${1}/
    - xform/》iap(\d)/ㄧㄚㆴ》${1}/
    - xform/》iat(\d)/ㄧㄚㆵ》${1}/
    - xform/》ing(\d)/ㄧㄥ》${1}/
    - xform/》ioh(\d)/ㄧㄜㆷ》${1}/
    - xform/》iok(\d)/ㄧㆦㆻ》${1}/
    - xform/》ngh(\d)/ㆭㆷ》${1}/
    - xform/》ong(\d)/ㆲ》${1}/
    - xform/》ooh(\d)/ㆦㆷ》${1}/
    - xform/》uah(\d)/ㄨㄚㆷ》${1}/
    - xform/》uai(\d)/ㄨㄞ》${1}/
    - xform/》uan(\d)/ㄨㄢ》${1}/
    - xform/》uat(\d)/ㄨㄚㆵ》${1}/
    - xform/》ueh(\d)/ㄨㆤㆷ》${1}/
    - xform/》uih(\d)/ㄨㄧㆷ》${1}/
    - xform/》ah(\d)/ㄚㆷ》${1}/
    - xform/》ai(\d)/ㄞ》${1}/
    - xform/》ak(\d)/ㄚㆻ》${1}/
    - xform/》am(\d)/ㆰ》${1}/
    - xform/》an(\d)/ㄢ》${1}/
    - xform/》ao(\d)/ㄠ》${1}/
    - xform/》ap(\d)/ㄚㆴ》${1}/
    - xform/》at(\d)/ㄚㆵ》${1}/
    - xform/》eh(\d)/ㆤㆷ》${1}/
    - xform/》ia(\d)/ㄧㄚ》${1}/
    - xform/》ih(\d)/ㄧㆷ》${1}/
    - xform/》ik(\d)/ㄧㆻ》${1}/
    - xform/》im(\d)/ㄧㆬ》${1}/
    - xform/》in(\d)/ㄧㄣ》${1}/
    - xform/》io(\d)/ㄧㄜ》${1}/
    - xform/》ip(\d)/一ㆴ》${1}/
    - xform/》it(\d)/ㄧㆵ》${1}/
    - xform/》iu(\d)/ㄧㄨ》${1}/
    - xform/》mh(\d)/ㆬㆷ》${1}/
    - xform/》ng(\d)/ㆭ》${1}/
    - xform/》oh(\d)/ㄜㆷ》${1}/
    - xform/》ok(\d)/ㆦㆻ》${1}/
    - xform/》om(\d)/ㆱ》${1}/
    - xform/》oo(\d)/ㆦ》${1}/
    - xform/》op(\d)/ㆦㆴ》${1}/
    - xform/》ua(\d)/ㄨㄚ》${1}/
    - xform/》ue(\d)/ㄨㆤ》${1}/
    - xform/》uh(\d)/ㄨㆷ》${1}/
    - xform/》ui(\d)/ㄨㄧ》${1}/
    - xform/》un(\d)/ㄨㄣ》${1}/
    - xform/》ut(\d)/ㄨㆵ》${1}/
    - xform/》a(\d)/ㄚ》${1}/
    - xform/》e(\d)/ㆤ》${1}/
    - xform/》i(\d)/ㄧ》${1}/
    - xform/》m(\d)/ㆬ》${1}/
    - xform/》o(\d)/ㄜ》${1}/
    - xform/》u(\d)/ㄨ》${1}/

    #==========================================================================
    # 【聲調】轉換
    #--------------------------------------------------------------------------
    # BPM2 → BP 聲調轉換：⁰ ¹ ² ³ ⁴ ⁵ ⁶ ⁷ ⁸ ⁹
    # BPM2: 1  7  3  2  5  4  8
    # BP:   1  6  5  3  2  7  8
    #==========================================================================
    # 台語注音第二式（BPM2）八調：1  2  3  4  5  6  7  8
    # - xform/》1//    # 1
    # - xform/》7/˫/   # 7
    # - xform/》3/˪/   # 3
    # - xform/》2/ˋ/  # 2
    # - xform/》5/ˊ/  # 5
    # - xform/》4//    # 4
    # - xform/》8/˙/   # 8
    # 閩拼方案（BP）八調：1  3  5  7  2  4  6  8
    - xform/》1/¹/    # 1
    - xform/》6/⁶/     # 6
    - xform/》5/⁵/    # 5
    - xform/》3/³/    # 3
    - xform/》2/²/    # 2
    - xform/》7/⁷/    # 7
    - xform/》8/⁸/    # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/

    #==========================================================================
    # 左欄：閩拼方案（BP）
    #==========================================================================

    #--------------------------------------------------------------------------
    # 【零聲母】+【i/u開頭韻母】校調
    #--------------------------------------------------------------------------
    # 零聲母鼻化韻轉換：轉為 BP 格式 (yn... / wn...)
    # 羊：iunn5 → ynu2；碗：uann2 → wna3
    # iunn5 → iunn2 → n+iu+2 → Ø+n+iu+2 → yn+i2+u → ynú
    #--------------------------------------------------------------------------
    - xform/〔〉Øniu(\d)〕/〔ynu$1〕/
    - xform/〔〉Øniao(\d)〕/〔yn$1ao〕/
    - xform/〔〉Ønioo(\d)〕/〔ynoo$1〕/
    - xform/〔〉Ønia(\d)〕/〔yna$1〕/
    - xform/〔〉Øni(\d)〕/〔yni$1〕/
    #------------------------------------------------------
    - xform/〔〉Ønuai(\d)〕/〔wnai$1〕/
    - xform/〔〉Ønua(\d)〕/〔wna$1〕/
    - xform/〔〉Ønui(\d)〕/〔wni$1〕/
    - xform/〔〉Ønue(\d)〕/〔wne$1〕/
    - xform/〔〉Ønu(\d)〕/〔wnu$1〕/
    #--------------------------------------------------------------------------
    # i 開頭
    - xform/〔〉Øia(ng|k)(\d)〕/〔ya$2$1〕/      # iang1 → yang1, iak8 → yak8
    - xform/〔〉Øia([nmp])(\d)〕/〔ya$2$1〕/     # ian2 → yan2, iam3 → yam3, iap4 → yap4
    - xform/〔〉Øiao(\d)〕/〔ya$1o〕/            # iao1 → yao1
    - xform/〔〉Øia(\d)〕/〔ya$1〕/              # ia... → ya...
    - xform/〔〉Øiong(\d)〕/〔yo$1ng〕/          # iong2 → yong2, iok8 → yok8
    - xform/〔〉Øiook(\d)〕/〔yo$1k〕/           # iook8 → yok8
    - xform/〔〉Øio(\d)〕/〔yo$1〕/              # io... → yo...
    - xform/〔〉Øiu(\d)〕/〔yu$1〕/              # iu... → yu...
    - xform/〔〉Øih(\d)〕/〔yi$1h〕/             # ih4 → yih4
    - xform/〔〉Øi(\d)〕/〔yi$1〕/               # i1 → yi1
    - xform/〔〉Øi(ng|k)(\d)〕/〔yi$2$1〕/       # ing1 → ying1, ik8 → yik8
    - xform/〔〉Øi(n|t)(\d)〕/〔yi$2$1〕/        # in1 → yin1, it8 → yit8
    - xform/〔〉Øi(m|p)(\d)〕/〔yi$2$1〕/        # im1 → yim1, ip8 → yip8
    #--------------------------------------------------------------------------
    # u 開頭
    - xform/〔〉Øua(ng|k)(\d)〕/〔wa$2$1〕/      # uang1 → wang1, uak8 → wak8
    - xform/〔〉Øu(a)([inp])(\d)〕/〔w$1$3$2〕/  # uai7 → wai7, uan2 → wan2, uap8 → wap8
    - xform/〔〉Øu([aei])(\d)〕/〔w$2$1〕/       # ua → wa, ue3 → we3, ui7 → wi7
    - xform/〔〉Øu(n|t)(\d)〕/〔wu$2$1〕/        # un2 → wun2, ut8 → wut8
    - xform/〔〉Øuh(\d)〕/〔wu$1h〕/             # uh4 → wuh4
    - xform/〔〉Øu(\d)〕/〔wu$1〕/               # u3 → wu3

    #==========================================================================
    # 聲母轉換：BPM2 → BP
    #==========================================================================
    # 用 (^| ) 取代 ^ ，令每個音節聲母（含連續輸入第2個之後的音節）均可被比對
    - xform/〔〉jj(?i)/〔zz/  # jji (ㆢㄧ) = zz(ㆡ) + i(ㄧ)
    - xform/〔〉j(?i)/〔z/    # ji (ㄐㄧ)  = z(ㄗ)  + i(ㄧ)
    - xform/〔〉ch(?i)/〔c/   # chi (ㄑㄧ) = c(ㄘ)  + i(ㄧ)
    - xform/〔〉sh(?i)/〔s/   # shi (ㄒㄧ) = s(ㄙ)  + i(ㄧ)
    #------------------------------------------------------
    - xform/〔〉zz/〔zz/      # zz(ㆡ) → j（濁音）
    - xform/〔〉z/〔z/        # z(ㄗ) → z
    - xform/〔〉c/〔c/        # c(ㄘ) → c
    - xform/〔〉s/〔s/        # s(ㄙ) → s
    # 舌根音/鼻音（濁音）
    - xform/〔〉ng(?!\d)/〔ggn/    # 韻化輔音
    # 舌根音
    - xform/〔〉gg/〔gg/
    - xform/〔〉g/〔g/
    - xform/〔〉k/〔k/
    # 唇音
    - xform/〔〉m(?!\d)/〔bbn/    # 韻化輔音
    - xform/〔〉bb/〔bb/
    - xform/〔〉b/〔b/
    - xform/〔〉p/〔p/
    # 舌尖音
    - xform/〔〉n(?!g)/〔ln/
    - xform/〔〉l/〔l/
    - xform/〔〉d/〔d/
    - xform/〔〉t/〔t/
    # 聲門音
    - xform/〔〉h/〔h/
    #------------------------------------------------------
    # 消除【零聲母】識別符號 Ø
    - xform/〔〉Ø/〔/

    #==========================================================================
    # 韻母轉換：BPM2 → BP
    #==========================================================================

    #------------------------------------------------------
    # 標上聲調符號
    #------------------------------------------------------
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1652378])/$1$3$2/
    - xform/([aeo])([iueo])([1652378])/$1$3$2/
    #------------------------------------------------------
    # oo 韻母視作整體處理（須先於單 o 規則）----
    #------------------------------------------------------
    - xform/oo1/ōo/   # 陰平調： 閩拼 1；台羅 1
    - xform/oo2/óo/   # 陽平調： 閩拼 2；台羅 5
    - xform/oo3/ǒo/   # 陰上調： 閩拼 3；台羅 2
    - xform/oo4/ǒo/   # 陽上調： 閩拼 4；台羅 6
    - xform/oo5/òo/   # 陰去調： 閩拼 5；台羅 3
    - xform/oo6/ôo/   # 陽去調： 閩拼 6；台羅 7
    - xform/oo7/ōo/   # 陰入調： 閩拼 7；台羅 4
    - xform/oo8/óo/   # 陽入調： 閩拼 8；台羅 8
    #------------------------------------------------------
    # BP 1: ā（macron）
    - xform/a1/ā/
    - xform/e1/ē/
    - xform/i1/ī/
    - xform/u1/ū/
    - xform/o1/ō/
    - xform/m1/m̄/
    - xform/ng1/n̄g/
    # BP 2: á（acute）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # BP 3: ǎ（caron）
    - xform/a3/ǎ/
    - xform/e3/ě/
    - xform/i3/ǐ/
    - xform/u3/ǔ/
    - xform/o3/ǒ/
    # BP 4: ǎ（陽上，少用）
    - xform/a4/ǎ/
    - xform/e4/ě/
    - xform/i4/ǐ/
    - xform/u4/ǔ/
    - xform/o4/ǒ/
    # BP 5: à（grave）
    - xform/a5/à/
    - xform/e5/è/
    - xform/i5/ì/
    - xform/u5/ù/
    - xform/o5/ò/
    # BP 6: â（circumflex）
    - xform/a6/â/
    - xform/e6/ê/
    - xform/i6/î/
    - xform/u6/û/
    - xform/o6/ô/
    - xform/ng6/n̂g/
    # BP 7: ā（macron，入聲）
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
