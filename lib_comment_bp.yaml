    - xform/@ngh(\d)/@n${1}gh/
    - xform/@onn(\d)/@o${1}nn/
    - xform/@ong(\d)/@o${1}ng/
    - xform/@ooh(\d)/@o${1}oh/
    - xform/@uah(\d)/u@a${1}h/
    - xform/@uai(\d)/u@a${1}i/
