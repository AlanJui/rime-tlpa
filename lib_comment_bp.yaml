    - xform/》ek(\d)/e${1}k》/
    - xform/》a(\d)/a${1}》/
    - xform/》e(\d)/e${1}》/
    - xform/》i(\d)/i${1}》/
    - xform/》m(\d)/m${1}》/
    - xform/》o(\d)/o${1}》/
    - xform/》u(\d)/u${1}》/

    # ---- 5. oo 韻母整體處理（須先於單 o 規則）----
    - xform|》oo;|ōo》|   # 陰平調： 閩拼 1；台羅 1
    - xform|》oo/|óo》|   # 陽平調： 閩拼 2；台羅 5
    - xform|》oo\|ǒo》|   # 陰上調： 閩拼 3；台羅 2
    - xform|》oo\|ǒo》|   # 陽上調： 閩拼 4；台羅 6
    - xform|》oo_|òo》|   # 陰去調： 閩拼 5；台羅 3
    - xform|》oo-|ôo》|   # 陽去調： 閩拼 6；台羅 7
    - xform|》oo[|ōo》|   # 陰入調： 閩拼 7；台羅 4
    - xform|》oo]|óo》|   # 陽入調： 閩拼 8；台羅 8
    # ---- 6. 調符代換（BP 調符） ----
    # BP 1: ā（上平/陰平，macron U+0304）
    - xform|》a;|ā》|
    - xform|》e;|ē》|
    - xform|》i;|ī》|
    - xform|》u;|ū》|
    - xform|》o;|ō》|
    - xform|》m;|m̄》|
    - xform|》ng;|n̄g》|
    # BP 2: á（下平/陽平，acute U+0301）
    - xform|》a/|á》|
    - xform|》e/|é》|
    - xform|》i/|í》|
    - xform|》u/|ú》|
    - xform|》o/|ó》|
    - xform|》m/|ḿ》|
    - xform|》ng/|ńg》|
    # BP 3: ǎ（上聲，caron U+030C）
    - xform|》a\|ǎ》|
    - xform|》e\|ě》|
    - xform|》i\|ǐ》|
    - xform|》u\|ǔ》|
    - xform|》o\|ǒ》|
    # BP 4: ǎ（下聲/陽上，同上聲，少用）
    - xform|》a\|ǎ》|
    - xform|》e\|ě》|
    - xform|》i\|ǐ》|
    - xform|》u\|ǔ》|
    - xform|》o\|ǒ》|
    # BP 5: à（上去/陰去，grave U+0300）
    - xform|》a_|à》|
    - xform|》e_|è》|
    - xform|》i_|ì》|
    - xform|》u_|ù》|
    - xform|》o_|ò》|
    # BP 6: â（下去/陽去，circumflex U+0302）
    - xform|》a-|â》|
    - xform|》e-|ê》|
    - xform|》i-|î》|
    - xform|》u-|û》|
    - xform|》o-|ô》|
    - xform|》ng-|n̂g》|
    # BP 7: ā（上入/陰入，macron U+0304，同上平）
    - xform|》a[|ā》|
    - xform|》e[|ē》|
    - xform|》i[|ī》|
    - xform|》u[|ū》|
    - xform|》o[|ō》|
    # BP 8: á（下入/陽入，acute U+0301，同下平）
    - xform|》a]|á》|
    - xform|》e]|é》|
    - xform|》i]|í》|
    - xform|》u]|ú》|
    - xform|》o]|ó》|

    # ---- 7. 清除定位符號 ----
    - xform/》//