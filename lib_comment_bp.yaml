    #======================================================
    # 【聲調】
    #======================================================
    # 台語音標的【注音符號】，其【調號】值，使用【上標數值】格式顯示
    - xform/》1//    # 1
    - xform/》6/˫/   # 6
    - xform/》7/˫/   # 7
    - xform/》3/˪/   # 3
    - xform/》2/ˋ/  # 2
    - xform/》5/ˊ/  # 5
    - xform/》4//    # 4
    - xform/》8/˙/   # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/