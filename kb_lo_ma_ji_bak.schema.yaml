# Rime schema
# version: "v0.2.0.0"
# encoding: utf-8

schema:
  schema_id: kb_lo_ma_ji
  name: 按鍵練習【羅馬拼音字母】
  version: "0.2.0.0"
  author:
    - Alan Jui <AlanJui.1960@gmail.com>
  description: |
    輸入帶調符之「羅馬拼音字母」（台羅拼音 / 白話字）

    【聲調按鍵對映】
    按鍵  調號  聲調
    ;     1     陰平調（高音調）
    \     2     上聲調（高降調）
    _     3     陰去調（低音調）
    [     4     陰入調（低促調）
    /     5     陽平調（低升調）
    -     7     陽去調（中音調）
    ]     8     陽入調（高促調）

    【輸入範例】
    siann;  → siann（陰平）
    siann\  → siánn（上聲）
    siann_  → siànn（陰去）
    siann/  → siânn（陽平）
    siann-  → siānn（陽去）
    tshiu/  → tshiû（陽平）
    e[      → e（陰入）
    a]      → a̍（陽入）

    【按鍵字母對映表】（單鍵查閱，不含聲調）
    序號  鍵盤按鍵  方音符號  注音編碼  國際音標
    22    8         ㄚ        a         a
    24    u         ㄧ        i         i
    26    j         ㄨ        u         u
    28    ,         ㆤ        e         e
    31    i         ㆦ        O         ɔ
    30    k         ㄜ        o         ə

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文 ABC]
  - name: full_shape
    reset: 0
    states: [半形 全形]

engine:
  processors:
    - key_binder
    - speller
    - punctuator
    - selector
    - express_editor
  segmentors:
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - echo_translator
    - punct_translator
    - script_translator

speller:
  alphabet: abcdefghijklmnopqrstuvwxyzN;-_\/[]
  initials: abcdefghijklmnopqrstuvwxyzN
  finals: ;-_\/[]
  delimiter: "'"
  use_space: true
  algebra:
    - xform/6/7/
    - derive/([iu]?(ai|au|oo|[aiueo]))nn/N$1/
    - xlit|123574890N|;\_/-[].7N|

translator:
  dictionary: ji_khoo_tl
  prism: phing_im_tl
  spelling_hints: 20
  always_show_comments: true
  initial_quality: 0.75
  preedit_format:
    #------------------------------------------------------
    # 定義【鍵盤輸入列】
    # 定義鍵盤輸入【按鍵】，與【拼音字母】顯示對映關聯
    #------------------------------------------------------
    # 分隔符號
    - xform/'/ / # 將音節分割符號 `'` 轉換為空白
    #------------------------------------------------------
    # 【按鍵】與【輸入法調號】對映表
    #  ; ==> 1
    #  - ==> 7
    #  _ ==> 3
    #  \ ==> 2
    #  / ==> 5
    #  [ ==> 4
    #  ] ==> 8
    #------------------------------------------------------
    - xlit|;-_\/[]|1732548|
    #------------------------------------------------------
    # 【元音韻母】 oo [ɔ] = o͘ = ㆦ
    - xform/oo([12345678])/o͘${1}/
    #------------------------------------------------------
    # 定義【調符】對映規則
    #------------------------------------------------------
    # 處理一般韻母（移動調號至元音後）
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([1732548])/$1$3$2/
    # ---- oo 韻母聲調符號 ----
    - xform/》o͘1/o͘/
    - xform/》o͘2/ó͘/
    - xform/》o͘3/ò͘/
    - xform/》o͘4/o͘/
    - xform/》o͘5/ô͘/
    - xform/》o͘7/ō͘/
    - xform/》o͘8/o̍͘/
    # oo 韻母直接調符（fallback）
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # [1] 陰平調（高音調）
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    # [2] 上聲調（高降調）
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/m2/ḿ/
    - xform/ng2/ńg/
    # [3] 陰去調（低音調）_ （劃底線符號）
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/ng3/ǹg/
    # [4] 陰入調（低促調）[
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/mh4/mh/
    - xform/ngh4/ngh/
    # [5] 陽平調（低升調）/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/m5/m̂/
    - xform/ng5/n̂g/
    # [7] 陽去調（中音調）-
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/m7/m̄/
    - xform/ng7/n̄g/
    # [8] 陽入調（高促調）]
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    - xform/mh8/m̍h/
    - xform/ngh8/n̍gh/
    # 鼻化韻母
    - xform/([iu]?(ai|au|oo|[iuaoe]))nn/ⁿ$1/

key_binder:
  import_preset: default
  bindings:
    #---------------------------------------------------
    # 聲調按鍵：composing 模式
    - { when: composing, accept: semicolon, send: semicolon }
    - { when: composing, accept: minus, send: minus }
    - { when: composing, accept: underscore, send: underscore }
    - { when: composing, accept: slash, send: slash }
    - { when: composing, accept: bracketleft, send: bracketleft }
    - { when: composing, accept: bracketright, send: bracketright }
    #---------------------------------------------------
    # 聲調按鍵：has_menu 模式
    - { when: has_menu, accept: semicolon, send: semicolon }
    - { when: has_menu, accept: minus, send: minus }
    - { when: has_menu, accept: underscore, send: underscore }
    - { when: has_menu, accept: slash, send: slash }
    - { when: has_menu, accept: bracketleft, send: bracketleft }
    - { when: has_menu, accept: bracketright, send: bracketright }
    #---------------------------------------------------
    # 翻頁
    - { accept: "Control+p", send: Page_Up, when: composing }
    - { accept: "Control+n", send: Page_Down, when: composing }

punctuator:
  half_shape: &symtable
    "1": ["ㄅ", "p", "b"]
    "q": ["ㄆ", "pʰ", "p"]
    "!": ["ㆠ", "b", "bb"]
    "a": ["ㄇ", "m", "m"]
    "2": ["ㄉ", "t", "d"]
    "w": ["ㄊ", "tʰ", "t"]
    "s": ["ㄋ", "n", "n"]
    "x": ["ㄌ", "l", "l"]
    "y": ["ㄗ", "ts", "z"]
    "h": ["ㄘ", "ʦʰ", "c"]
    "b": ["ㆡ", "ʣ", "zz"]
    "n": ["ㄙ", "s", "s"]
    "Y": ["ㄐ", "ʨ", "ji"]
    "H": ["ㄑ", "ʨʰ", "chi"]
