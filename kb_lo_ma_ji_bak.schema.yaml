    "e": ["ㄍ", "k", "g"]
    "d": ["ㄎ", "kʰ", "k"]
    "E": ["ㆣ", "g", "gg"]
    "g": ["ㄫ", "ŋ", "ng"]
    "c": ["ㄏ", "h", "h"]
    "8": ["ㄚ", "a", "a"]
    "*": ["ㆩ", "ã", "ann"]
    "u": ["ㄧ", "i", "i"]
    "U": ["ㆪ", "ĩ", "inn"]
    "j": ["ㄨ", "u", "u"]
    "J": ["ㆫ", "ũ", "unn"]
    ",": ["ㆤ", "e", "e"]
    "<": ["ㆥ", "ẽ", "enn"]
    "k": ["ㄜ", "ə", "or"]
    "i": ["ㆦ", "ɔ", "oo"]
    "I": ["ㆧ", "ɔ̃", "oonn"]
    "9": ["ㄞ", "ai", "ai"]
    "(": ["ㆮ", "ãĩ", "ainn"]
    "l": ["ㄠ", "au", "au"]
    "L": ["ㆯ", "ãũ", "aunn"]
    "-": ["ㆨ", "ɨ", "ir"]
    "M": ["ㆰ", "am", "am"]
    "O": ["ㆱ", "ɔm", "om"]
    "m": ["ㆬ", "m", "m"]
    "0": ["ㄢ", "an", "an"]
    "p": ["ㄣ", "n", "n"]
    ";": ["ㄤ", "aŋ", "ang"]
    "o": ["ㆲ", "ɔŋ", "ong"]
    "/": ["ㆭ", "ŋ", "ng"]
    "z": ["ㆴ", "ㆵ", "ㆻ", "ㆷ"]
    " ": ["", "44", "¹", "1"]
    "4": ["ˋ", "53", "²", "2"]
    "3": ["˪", "21", "³", "3"]
    "6": ["ˊ", "24", "⁵", "5"]
    "5": ["˫", "22", "⁷", "7"]
    "7": ["．", "32", "121", "⁰", "⁴", "⁸", "0", "4", "8"]
    "_": { commit: " " }
    "~": ["-", "~"]

full_shape:
  ".": 。
