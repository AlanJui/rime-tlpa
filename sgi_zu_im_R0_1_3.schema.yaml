# Rime schema
# vim: set sw=2 sts=2 et nowrap:
# encoding: utf-8

schema:
  schema_id: sgi_zu_im
  name: 十五音輸入法【注音反切】
  version: "v0.1.3"
  author:
    - 居正中 <alanjui.1960@gmail.com>
  description: |
    【修復版】：基於 sgi_zu_im_bak.schema.yaml 還原。
    修正：1 -> ㄅ 顯示錯誤。
    優化：Ctrl+m 改為 Ctrl+Shift+M。

switches:
  - name: ascii_mode
    reset: 0
    states: [漢文, ABC]
  - name: full_shape
    reset: 0
    states: [半形, 全形]
  - name: supers_tone
    reset: 1
    states: [一般, 上標]
  - name: dict_mode
    reset: 0
    states: [方音, 台拼]
  - options: [ piau_im_format_15, piau_im_format_bpmf, piau_im_format_tlpa ]
    reset: 0
    states: [ 單出十五音, 單出方音, 單出台拼 ]
  - options: [ tiau_mark, tiau_num ]
    reset: 1
    states: [ 調符, 調號 ]

engine:
  processors:
    - lua_processor@aux_commit
    - lua_processor@jump_select
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier
    - lua_filter@reformat_comment_filter

