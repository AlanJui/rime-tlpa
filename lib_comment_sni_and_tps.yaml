    - xform/》ih/居》/
    - xform/》ik/經》/
    - xform/》im/金》/
    - xform/》in/巾》/
    - xform/》io/茄》/
    - xform/》ip/金》/
    - xform/》it/巾》/
    - xform/》iu/丩》/
