    #------------------------------------------------------
    # 轉換聲調
    #------------------------------------------------------
    - xform/》0/輕/   # 無相對映
    - xform/》1/一/   # 上平
    - xform/》2/二/   # 上上
    - xform/》3/三/   # 上去
