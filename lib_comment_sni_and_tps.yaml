# 候選字清單模組程式舘
# 左欄 【十五音】；右欄 〔方音符號〕
# version: "v0.1.0.0"

hau_suan_tuann:
  #==============================================================================
  # 定義【雙標音模式】之【候選字單】
  # 令候選字視窗，可顯示兩組「拼音/注音」
  # 左邊：十五音（雅俗通）；右邊：注音符號。
  #==============================================================================
  __append:
    #======================================================
    # 拼音系統設定
    #======================================================
    # 連續輸入用【拼音分隔符號】換成空白
    - xform/'/ /
    - derive/6/7/
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    - xform/tsh/c/     # ㄘ
    - xform/ts/z/      # ㄗ
    #======================================================
    # 【連續輸入模式】處理：逐一處理每個音節
    #======================================================
    # 先將每個音節用詞界 \b 分別處理
    # 1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    - xform/\b((?:m|ng)\d)\b/【〉Ø$1】〔》Ø$1〕/
    # 2) 零聲母（無聲母）起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/【〉Ø$1】〔》Ø$1〕/
    # 3) 一般情況（有聲母）
    - xform/\b([a-z]+\d)\b/【〉$1】〔》$1〕/
    # 兩對音節之間，以兩個空白隔開
    - xform/〕\s+【/〕  【/
    #------------------------------------------------------
    # 處理鼻音化韻母
    # a/e/i/O/u/uai/iau/ai/au/ia/io/iu/ua/ui
    # 鼻音韻母： ann ==> nna ==> Na ==> Ba ==> ㄥㄚ ==> ㆩ
    # 設定鼻音韻母代表拼音字母 ==> iann = ⁿia = Lia; ann = ⁿa = La
    # --------------------------------------------------------------------------
    - xform/([iu]?(ai|au|oo|[iuaoe]))nn/L$1/
    # --------------------------------------------------------------------------
    # 定義 '聲母' 在 '拼音字母' 與 '方音符號' 對映規則
    # --------------------------------------------------------------------------
    # 處理【零聲母】：在左邊十五音中顯示為「英」，右邊注音符號中消除Ø
    - xform/〉Ø/英〉/     # 左邊十五音顯示：零聲母 → 英
    - xform/(》)Ø/$1/     # 右邊注音符號：消除零聲母標記
    # --------------------------------------------------------------------------
    # 舌齒音（齒齦顎音）
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》j/ㆡ》/
    - xform/》s/ㄙ》/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》ph/ㄆ》/
    - xform/》p(?![h\d])/ㄅ》/
    - xform/》m(?!\d)/ㄇ》/     # m 不僅為聲母，亦為韻化聲母
    - xform/》b/ㆠ》/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/》kh/ㄎ》/
    - xform/》k(?![h\d])/ㄍ》/
    - xform/》ng(?!\d)/ㄫ》/
    - xform/》g/ㆣ》/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/》th/ㄊ》/
    - xform/》t(?![h\d])/ㄉ》/
    - xform/》n(?!g)(?!\d)/ㄋ》/  # 絕對不可將 n 置於 ng 之前
    - xform/》l/ㄌ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h/ㄏ》/
    #------------------------------------------------------
    # 鼻韻符號轉換 La = Lㄚ = ㆩ
    #------------------------------------------------------
    - xform/》Luaih/ㄨㆮㆷ》/
    - xform/》Liah/ㄧㆩㆷ》/
    - xform/》Liau/ㄧㆯ》/
    - xform/》Liuh/ㄧㆫㆷ》/
    - xform/》Luai/ㄨㆮ》/
    - xform/》Lah/ㆩㆷ》/
    - xform/》Lai/ㆮ》/
    - xform/》Leh/ㆥㆷ》/
    - xform/》Lia/ㄧㆩ》/
    - xform/》Lio/ㄧㆧ》/
    - xform/》Liu/ㄧㆫ》/
    - xform/》Loh/ㆧㆷ》/
    - xform/》Lua/ㄨㆩ》/
    - xform/》Lui/ㄨㆪ》/
    - xform/》La/ㆩ》/
    - xform/》Le/ㆥ》/
    - xform/》Li/ㆪ》/
    - xform/》Lo/ㆧ》/
    #------------------------------------------------------
    # 複合複母、元音韻母轉換
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㆷ》/
    - xform/》iong/ㄧㆲ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㆷ》/
    - xform/》uih/ㄨㄧㆷ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㆷ》/
    - xform/》auh/ㄠㆷ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㆷ》/
    - xform/》iam/ㄧㆰ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㆴ》/
    - xform/》iat/ㄧㄚㆵ》/
    - xform/》iak/ㄧㄚㆻ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》ioh/ㄧㄜㆷ》/
    - xform/》iok/ㄧㆦㆻ》/
    - xform/》ooh/ㆦㆷ》/
    - xform/》ong/ㆲ》/
    - xform/》uah/ㄨㄚㆷ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㆵ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㆤㆷ》/
    - xform/》ngh/ㆭㆷ》/
    - xform/》ah/ㄚㆷ》/
    - xform/》am/ㆰ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㆴ》/
    - xform/》at/ㄚㆵ》/
    - xform/》ak/ㄚㆻ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㆤㆷ》/
    - xform/》ih/ㄧㆷ》/
    - xform/》im/ㄧㆬ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/一ㆴ》/
    - xform/》it/ㄧㆵ》/
    - xform/》ik/ㄧㆻ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》oo/ㆦ》/
    - xform/》oh/ㄜㆷ》/
    - xform/》om/ㆱ》/
    - xform/》op/ㆦㆴ》/
    - xform/》ok/ㆦㆻ》/
    - xform/》uh/ㄨㆷ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㆵ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㆤ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㆬㆷ》/
    - xform/》ng/ㆭ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㆤ》/
    - xform/》i/ㄧ》/
    - xform/》o/ㄜ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㆬ》/
    #------------------------------------------------------
    # 校調
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）特例
    # Zi-[zi-], Ci-[ci-], Si-[si-], Ji-[ji-]
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
    #------------------------------------------------------
    - xform/ㄧㆭ/ㄧㄥ/
    - xform/ㄚㆭ/ㄤ/
    - xform/ㆦㆭ/ㆲ/
    - xform/ㄚㆬ/ㆰ/
    - xform/ㆦㆬ/ㆱ/
    #------------------------------------------------------
    # 轉換成聲調符號
    #------------------------------------------------------
    # 將【聲調數值】轉換成【聲調符號】
    # - xform/》1/ˉ/
    - xform/》2/ˋ/
    - xform/》6/ˋ/
    - xform/》3/˪/
    - xform/》5/ˊ/
    - xform/》7/˫/
    - xform/》8/˙/
    - xform/》0/˙/
    - xform/》1//
    - xform/》4//

    #======================================================
    # 十五音
    #======================================================
    # 消除 "零聲母"
    - xform/〉Ø/英〉/
    #------------------------------------------------------
    # 聲母
    #------------------------------------------------------
    # 舌齒音
    # - xform/〉c(?!h)/曾〉/
    # - xform/〉ch/出〉/
    # - xform/〉tsh/出〉/
    # - xform/〉ts(?!h)/曾〉/
    - xform/〉z/曾〉/
    - xform/〉c/出〉/
    - xform/〉j/入〉/
    - xform/〉s/時〉/
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/〉ph/頗〉/
    - xform/〉p(?!h)/邊〉/
    - xform/〉b/門〉/
    # - xform/〉m(?!\d)/毛〉/
    - xform/〉m(?!\d)/門〉/  # m【a】 ==>  [m]
    # 舌根音
    - xform/〉kh/去〉/
    - xform/〉k(?!h)/求〉/
    - xform/〉g/語〉/
    # - xform/〉ng(?!\d)/雅〉/
    - xform/〉ng(?!\d)/語〉/
    # 舌尖音
    - xform/〉th/他〉/
    - xform/〉t(?!h)/地〉/
    - xform/〉n(?!g)(?!\d)/耐〉/
    - xform/〉l/柳〉/
    # 喉音
    - xform/〉h/喜〉/
    #------------------------------------------------------
    # 韻母
    #------------------------------------------------------
    # 泉州腔《彙音妙悟〉十五音韻書
    - xform/〉ir(ng|k)/生〉/
    - xform/〉er(ng|k)/生〉/
    - xform/〉ir(n|t)/恩〉/
    - xform/〉er(n|t)/恩〉/
    - xform/〉ir(m|p)/箴〉/
    - xform/〉ere(h?)/雞〉/
    - xform/〉eru/鉤〉/
    - xform/〉er(h?)/科〉/
    - xform/〉or(h?)/刀〉/
    - xform/〉ir/居〉/
    - xform/〉ur(h?)/高〉/
    #------------------------------------------------------
    # i
    #------------------------------------------------------
    # - xform/〉iauⁿ(h?)/嘄〉/
    - xform/〉Liau(h?)/嘄〉/
    - xform/〉iau(h?)/嬌〉/

    - xform/〉ia(ng|k)/姜〉/
    - xform/〉ia(n|t)/堅〉/
    - xform/〉ia(m|p)/兼〉/

    # - xform/〉iaⁿ/驚〉/
    - xform/〉Lia/驚〉/
    - xform/〉ia(h?)/迦〉/

    # - xform/〉ioⁿ/薑〉/
    - xform/〉Lio/薑〉/
    - xform/〉io(ng|k)/恭〉/
    - xform/〉io(h?)/茄〉/

    # - xform/〉iuⁿ/牛〉/
    - xform/〉Liu/牛〉/
    - xform/〉iu/丩〉/

    - xform/〉i(ng|k)/經〉/
    - xform/〉i(n|t)/巾〉/
    - xform/〉i(m|p)/金〉/

    # - xform/〉iⁿ(h?)/梔〉/
    - xform/〉Li(h?)/梔〉/
    - xform/〉i(h?)/居〉/
    #------------------------------------------------------
    # u
    #------------------------------------------------------
    - xform/〉ua(ng|k)/光〉/
    - xform/〉ua(n|t)/觀〉/

    # - xform/〉uaiⁿ(h?)/閂〉/
    - xform/〉Luai(h?)/閂〉/
    - xform/〉uai(h?)/乖〉/

    # - xform/〉uaⁿ/官〉/
    - xform/〉Lua/官〉/
    - xform/〉ua(h?)(?!n)/瓜〉/

    # - xform/〉uiⁿ/禈〉/
    - xform/〉Lui/禈〉/
    - xform/〉ui(h?)/規〉/

    # - xform/〉ueⁿ/糜〉/
    - xform/〉Lue/糜〉/
    - xform/〉ue(h?)/檜〉/

    - xform/〉u(n|t)/君〉/

    - xform/〉u(h?)/艍〉/
    #------------------------------------------------------
    # a
    #------------------------------------------------------
    # - xform/〉aiⁿ/閒〉/
    - xform/〉Lai/閒〉/
    - xform/〉ai/皆〉/

    # - xform/〉auⁿ/爻〉/
    - xform/〉Lau/爻〉/
    - xform/〉au(h?)/交〉/

    - xform/〉a(ng|k)/江〉/
    - xform/〉a(n|t)/干〉/
    - xform/〉a(m|p)/甘〉/

    # - xform/〉aⁿ(h?)/監〉/
    - xform/〉La(h?)/監〉/
    - xform/〉a(h?)/膠〉/
    #------------------------------------------------------
    # e
    #------------------------------------------------------
    - xform/〉ei/稽〉/
    - xform/〉ee(h?)/嘉〉/

    # - xform/〉eⁿ(h?)/更〉/
    - xform/〉Le(h?)/更〉/
    - xform/〉e(h?)/伽〉/
    #------------------------------------------------------
    # oo
    #------------------------------------------------------
    - xform/〉o(ng|k)/公〉/
    - xform/〉o(m|p)/箴〉/

    # - xform/〉ooⁿ/姑〉/
    - xform/〉oo(h?)/沽〉/
    # - xform/〉Loo/姑〉/
    - xform/〉Lo/姑〉/
    #------------------------------------------------------
    # o
    # 停用 `江(oⁿ)` ，併入 `姑(oⁿ/ooⁿ)`
    # - xform/〉oⁿ(h?)/扛〉/
    #------------------------------------------------------
    # - xform/〉oⁿ(h?)/姑〉/
    - xform/〉Lo(h?)/姑〉/
    - xform/〉o(h?)/高〉/
    #------------------------------------------------------
    # m, ng
    #------------------------------------------------------
    - xform/〉m/姆〉/
    - xform/〉ng/鋼〉/
    #------------------------------------------------------
    # 轉換聲調
    #------------------------------------------------------
    - xform/〉0/輕/   # 無相對映
    - xform/〉1/一/   # 上平
    - xform/〉2/二/   # 上上
    - xform/〉3/三/   # 上去
    - xform/〉4/四/   # 上入
    - xform/〉5/五/   # 下平
    - xform/〉6/六/   # 下上
    - xform/〉7/七/   # 下去
    - xform/〉8/八/   # 下入
