# 候選字清單模組程式舘
# 左欄 【十五音】；右欄 〔方音符號〕
# version: "v0.1.0.1"

hau_suan_tuann:
  #============================================================================
  # 定義【雙欄式】之【候選字單】
  # 左欄：台語音標（TLPA）；右欄：方音符號（TFS）
  #============================================================================
  __append:
    #==========================================================================
    # 拼音系統校調
    #==========================================================================
    # 連續輸入用【拼音分隔符號】換成空白
    - xform/'/ /
    # 多重空白壓成一格（美化）
    - xform/\s+/ /
    #==========================================================================
    # 聲調校調
    #==========================================================================
    # 【陽上調（6）】視作【陽去調（7）】
    - xform/6/7/
    #==========================================================================
    # 韻母校調
    #==========================================================================
    # - xform/iek/ik/
    # - xform/ur/u/
    # - xform/or/o/
    # - xform/ou/oo/
    #------------------------------------------------------
    # 組合韻母
    # - xform/([iu]?(?:ai|au|oo|[aiueo]))/$1/
    #------------------------------------------------------
    # 鼻化韻母轉換：改 nn 後綴，成 n 前綴
    # ann ==>  La ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    # 台羅拼音：onn ；台語注音二式：oonn
    # 台羅拼音：o ；台語注音二式：or
    #------------------------------------------------------
    # - xform/([iu]?(?:ai|au|oo|[aiueo]))nn/L$1/
    #==========================================================================
    # 声母校調
    #==========================================================================
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    # - xform/tsh/c/     # ㄘ
    # - xform/ts/z/      # ㄗ

    #==========================================================================
    # 【候選清單】漢字標音格式化
    #==========================================================================
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/【》Ø$1】〔〉Ø$1〕/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    # - xform/\b(L([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d))\b/【》Ø$1】〔〉Ø$1〕/
    - xform/\b(([iu]?(?:ai|au|oo|[aiueo]nn)[a-z]*\d))\b/【》Ø$1】〔〉Ø$1〕/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/【》Ø$1】〔〉Ø$1〕/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/【》$1】〔〉$1〕/

    #==========================================================================
    # 【注音系統】声母轉換作業
    #==========================================================================
    # 舌齒音（齒齦顎音）
    - xform/〔〉ts(?!h)/〔ㄗ〉/
    - xform/〔〉tsh/〔ㄘ〉/
    - xform/〔〉j/〔ㆡ〉/
    - xform/〔〉s/〔ㄙ〉/
    # --------------------------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/〔〉ph/〔ㄆ〉/
    - xform/〔〉p(?![h\d])/〔ㄅ〉/
    - xform/〔〉m(?!\d)/〔ㄇ〉/     # m 不僅為聲母，亦為韻化聲母
    - xform/〔〉b/〔ㆠ〉/
    # --------------------------------------------------------------------------
    # 舌尖音（齒齦音）
    - xform/〔〉th/〔ㄊ〉/
    - xform/〔〉t(?![h\d])/〔ㄉ〉/
    - xform/〔〉n(?!g)/〔ㄋ〉/  # 絕對不可將 n 置於 ng 之前
    - xform/〔〉l/〔ㄌ〉/
    # --------------------------------------------------------------------------
    # 舌根音（軟顎音）
    - xform/〔〉kh/〔ㄎ〉/
    - xform/〔〉k(?![h\d])/〔ㄍ〉/
    - xform/〔〉ng(?!\d)/〔ㄫ〉/
    - xform/〔〉g/〔ㆣ〉/
    #------------------------------------------------------
    # 喉音
    - xform/〔〉h/〔ㄏ〉/

    #--------------------------------------------------------------------------
    # 零聲母特別處理
    #--------------------------------------------------------------------------
    # 音節以〔韻化輔音】開始
    - xform/〔〉Øm(\d)$/〔ㆬ〉$1/
    - xform/〔〉Øng(\d)$/〔ㆭ〉$1/
    #------------------------------------------------------
    # 消除〔零聲母】
    - xform/〔〉Ø/〔Ø〉/

    #==========================================================================
    # 【注音系統】韻母轉換作業
    #==========================================================================
    # 鼻化韻母轉換
    #------------------------------------------------------
    - xform/〉uainnh/ㄨㆮㆷ〉/
    - xform/〉iannh/ㄧㆩㆷ〉/
    - xform/〉iaunn/ㄧㆯ〉/
    - xform/〉iunnh/ㄧㆫㆷ〉/
    - xform/〉uainn/ㄨㆮ〉/
    - xform/〉ainn/ㆮ〉/
    - xform/〉annh/ㆩㆷ〉/
    - xform/〉ennh/ㆥㆷ〉/
    - xform/〉iann/ㄧㆩ〉/
    - xform/〉ionn/ㄧㆧ〉/
    - xform/〉iunn/ㄧㆫ〉/
    - xform/〉onnh/ㆧㆷ〉/
    - xform/〉ann/ㆩ〉/
    - xform/〉enn/ㆥ〉/
    - xform/〉inn/ㆪ〉/
    - xform/〉uih/ㄨㄧㆷ〉/

    #------------------------------------------------------
    # 複合複母、元音韻母轉換
    #------------------------------------------------------
    - xform/〉iang/ㄧㄤ〉/
    - xform/〉iauh/ㄧㄠㆷ〉/
    - xform/〉iong/ㄧㆲ〉/
    - xform/〉uaih/ㄨㄞㆷ〉/
    - xform/〉uang/ㄨㄤ〉/
    - xform/〉uann/ㄨㆩ〉/
    - xform/〉uinn/ㄨㆪ〉/
    - xform/〉aih/ㄞㆷ〉/
    - xform/〉ang/ㄤ〉/
    - xform/〉auh/ㄠㆷ〉/
    - xform/〉iah/ㄧㄚㆷ〉/
    - xform/〉iak/ㄧㄚㆻ〉/
    - xform/〉iam/ㄧㆰ〉/
    - xform/〉ian/ㄧㄢ〉/
    - xform/〉iap/ㄧㄚㆴ〉/
    - xform/〉iat/ㄧㄚㆵ〉/
    - xform/〉iau/ㄧㄠ〉/
    - xform/〉ing/ㄧㄥ〉/
    - xform/〉ioh/ㄧㄜㆷ〉/
    - xform/〉iok/ㄧㆦㆻ〉/
    - xform/〉ngh/ㆭㆷ〉/
    - xform/〉ong/ㆲ〉/
    - xform/〉onn/ㆧ〉/
    - xform/〉ooh/ㆦㆷ〉/
    - xform/〉uah/ㄨㄚㆷ〉/
    - xform/〉uai/ㄨㄞ〉/
    - xform/〉uan/ㄨㄢ〉/
    - xform/〉uat/ㄨㄚㆵ〉/
    - xform/〉ueh/ㄨㆤㆷ〉/
    - xform/〉ah/ㄚㆷ〉/
    - xform/〉ai/ㄞ〉/
    - xform/〉ak/ㄚㆻ〉/
    - xform/〉am/ㆰ〉/
    - xform/〉an/ㄢ〉/
    - xform/〉ap/ㄚㆴ〉/
    - xform/〉at/ㄚㆵ〉/
    - xform/〉au/ㄠ〉/
    - xform/〉eh/ㆤㆷ〉/
    - xform/〉ia/ㄧㄚ〉/
    - xform/〉ih/ㄧㆷ〉/
    - xform/〉ik/ㄧㆻ〉/
    - xform/〉im/ㄧㆬ〉/
    - xform/〉in/ㄧㄣ〉/
    - xform/〉io/ㄧㄜ〉/
    - xform/〉ip/一ㆴ〉/
    - xform/〉it/ㄧㆵ〉/
    - xform/〉iu/ㄧㄨ〉/
    - xform/〉mh/ㆬㆷ〉/
    - xform/〉ng/ㆭ〉/
    - xform/〉oh/ㄜㆷ〉/
    - xform/〉ok/ㆦㆻ〉/
    - xform/〉om/ㆱ〉/
    - xform/〉oo/ㆦ〉/
    - xform/〉op/ㆦㆴ〉/
    - xform/〉ua/ㄨㄚ〉/
    - xform/〉ue/ㄨㆤ〉/
    - xform/〉uh/ㄨㆷ〉/
    - xform/〉ui/ㄨㄧ〉/
    - xform/〉un/ㄨㄣ〉/
    - xform/〉ut/ㄨㆵ〉/
    - xform/〉a/ㄚ〉/
    - xform/〉ei/ㆤ〉/
    - xform/〉i/ㄧ〉/
    - xform/〉m/ㆬ〉/
    - xform/〉o/ㄜ〉/
    - xform/〉u/ㄨ〉/

    #------------------------------------------------------
    # 校調
    #------------------------------------------------------
    # 舌齒音（齒齦顎音）特例
    # Zi-[zi-], Ci-[ci-], Si-[si-], Ji-[ji-]
    - xform/ㄗ(ㄧ|ㆪ)/ㄐ$1/
    - xform/ㄘ(ㄧ|ㆪ)/ㄑ$1/
    - xform/ㄙ(ㄧ|ㆪ)/ㄒ$1/
    - xform/ㆡ(ㄧ|ㆪ)/ㆢ$1/
    #------------------------------------------------------
    - xform/ㄧㆭ/ㄧㄥ/
    - xform/ㄚㆭ/ㄤ/
    - xform/ㆦㆭ/ㆲ/
    - xform/ㄚㆬ/ㆰ/
    - xform/ㆦㆬ/ㆱ/

    #======================================================
    # 【注音系統】聲調轉換作業
    #======================================================
    # - xform/〉1/ˉ/
    - xform/〉2/ˋ/
    - xform/〉6/ˋ/
    - xform/〉3/˪/
    - xform/〉5/ˊ/
    - xform/〉7/˫/
    - xform/〉8/˙/
    - xform/〉0/˙/
    - xform/〉1//
    - xform/〉4//

    #======================================================
    # 終結校調
    #======================================================
    # 消除【零聲母】
    - xform/〔Ø/〔/

    #==========================================================================
    # 【十五音系統】轉換作業
    #==========================================================================
    # 消除 "零聲母"
    - xform/【》Ø/【英》/
    #------------------------------------------------------
    # 聲母
    #------------------------------------------------------
    # 舌齒音
    # - xform/》c(?!h)/曾》/
    # - xform/》ch/出》/
    # - xform/》tsh/出》/
    # - xform/》ts(?!h)/曾》/
    - xform/【》ts(?!h)/【曾》/
    - xform/【》tsh/【出》/
    - xform/【》j/【入》/
    - xform/【》s/【時》/
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/【》ph/【頗》/
    - xform/【》p(?!h)/【邊》/
    - xform/【》b/【門》/
    # - xform/【》m(?!\d)【/【門》/  # m【a】 ==>  [m]
    - xform/【》m(?!\【d)/【毛》/
    # 舌尖音
    - xform/【》th/【他》/
    - xform/【》t(?!h)/【地》/
    - xform/【》n(?!g)/【耐》/
    - xform/【》l/【柳》/
    # 舌根音
    - xform/【》kh/【去》/
    - xform/【》k(?!h)/【求》/
    - xform/【》g/【語》/
    # - xform/【》ng(?!\d)/【語》/
    - xform/【》ng(?!\d)/【雅》/
    # 喉音
    - xform/【》h/【喜》/
    #------------------------------------------------------
    # 韻母
    #------------------------------------------------------
    # # 泉州腔《彙音妙悟》十五音韻書
    # - xform/》ir(ng|k)/生》/
    # - xform/》er(ng|k)/生》/
    # - xform/》ir(n|t)/恩》/
    # - xform/》er(n|t)/恩》/
    # - xform/》ir(m|p)/箴》/
    # - xform/》ere(h?)/雞》/
    # - xform/》eru/鉤》/
    # - xform/》er(h?)/科》/
    # - xform/》or(h?)/刀》/
    # - xform/》ir/居》/
    # - xform/》ur(h?)/高》/
    #------------------------------------------------------
    # 鼻化韻母轉換
    #------------------------------------------------------
    - xform/》uainnh/閂》/
    - xform/》iannh/迦》/
    - xform/》iaunn/嘄》/
    - xform/》iunnh/牛》/
    - xform/》uainn/閂》/
    - xform/》ainn/閒》/
    - xform/》annh/監》/
    - xform/》ennh/更》/
    - xform/》iann/驚》/
    - xform/》ionn/薑》/
    - xform/》iunn/牛》/
    - xform/》onnh/扛》/
    - xform/》ann/監》/
    - xform/》enn/更》/
    - xform/》inn/梔》/
    - xform/》uih/褌》/

    #------------------------------------------------------
    # 複合/元音韻母轉換
    #------------------------------------------------------
    - xform/》iang/姜》/
    - xform/》iauh/嬌》/
    - xform/》iong/恭》/
    - xform/》uaih/乖》/
    - xform/》uang/光》/
    - xform/》uann/官》/
    - xform/》uinn/褌》/
    - xform/》aih/皆》/
    - xform/》ang/江》/
    - xform/》auh/交》/
    - xform/》iah/迦》/
    - xform/》iak/姜》/
    - xform/》iam/兼》/
    - xform/》ian/堅》/
    - xform/》iap/兼》/
    - xform/》iat/堅》/
    - xform/》iau/嬌》/
    - xform/》ing/經》/
    - xform/》ioh/茄》/
    - xform/》iok/恭》/
    - xform/》ngh/鋼》/
    - xform/》ong/公》/
    - xform/》onn/姑》/
    - xform/》ooh/沽》/
    - xform/》uah/瓜》/
    - xform/》uai/乖》/
