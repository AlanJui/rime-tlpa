# 【候選清單】程式舘：台語音標（TLPA）
# lib_comment_tlpa.yaml
# version: "v0.1.0"
hau_suan_tuann:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
  __append:
    #==========================================================================
    # 格式校調
    #==========================================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）
    #==========================================================================
    # 聲調轉換
    #==========================================================================
    # - xform/6/7/ # 聲調 6 改為 7
    #==========================================================================
    #  韻母轉換
    #==========================================================================
    # - xform/iek/ik/
    # - xform/ur/u/
    # - xform/ou/oo/
    # - xform/ee/e/

    #==========================================================================
    # 【候選清單】漢字標音格式化
    #--------------------------------------------------------------------------
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    # 5. 聲母 + 韻母 + 調號，如：liu2, long5, ...
    #==========================================================================
    # 零聲母 + 韻化輔音（m/ng號） + 調號
    - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 鼻化元音/複合韻母 + 調號: ni1, niu2, nuai1, ...
    - xform/\b(n([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d))\b/〔〉Ø$1〕 【》Ø$1】/
    # 零聲母 + 元音/複合韻母 + 調號: i1, iu2, uai1, ...
    - xform/\b([iu]?(?:ai|ao|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 聲母 + 韻母 + 調號
    - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/

    #==========================================================================
    # 【拼音系統】声母轉換作業：台羅拼音（TL）轉換成台語音標（TLPA）
    #==========================================================================
    # 聲母轉換
    - xform/〔〉tsh/〔c/
    - xform/〔〉ts/〔z/
    #==========================================================================
    # 【拼音系統】韻母轉換作業
    #==========================================================================
    - xform/〔〉Ø/〔Ø〉/
    #==========================================================================
    # 【拼音系統】聲調轉換作業
    #==========================================================================
    #
    #==========================================================================
    # 【拼音系統】終結校調
    #==========================================================================
    # 消除【指標符號】
    - xform/〉//
    # 消除【零聲母】識別符號 Ø
    - xform/〔Ø/〔/

    #==========================================================================
    # 注音系統【聲母】轉換：台羅拼音（TL）轉換成台語注音（TLPA 注音符號）
    #==========================================================================
    - xform/【》tsh/【ㄘ》/
    - xform/【》ts/【ㄗ》/
    - xform/【》j/【ㄖ》/
    - xform/【》s/【ㄙ》/
    #------------------------------------------------------
    - xform/【》ng(?!\d)/【⁰ㄫ》/
    - xform/【》n(?!\d)/【ㄋ》/
    - xform/【》m(?!\d)/【ㄇ》/
    #------------------------------------------------------
    - xform/【》ph/【ㄆ》/
    - xform/【》th/【ㄊ》/
    - xform/【》kh/【ㄎ》/
    - xform/【》g/【ㄫ》/
    - xform/【》b/【ㄪ》/
    - xform/【》j/【ㄖ》/
    - xform/【》z/【ㄗ》/
    - xform/【》s/【ㄙ》/
    - xform/【》c/【ㄘ》/
    - xform/【》l/【ㄌ》/
    - xform/【》p/【ㄅ》/
    - xform/【》k/【ㄍ》/
    - xform/【》t/【ㄉ》/
    - xform/【》h/【ㄏ》/
    #------------------------------------------------------
    # 零聲母特別處理
    #------------------------------------------------------
    # 音節以【韻化輔音】開始
    - xform/【》Øm(\d)$/【ㆬ》$1/
    - xform/【》Øng(\d)$/【ㆭ》$1/
    #------------------------------------------------------
    # 【轉換指標】自【聲母】，移往【韻母】
    - xform/【》Ø/【Ø》/

    #==========================================================================
    # 注音系統【韻母】轉換：台羅拼音（TL）轉換成台語注音（TLPA 注音符號）
    #==========================================================================
    # 音節以【鼻音韻母】開頭
    - xform/》([iu]?(?:ai|au|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》Luaih/⁰ㄨㄞㄏ》/
    - xform/》Liah/⁰ㄧㄚㄏ》/
    - xform/》Liau/⁰ㄧㄠ》/
    - xform/》Liuh/⁰ㄧㄨㄏ》/
    - xform/》Luai/⁰ㄨㄞ》/
    - xform/》Lah/⁰ㄚㄏ》/
    - xform/》Lai/⁰ㄞ》/
    - xform/》Leh/⁰ㄝㄏ》/
    - xform/》Lia/⁰ㄧㄚ》/
    - xform/》Lio/⁰ㄧㄛ》/
    - xform/》Liu/⁰ㄧㆫ》/
    - xform/》Loh/⁰ㄛㄏ》/
    - xform/》Lua/⁰ㄨㄚ》/
    - xform/》Lui/⁰ㄨㄧ》/
    - xform/》La/⁰ㄚ》/
    - xform/》Le/⁰ㄝ》/
    - xform/》Li/⁰ㄧ》/
    - xform/》Lo/⁰ㄛ》/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    # 音節以【韻母】開頭
    - xform/》([iu]?(?:ai|au|oo|[aeiou]))/》$1/
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㄏ》/
    - xform/》iong/ㄧㄛㄥ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㄏ》/
    - xform/》uih/ㄨㄧㄏ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㄏ》/
    - xform/》auh/ㄠㄏ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㄏ》/
    - xform/》iam/ㄧㄚㄇ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㄅ》/
    - xform/》iat/ㄧㄚㄉ》/
    - xform/》iak/ㄧㄚㄍ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》ioh/ㄧㄜㄏ》/
    - xform/》iok/ㄧㄛㄍ》/
    - xform/》ooh/ㄛㄏ》/
    - xform/》ong/ㄛㄥ》/
    - xform/》uah/ㄨㄚㄏ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㄉ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㄝㄏ》/
    - xform/》ngh/ㄥㄏ》/
    - xform/》ah/ㄚㄏ》/
    - xform/》am/ㄚㄇ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㄅ》/
    - xform/》at/ㄚㄉ》/
    - xform/》ak/ㄚㄍ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㄝㄏ》/
    - xform/》ih/ㄧㄏ》/
    - xform/》im/ㄧㄇ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/ㄧㄅ》/
    - xform/》it/ㄧㄉ》/
    - xform/》ik/ㄧㄍ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》ng/ㄥ》/
    - xform/》oo/ㄛ》/
    - xform/》oh/ㄜㄏ》/
    - xform/》om/ㄛㄇ》/
    - xform/》op/ㄛㄅ》/
    - xform/》ok/ㄛㄍ》/
    - xform/》uh/ㄨㄏ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㄉ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㄝ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㄇㄏ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㄝ》/
    - xform/》i/ㄧ》/
    - xform/》o/ㄜ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㄇ》/
    #======================================================
    # 【聲調】
    #======================================================
    # - xform/》6/⁷/    # 6
    - xform/》0/⁰/    # 0
    - xform/》1/¹/    # 1
    - xform/》7/⁷/    # 7
    - xform/》3/³/    # 3
    - xform/》2/²/    # 2
    - xform/》5/⁵/    # 5
    - xform/》4/⁴/    # 4
    - xform/》8/⁸/    # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㄖ(ㄧ|⁰ㄧ)/ㄖ$1/
    - xform/ㄗ(ㄧ|⁰ㄧ)/ㄐ$1/
    - xform/ㄘ(ㄧ|⁰ㄧ)/ㄑ$1/
    - xform/ㄙ(ㄧ|⁰ㄧ)/ㄒ$1/

    #==========================================================================
    # 【注音系統】終結校調
    #==========================================================================
    # 消除【指標符號】
    - xform/》//
    # 消除【零聲母】識別符號 Ø
    - xform/【Ø/【/