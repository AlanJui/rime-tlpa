# 【候選清單】程式舘：台語音標（TLPA）
# lib_comment_tlpa.yaml
# version: "v0.0.0.1"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    # ---- 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔$1〕【$1】/
    # --------------------------------------------------------------------------
    # 聲調
    # --------------------------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    #======================================================
    # 左欄：台語音標（TLPA）
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    # - xform/》(?:ph|th|kh|ng|[pmbtnlkghzcsj])(.*)(\d)$/$1$2》$3〕/
