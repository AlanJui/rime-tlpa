# 【候選清單】程式舘：台語音標（TLPA）
# lib_comment_tlpa.yaml
# version: "v0.0.0.1"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    #==============================================================================
    # ---- 複製原始音標（左欄使用〔〕進行後續轉換，右欄【】保持原樣） ----
    - xform/^(.*)$/〔$1〕【》$1】/
    # --------------------------------------------------------------------------
    # 左欄【聲母】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    - xform/(〔)tsh/${1}c/
    - xform/(〔)ts/${1}z/
    # --------------------------------------------------------------------------
    # 左欄【韻母】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    # - xform/ou/oo/
    # - xform/iek/ik/
    # --------------------------------------------------------------------------
    # 左欄【聲調】校調：台羅拼音（TL） → 台語音標（TLPA）
    # --------------------------------------------------------------------------
    # - xform/6/7/ # 聲調 6 改為 7
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    #======================================================
    # 右欄：台語注音符號（TLPA 注音符號）
    #======================================================
    # 拆解【聲母】+【韻母】+【聲調】
    - xform/【》(?:ph|th|kh|ts|ng|[pmbtnlkghsj])(.*)(\d)$/【》$1$2$3/

    #======================================================
    # 声母轉換作業
    #======================================================
    # 【零聲母】轉換
    # 1. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    # 2. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 3. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 4. 零聲母 + 韻化輔音 + 調號，如：【不】Øm2, 【黄】Øng5, ...
    #------------------------------------------------------
    # - xform/》Ø/英》/
    # 音節以【鼻音韻母】開頭
    - xform/【》([iu]?(ai|au|[aiueo]))nn/【》L$1/
    # 音節以【韻母】開頭
    - xform/【》([iu]?(ai|au|oo|[aeiou]))/【》$1/
    # 音節以【韻化輔音】開始
    - xform/【》(m)(\d)$/【ㄇ》$2/
    - xform/【》(ng)(\d)$/【ㄥ》$2/
    #======================================================
    - xform/【》tsh/【ㄘ》/
    - xform/【》ts/【ㄗ》/
    - xform/【》j/【ㄖ》/
    - xform/【》s/【ㄙ》/
    #------------------------------------------------------
    - xform/【》ng(?!\d)/【⁰ㄫ》/
    - xform/【》n(?!\d)/【ㄋ》/
    - xform/【》m(?!\d)/【ㄇ》/
    #------------------------------------------------------
    - xform/》ph/ㄆ》/
    - xform/》th/ㄊ》/
    - xform/》kh/ㄎ》/
    - xform/》g/ㄫ》/
    - xform/》b/ㄪ》/
    - xform/》j/ㄖ》/
    - xform/》z/ㄗ》/
    - xform/》s/ㄙ》/
    - xform/》c/ㄘ》/
    - xform/》l/ㄌ》/
    - xform/》p/ㄅ》/
    - xform/》k/ㄍ》/
    - xform/》t/ㄉ》/
    - xform/》h/ㄏ》/
    #======================================================
    # 韻母轉換作業
    #======================================================
    #
    #------------------------------------------------------
    # 【鼻音韻母】使用之【識別符號】變更成【前綴識別】
    # 鼻音韻母： ann ==>  Na ==> ㄥㄚ ==> ㆩ
    # (a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui) + nn
    #------------------------------------------------------
    - xform/》([iu]?(ai|au|[aiueo]))nn/》L$1/
    #------------------------------------------------------
    - xform/》Luaih/⁰ㄨㄞㄏ》/
    - xform/》Liah/⁰ㄧㄚㄏ》/
    - xform/》Liau/⁰ㄧㄠ》/
    - xform/》Liuh/⁰ㄧㄨㄏ》/
    - xform/》Luai/⁰ㄨㄞ》/
    - xform/》Lah/⁰ㄚㄏ》/
    - xform/》Lai/⁰ㄞ》/
    - xform/》Leh/⁰ㄝㄏ》/
    - xform/》Lia/⁰ㄧㄚ》/
    - xform/》Lio/⁰ㄧㄛ》/
    - xform/》Liu/⁰ㄧㆫ》/
    - xform/》Loh/⁰ㄛㄏ》/
    - xform/》Lua/⁰ㄨㄚ》/
    - xform/》Lui/⁰ㄨㄧ》/
    - xform/》La/⁰ㄚ》/
    - xform/》Le/⁰ㄝ》/
    - xform/》Li/⁰ㄧ》/
    - xform/》Lo/⁰ㄛ》/
    #------------------------------------------------------
    # 元音韻母/複合韻母轉換
    #------------------------------------------------------
    - xform/》iang/ㄧㄤ》/
    - xform/》iauh/ㄧㄠㄏ》/
    - xform/》iong/ㄧㄛㄥ》/
    - xform/》uang/ㄨㄤ》/
    - xform/》uaih/ㄨㄞㄏ》/
    - xform/》uih/ㄨㄧㄏ》/
    - xform/》ang/ㄤ》/
    - xform/》aih/ㄞㄏ》/
    - xform/》auh/ㄠㄏ》/
    - xform/》ing/ㄧㄥ》/
    - xform/》iah/ㄧㄚㄏ》/
    - xform/》iam/ㄧㄚㄇ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》iap/ㄧㄚㄅ》/
    - xform/》iat/ㄧㄚㄉ》/
    - xform/》iak/ㄧㄚㄍ》/
    - xform/》iau/ㄧㄠ》/
    - xform/》ioh/ㄧㄜㄏ》/
    - xform/》iok/ㄧㄛㄍ》/
    - xform/》ooh/ㄛㄏ》/
    - xform/》ong/ㄛㄥ》/
    - xform/》uah/ㄨㄚㄏ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》uat/ㄨㄚㄉ》/
    - xform/》uai/ㄨㄞ》/
    - xform/》ueh/ㄨㄝㄏ》/
    - xform/》ngh/ㄥㄏ》/
    - xform/》ah/ㄚㄏ》/
    - xform/》am/ㄚㄇ》/
    - xform/》an/ㄢ》/
    - xform/》ap/ㄚㄅ》/
    - xform/》at/ㄚㄉ》/
    - xform/》ak/ㄚㄍ》/
    - xform/》ai/ㄞ》/
    - xform/》au/ㄠ》/
    - xform/》eh/ㄝㄏ》/
    - xform/》ih/ㄧㄏ》/
    - xform/》im/ㄧㄇ》/
    - xform/》in/ㄧㄣ》/
    - xform/》ip/ㄧㄅ》/
    - xform/》it/ㄧㄉ》/
    - xform/》ik/ㄧㄍ》/
    - xform/》ia/ㄧㄚ》/
    - xform/》io/ㄧㄜ》/
    - xform/》iu/ㄧㄨ》/
    - xform/》ng/ㄥ》/
    - xform/》oo/ㄛ》/
    - xform/》oh/ㄜㄏ》/
    - xform/》om/ㄛㄇ》/
    - xform/》op/ㄛㄅ》/
    - xform/》ok/ㄛㄍ》/
    - xform/》uh/ㄨㄏ》/
    - xform/》un/ㄨㄣ》/
    - xform/》ut/ㄨㄉ》/
    - xform/》ua/ㄨㄚ》/
    - xform/》ue/ㄨㄝ》/
    - xform/》ui/ㄨㄧ》/
    - xform/》mh/ㄇㄏ》/
    - xform/》a/ㄚ》/
    - xform/》e/ㄝ》/
    - xform/》i/ㄧ》/
    - xform/》o/ㄜ》/
    - xform/》u/ㄨ》/
    - xform/》m/ㄇ》/
    #======================================================
    # 【聲調】
    #======================================================
    # 台語音標的【注音符號】，其【調號】值，使用【上標數值】格式顯示
    - xform/》1/¹/    # 1
    - xform/》6/⁷/    # 6
    - xform/》7/⁷/    # 7
    - xform/》3/³/    # 3
    - xform/》2/²/    # 2
    - xform/》5/⁵/    # 5
    - xform/》4/⁴/    # 4
    - xform/》8/⁸/    # 8
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    # - xform/ㄖ(ㄧ|⁰ㄧ)/ㄖ$1/
    - xform/ㄗ(ㄧ|⁰ㄧ)/ㄐ$1/
    - xform/ㄘ(ㄧ|⁰ㄧ)/ㄑ$1/
    - xform/ㄙ(ㄧ|⁰ㄧ)/ㄒ$1/
