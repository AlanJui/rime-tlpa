name: "Build & Release YAML bundles (ALL / Phing-Im / Zu-Im / Huan-Ciat)"

permissions:
  contents: write # ★ 讓 GITHUB_TOKEN 可發 Release / 建 tag

on:
  push:
    tags:
      - "v*"
      - "kb-*"
      - "bp-*"
      - "zu-*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch 或 commit（例：main／a1b2c3d）"
        required: true
        default: "main"
      tag_name:
        description: "Release tag（例：v0.9.0）"
        required: true
      prerelease:
        description: "是否標示為 pre-release"
        type: boolean
        required: false
        default: false

jobs:
  build-bundles:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.meta.outputs.TAG }}
      REF: ${{ steps.meta.outputs.REF }}
    steps:
      - name: Resolve ref / tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF="${{ github.event.inputs.ref }}"
            TAG="${{ github.event.inputs.tag_name }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            REF="${{ github.ref_name }}"
            TAG="${{ github.ref_name }}"
            PRERELEASE="false"
          fi

          # 去除前後空白
          TAG="$(echo -n "$TAG" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          # tag_name 驗證（方案 A：寬鬆版）
          if [[ -z "$TAG" ]]; then
            echo "::error::tag_name is required"
            exit 1
          fi
          if [[ ! "$TAG" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid tag_name '$TAG' — only A-Z, a-z, 0-9, '.', '_', '/', '-' are allowed (no spaces). 範例：v0.1.0-alpha"
            exit 1
          fi

          echo "REF=$REF" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "PRERELEASE=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Resolved REF=$REF, TAG=$TAG, PRERELEASE=$PRERELEASE"

      - name: Checkout repository at ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.REF }}

      - name: Build 4 bundles (ALL/Phing-Im/Zu-Im/Huan-Ciat)
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob nocaseglob

          echo "== [DEBUG] pwd: $(pwd) =="
          ls -l *.yaml || true

          PREFIX=""   # 若檔案不在根目錄，改成例如：PREFIX="rime/"

          mkdir -p dist

          # ---------- helper：解析清單檔 → 輸出排序去重後的實檔路徑 ----------
          # 功能：
          #   - 自動去除 BOM、Windows 換行(\r)、前後空白
          #   - 略過空行與 # 註解
          #   - 反斜線(\) 自動轉為 (/)
          #   - 支援 glob（如 lua/*.lua）
          #   - 找不到對應檔案會發 ::warning::
          resolve_list() {
            local listfile="$1"
            local outfile="$2"
            local label="$3"

            : > "$outfile"
            if [[ ! -f "$listfile" ]]; then
              echo "::warning::${label}: $listfile not found, list is empty"
              return
            fi

            echo ">>> Resolving ${label} from $listfile"
            awk 'NR==1{sub(/^\xef\xbb\xbf/,"")}{print}' "$listfile" \
              | sed -e 's/\r$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
              | sed -e '/^$/d' -e '/^#/d' \
              | tr '\\' '/' \
              | while read -r p; do
                  [[ -z "$p" ]] && continue
                  found=0
                  for f in ${PREFIX}${p}; do
                    if [[ -f "$f" ]]; then
                      echo "$f"
                      found=1
                    fi
                  done
                  if [[ $found -eq 0 ]]; then
                    echo "::warning::${label}: Missing pattern: ${PREFIX}${p}" >&2
                  fi
                done | sort -u > "$outfile"
          }

          # ---------- helper：打包 zip + 產生 sha256 ----------
          make_zip() {
            local name="$1"; shift
            local listfile="$1"; shift
            local zip="dist/rime-tlpa-${name}-${TAG}.zip"

            if [[ -s "$listfile" ]]; then
              echo ">>> Packing ${name} ($(wc -l < "$listfile") files)"
              zip "$zip" -@ < "$listfile" >/dev/null
              (cd dist && sha256sum "$(basename "$zip")" > "$(basename "$zip").sha256")
              ls -lh "dist/$(basename "$zip")"
            else
              echo "::warning::Skip ${name} (no files)"
            fi
          }

          # ---------- 解析四個 bundle 清單 ----------
          # 每個 release-*.txt 為自含清單（包含其 bundle 所需的全部檔案）
          resolve_list "release-include.txt"   "dist/all.final"       "ALL"
          resolve_list "release-phing_im.txt"  "dist/phing_im.final"  "PhingIm"
          resolve_list "release-zu_im.txt"     "dist/zu_im.final"     "ZuIm"
          resolve_list "release-huan_ciat.txt" "dist/huan_ciat.final" "HuanCiat"

          echo "== COUNT =="
          echo "ALL: $(wc -l < dist/all.final) | PHING_IM: $(wc -l < dist/phing_im.final) | ZU_IM: $(wc -l < dist/zu_im.final) | HUAN_CIAT: $(wc -l < dist/huan_ciat.final)"

          # ---------- 打包 ----------
          make_zip "all"       "dist/all.final"
          make_zip "phing_im"  "dist/phing_im.final"
          make_zip "zu_im"     "dist/zu_im.final"
          make_zip "huan_ciat" "dist/huan_ciat.final"

      - name: Create / Update GitHub Release + upload 4 assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.TAG }}
          target_commitish: ${{ steps.meta.outputs.REF }}
          prerelease: ${{ github.event.inputs.prerelease || false }} # ← 布林，不用字串
          files: |
            dist/*.zip
            dist/*.sha256

  build-installer:
    needs: build-bundles
    runs-on: windows-latest
    steps:
      - name: Checkout repository at ref
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.build-bundles.outputs.REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build RIME_TLPA_Installer.exe
        run: pyinstaller RIME_TLPA_Installer.spec

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-bundles.outputs.TAG }}
          files: dist/RIME_TLPA_Installer.exe
