    #==============================================================================
    # 雙欄【候選清單】
    # 左欄：注音符號（TPS）；右欄：台語注音二式（BPM2）。
    #==============================================================================
    # ---- 0. 複製原始音標（左欄使用【】進行後續轉換，右欄〔〕保持原樣） ----
    - xform/^(.*)$/【》$1】〔$1〕/

    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /

    #------------------------------------------------------
    # 聲母
    #------------------------------------------------------
    - xform/》Ø/》/
    - xform/》jji/ㆢ》/
    - xform/》chi/ㄑ》/
    - xform/》shi/ㄒ》/
    - xform/》zz/ㆡ》/
    - xform/》bb/ㆠ》/
    - xform/》gg/ㆣ》/
    - xform/》ng/ㄫ》/
