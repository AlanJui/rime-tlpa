# 【候選清單】程式舘：【雙欄式】白話字（POJ）+注音符號（TPS）
# lib_comment_poj_and_tps.yaml
# version: "v0.1.0.0"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 雙欄【候選清單】
    # 左欄：白話字；右欄：注音符號。
    #==============================================================================
    #
    #------------------------------------------------------
    # 聲調
    #------------------------------------------------------
    - xform/6/7/ # 聲調 6 改為 7
    #------------------------------------------------------
    # 韻母
    #------------------------------------------------------
    - derive/ur/u/
    - derive/or/o/
    # 韻母 ing/ik → eng/ek（須在移位前） ----
    - xform/i(ng|k)/e$1/
    #------------------------------------------------------
    # 声母
    #------------------------------------------------------
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    - xform/tsh/c/ # ㄘ
    - xform/ts(?!h)/z/ # ㄗ（拼音字母 ts 之後不是接 h 的【c】換成【z】）
    #======================================================
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #======================================================
    - xform/'/ /
    - xform/\s+/ /   # 多重空白壓成一格（美化）
    #------------------------------------------------------
    # 連續輸入適用之音節拆解【音節】=【聲母】+【韻母】+【聲調】
    #   1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    #   2) 無聲母起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    #   3) 一般情況（有聲母）
    #   這三條都用詞界 \b 逐一命中每個 token
    #------------------------------------------------------
    # 1) 鼻音單音節（m/ng + 調號）→ 視為零聲母：Ø
    #    【輪入範例】： "giam1 m7 ga1"
    #    \b((?:m|ng)\d)\b 會匹配獨立的 m7
    #    不會 匹配 giam1 中的 m1（因為前面有 a，不是詞界）
    #    結果："giam1 〔〉Øm7〕 【》Øm7】 ga1"
    #------------------------------------------------------
    # 在 (?:m|ng) 中：
    # ?: 表示「我只想要群組化，但不要捕獲」
    # m|ng 表示「匹配 m 或 ng」
    # - xform/\b((?:m|ng)\d)\b/〔Ø$1〕 【》Ø$1】/
    # - xform/\b((?:m|ng)\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 2) 零聲母（無聲母）起頭（[iu]?(ai|au|oo|母音) ... + 調號）
    #    【輪入範例】： "giam1 ai2 ua3"
    #    匹配獨立的 ai2 和 ua3
    #    不會 匹配 giam1 中的 iam1
    #    結果："giam1 【》Øai2】 〔〉Øai2〕 【》Øua3】 〔〉Øua3〕"
    # - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/〔Ø$1〕 【》Ø$1】/
    # - xform/\b([iu]?(?:ai|au|oo|[aiueo])[a-z]*\d)\b/〔〉Ø$1〕 【》Ø$1】/
    # 3) 一般情況（有聲母）
    #    【輪入範例】： "giam1 tshui2"
    #    匹配 giam1 和 tshui2
    #    結果："【》giam1】 〔giam1〕 【》tshui2】 〔tshui2〕"
    # - xform/\b([a-z]+\d)\b/〔$1〕 【》$1】/
    # - xform/\b([a-z]+\d)\b/〔〉$1〕 【》$1】/
    # 兩對音節之間，以兩個空白隔開
    # - xform/〕\s+【/〕  【/
    #------------------------------------------------------
    # 為候選字之拼音字母，建立轉換格式
    #------------------------------------------------------
    # 【零聲母】組合型式
    # 1. 零聲母 + 元音韻母 + 調號，如：Øu5, Øi1, ...
    # 2. 零聲母 + 複合韻母 + 調號，如：Øiau1, Øiong2, Øuan2, Øuai1, ....
    # 3. 零聲母 + 鼻化韻母 + 調號，如：Øann1, Øi1, ...
    #------------------------------------------------------
    # 以【介音韻母】、【元音韻母】開始的無聲母音標
    # - xform/^([iu]?(ai|au|O|[aiueo]).*)$/〔〉Ø$1〕 【》Ø$1】/
    - xform/^([iu]?(ai|au|oo|[aiueo]).*)$/〔〉$1〕 【》$1】/
    # 以【鼻音韻母】開始的無聲母音標
    # - xform/^((m|ng)(\d))$/〔〉Ø$1〕【》Ø$1】/
    - xform/^((m|ng)(\d))$/〔〉$1〕【》$1】/
    # 以【聲母】開始的音標
    # - xform/^([a-z]+\d)$/〔〉$1〕 【》$1】/
    - xform/^(ph|p|th|t|kh|k|ng|b|m|n|l|g|z|c|j|s|h)([a-z]+)(\d)$/〔〉$1$2$3〕 【》$1$2$3】〉/ # 聲母校調
    #------------------------------------------------------
    # 以下韻母 oo 與 o 的處理作業，不可隨意調動，置於前面
    #------------------------------------------------------
    # 【元音韻母】 oo [ɔ] (= o͘ = ㆦ)，其【字典編碼】使用： O
    # - xform/oo/o͘/
    - xform/oo/O/
    # 拼音字母 o [ə] = ㄜ，其【字典編碼】使用： ə
    # 【判斷條件】：當 o 沒被用於以下【韻母】時，需將 o 轉換為 ə
    #  以下【韻母】之 o 拼音字母，發音為： [ɔ] ，而不是 [ə]
    #  (1) oo;
    #  (2) ionn, iong, iok;
    #  (3) onn, ong, ok;
    #  (4) om, op
    - xform/o(nn|ng|k|m|p)/O$1/   # o [ɔ] = ㆦ
    - xform/o/ə/                  # o [ə] = ㄜ
    #------------------------------------------------------
    # 韻母校調
    #------------------------------------------------------
    # 【鼻音韻母】使用【鼻音前綴識別符號】：
    # a/i/u/e/oo/iau/uai/ai/au/ia/io/iu/ua/ui
    # - derive/(oo)nn/onn/ # ㆧ [oonn] = O + nn
    # - derive/([iu]?(ai|au|[aiueO]))nn/$1ⁿ/
    - derive/([iu]?(ai|au|[aiueo]))nn/$1ⁿ/
    # 此行務必置於上行之後
    # - derive/([iu]?(ai|au|[aiueO]))nn/L$1/
    - derive/([iu]?(ai|au|[aiueo]))nn/L$1/


    #======================================================
    # 右欄：注音符號
    #======================================================
    #
    #------------------------------------------------------
    # 定義【聲母】與【方音符號】對映規則
    #------------------------------------------------------
    # 消除【零聲母】
    # - xform/》Ø/》/
    #------------------------------------------------------
    # 舌齒音
    - derive/》ji/ㆢㄧ》/
    - derive/》zi/ㄐㄧ》/
    - derive/》ci/ㄑㄧ》/
    - derive/》si/ㄒㄧ》/
    # 舌尖前音（齒齦音）: z[ts/c], c[tsh/ch], s[s], j[j]
    # 舌齒音（齒齦顎音）
    - xform/》j/ㆡ》/
    - xform/》z/ㄗ》/
    - xform/》c/ㄘ》/
    - xform/》s/ㄙ》/
    #------------------------------------------------------
    # 唇音(不送氣音/送氣音/濁音/鼻音)
    - xform/》ph/ㄆ》/
    - xform/》p(?!h)(?!\d)/ㄅ》/
    - xform/》m(?!\d)/ㄇ》/ # m 不僅為聲母，亦為韻化聲母
    - xform/》b/ㆠ》/
    #------------------------------------------------------
    # 舌根音
    - xform/》kh/ㄎ》/
    - xform/》k(?!h)(?!\d)/ㄍ》/
    - xform/》ng(?!\d)/ㄫ》/
    - xform/》g/ㆣ》/
    #------------------------------------------------------
    # 舌尖音
    - xform/》th/ㄊ》/
    - xform/》t(?!h)(?!\d)/ㄉ》/
    - xform/》n(?!g)(?!\d)/ㄋ》/
    - xform/》l/ㄌ》/
    #------------------------------------------------------
    # 喉音
    - xform/》h(?!\d)/ㄏ》/   # h 不僅為聲母，亦為入聲韻尾
    #======================================================
    # 定義【韻母】與【方音符號】對映規則
    #======================================================

    #------------------------------------------------------
    # i
    #------------------------------------------------------
    # 姜 iang / 堅 ian / 兼 iam
    - xform/》iang/ㄧㄤ》/
    - xform/》ian/ㄧㄢ》/
    - xform/》ia([kt])/ㄧㄚ》$1/
    - xform/》ia(m|p)/ㄧㄚ》$1/
    # 經 ing / 巾 in / 金 im
    - xform/》i(ng|k)/ㄧ》$1/
    - xform/》i(n|t)/ㄧ》$1/
    - xform/》i(m|p)/ㄧ》$1/
    # 嘄 Niau / 嬌 iau
    - xform/》(L?)(iau)/$1ㄧㄠ》/
    # 驚 Nia / 迦 ia
    - xform/》(L?)(ia)/$1ㄧㄚ》/
    # 恭 iong
    - xform/》iO(ng|k)/ㄧㆦ》$1/
    - xform/》io(ng|k)/ㄧㆦ》$1/
    # 薑 Nio / 茄 io
    - xform/》(iə)/ㄧㄜ》/
    - xform/》(L)(iə)/$1ㄧㆦ》/
    # 牛 Niu / 丩 iu
    - xform/》(L?)(iu)/$1ㄧㄨ》/
    # 泉腔
    # - xform/》ir/ㄦ》/	    # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    - xform/》ir/ㆨ》/ # ㆨㄦ : 豬（ㄉㆨ tir，海口腔）、
    # 梔 Ni / 居 i
    - xform/》(L?)(i)/$1ㄧ》/
    #------------------------------------------------------
    # u
    #------------------------------------------------------
    # 閂 Nuai / 乖 uai
    - xform/》(L?)(uai)/$1ㄨㄞ》/
    # 光 uang / 觀 uan
    - xform/》uang/ㄨㄤ》/
    - xform/》uan/ㄨㄢ》/
    - xform/》ua([kt])/ㄨㄚ》$1/
    # 官 Nua / 瓜 ua
    - xform/》(L?)(ua)/$1ㄨㄚ》/
    # 褌 Nui / 規 ui
    - xform/》(L?)(ui)/$1ㄨㄧ》/
    # 糜 Nue / 檜 ue
    - xform/》(L?)(ue)/$1ㄨㆤ》/
    # 君 un
    - xform/》u(n|t)/ㄨ》$1/
    # 方音
    - xform/》ur/ㄨ》/
    # 艍 u
    - xform/》u/ㄨ》/
    #------------------------------------------------------
    # a
    #------------------------------------------------------
    # 江 ang / 干 an / 甘 am
    - xform/》ang/ㄤ》/
    - xform/》an/ㄢ》/
    - xform/》a([kt])/ㄚ》$1/
    - xform/》a(m|p)/ㄚ》$1/
    # 閒 Nai / 皆 ai
    - xform/》(L?)(ai)/$1ㄞ》/
    # 爻 Nau / 交 au
    - xform/》(L?)(au)/$1ㄠ》/
    # 監 Na / 膠 a
    - xform/》(L?)(a)/$1ㄚ》/
    #------------------------------------------------------
    # e
    #------------------------------------------------------
    # 泉腔: erng, erk, eru, ere, ern er
    - xform/》er(ng|k)/ㄧ》$1/ # 等 [terng2], 德 [terk4]
    - xform/》er(n|t)/ㄧ》$1/ # 【恩】：ern1
    - xform/》ere/ㄨㆤ》/ # 火【鷄】:kere1
    - xform/》er/ㄜ》/ # 【火】鷄: her2
    # 稽 ei / 嘉 ee
    - xform/》ei/ㆤ》/
    - xform/》ee/ㆤ》/
    # 更 Ne / 伽 e
    - xform/》(L?)(e)/$1ㆤ》/
    #------------------------------------------------------
    # oo
    #------------------------------------------------------
    # 公 ong / 箴 om
    - xform/》O(ng|k)/ㆦ》$1/
    - xform/》o(ng|k)/ㆦ》$1/
    # 公 ong / 箴 om
    - xform/》O(m|p)/ㆦ》$1/
    - xform/》o(m|p)/ㆦ》$1/
    # 姑 Noo / 沽 oo
    - xform/》(L?)(O)/$1ㆦ》/
    - xform/》(L?)(oo)/$1ㆦ》/
    - xform/》(L?)(o͘)/$1ㆦ》/
    #------------------------------------------------------
    # o
    #------------------------------------------------------
    # 姑 No / 高 o
    # - xform/》(L?)(ə)/$1ㄜ》/ # 扛 Nə
    - xform/》ə/ㄜ》/ # 高 o
    #======================================================
    # 校調【鼻化韻母】輸出格式：
    # （1）無【鼻化韻母前綴符號】，如：【方音符號】
    #    【方音符號】： nia = Lia = ㄥㄧㄚ = ㆪㄚ = ㄧㆩ
    # （2）有【鼻化韻母前綴符號】，如：【閩拼方案】、【台語音標注音】
    #    【閩拼方案】： nia = Lia = ㄥㄧㄚ
    #    【台語音標】： nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    #
    # Liau, Lia, Lio, Liu
    # Luai, Lua, Lui, Lue
    # Li, Lu, La, Lo, Le, Lai, Lau
    #======================================================
    #
    #------------------------------------------------------
    # （1）無【鼻化韻母前綴符號】之【方音符號】
    #------------------------------------------------------
    # 介音 i 開頭之鼻韻母
    - xform/Lㄧㄠ/ㄧㆯ/ # Liau = iaunn
    - xform/Lㄧㄚ/ㄧㆩ/ # Lia = iann
    - xform/Lㄧㆦ/ㄧㆧ/ # LiO = iOnn
    - xform/Lㄧㄨ/ㄧㆫ/ # Liu = iunn
    # 介音 u 開頭之鼻韻母
    - xform/Lㄨㄞ/ㄨㆮ/ # Luai = uainn
    - xform/Lㄨㄚ/ㄨㆩ/ # Lua = uann
    - xform/Lㄨㄧ/ㄨㆪ/ # Lui = uinn
    - xform/Lㄨㆤ/ㄨㆥ/ # Lue = uenn
    # 元音/複合鼻韻母
    - xform/Lㄧ/ㆪ/ # Li = inn
    - xform/Lㄨ/ㆫ/ # Lu = unn
    - xform/Lㄚ/ㆩ/ # La = ann
    - xform/Lㆦ/ㆧ/ # LO = Onn
    - xform/Lㆤ/ㆥ/ # Le = enn
    - xform/Lㄞ/ㆮ/ # Lai = ainn
    - xform/Lㄠ/ㆯ/ # Lau = aunn
    #------------------------------------------------------
    # 將【鼻化韻母後綴識別符號】轉換成【方音符號】之鼻化韻母
    # 【註】：萬不可刪此段，否則【方音符號】的鼻化韻母將無法轉換
    #------------------------------------------------------
    - xform/ㄧ》ⁿ/ㆪ》/ # Li = inn
    - xform/ㄨ》ⁿ/ㆫ》/ # Lu = unn
    - xform/ㄚ》ⁿ/ㆩ》/ # La = ann
    - xform/ㆦ》ⁿ/ㆧ》/ # LO = Onn
    - xform/ㆤ》ⁿ/ㆥ》/ # Le = enn
    - xform/ㄞ》ⁿ/ㆮ》/ # Lai = ainn
    - xform/ㄠ》ⁿ/ㆯ》/ # Lau = aunn
    #------------------------------------------------------
    # （2）無【鼻化韻母前綴符號】之【閩拼方案】
    #------------------------------------------------------
    # # 介音 i 開頭之鼻韻母
    # - xform/Lㄧㄠ/ㄥㄧㄠ/ # Liau = iaunn
    # - xform/Lㄧㄚ/ㄥㄧㄚ/ # Lia = iann
    # - xform/Lㄧㄛ/ㄥㄧㄛ/ # LiO = iOnn
    # - xform/Lㄧㄨ/ㄥㄧㄨ/ # Liu = iunn
    # # 介音 u 開頭之鼻韻母
    # - xform/Lㄨㄞ/ㄥㄨㄞ/ # Luai = uainn
    # - xform/Lㄨㄚ/ㄥㄨㄚ/ # Lua = uann
    # - xform/Lㄨㄧ/ㄥㄨㄧ/ # Lui = uinn
    # - xform/Lㄨㆤ/ㄥㄨㆤ/ # Lue = uenn
    # # 元音/複合鼻韻母
    # - xform/Lㄧ/ㄥㄧ/ # ㆪ Li = inn
    # - xform/Lㄨ/ㄥㄨ/ # ㆫ Lu = unn
    # - xform/Lㄚ/ㄥㄚ/ # ㆩ La = ann
    # - xform/Lㆦ/ㄥㆦ/ # ㆧ LO = Onn
    # - xform/Lㆤ/ㄥㆤ/ # ㆥ Le = enn
    # - xform/Lㄞ/ㄥㄞ/ # ㆮ Lai = ainn
    # - xform/Lㄠ/ㄥㄠ/ # ㆯ Lau = aunn
    #------------------------------------------------------
    # （2）無【鼻化韻母前綴符號】之【閩拼方案】
    #------------------------------------------------------
    # 【台語音標】鼻化韻母前綴識別符：nia = Lia = ⁰ㄧㄚ = ㄧㆩ
    - xform/》L/》ㄥ/
    # 處理其餘的 L（如果還有的話）
    - xform/L/ㄥ/
    # 造字用之【鼻化韻母前綴符號】
    # - xform/ㄥ// # \uF8F4 = 63732
    #------------------------------------------------------
    # 鼻音韻尾
    # 陽聲韻： 姆[m-] / 鋼[ng-] / n
    #------------------------------------------------------
    - xform/》m/ㆬ》/
    - xform/》ng/ㆭ》/
    - xform/》n/ㄣ》/
    #------------------------------------------------------
    # 入聲韻 p t k h
    #------------------------------------------------------
    - xform/》p([480])/ㆴ》$1/
    - xform/》t([480])/ㆵ》$1/
    - xform/》k([480])/ㆻ》$1/
    - xform/》h([480])/ㆷ》$1/
    #------------------------------------------------------
    # 【方音符號】校調
    #------------------------------------------------------
    # 聲母校調
    # 使用【前綴識別】輸入校調
    - xform/ㆡ((ㄥ)?ㄧ)/ㆢ$1/
    - xform/ㄗ((ㄥ)?ㄧ)/ㄐ$1/
    - xform/ㄘ((ㄥ)?ㄧ)/ㄑ$1/
    - xform/ㄙ((ㄥ)?ㄧ)/ㄒ$1/
    # 國/台語注音符號複合韻母校調
    - xform/ㄚㄧ/ㄞ/    # ai
    - xform/ㄚㄣ/ㄢ/    # an
    - xform/ㄚㄨ/ㄠ/    # au
    # 方音符號複合韻母校調
    # 陽聲韻尾校調  ㆬ、ㄣ、ㆭ
    - xform/ㄧㆭ/ㄧㄥ/
    - xform/ㄚㆬ/ㆰ/
    - xform/ㄚㆭ/ㄤ/
    - xform/ㆦㆬ/ㆱ/
    - xform/ㆦㆭ/ㆲ/
    #------------------------------------------------------
    # - xform/》1/ˉ/        # 1 ¹ ˉ   陰平
    # - xform/》6/˫/ # 7 ⁷ ˫   陽去
    - xform/》1//   # 1 ¹ ˉ   陰平
    - xform/》2/ˋ/ # 2 ² ˋ   上声：不分陰上或陽上
    - xform/》3/˪/  # 3 ³ ˪   陰去
    - xform/》4//   # 1 ¹ ˉ   陰入
    - xform/》5/ˊ/ # 5 ⁵ ˊ   陽平
    - xform/》7/˫/  # 4 ⁴     陰入
    - xform/》8/˙/ # 8 ⁸ ˙   陽入
    - xform/》0/˙/ # 0 ⁰ ˙   入声


    #======================================================
    # 左欄：白話字（POJ）
    #======================================================
    # ---- 1. 聲調正規化 ----
    # - xform/6/7/
    # ---- 2. 聲母 ----
    - xform/〔〉c/〔chh〉/
    - xform/〔〉z/〔ch〉/
