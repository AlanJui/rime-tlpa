lib_comment_poj:
  #=======================================================================
  # 單欄【候選清單】：白話字
  #=======================================================================
  __append:
    # comment_format 直接處理字典原碼（台羅拼音 + 數字調號 1-8），無需 xlit
    # ---- 1. 聲調正規化 ----
    - xform/6/7/
    # ---- 2. 聲母：TLPA → POJ ----
    - xform/tsh/chh/
    - xform/ts(?!h)/ch/
    # ---- 3. 韻母 ing/ik → eng/ek（須在移位前） ----
    - xform/i(ng|k)/e$1/
    # ---- 4. oo 韻母：整體加入調號標記，避免被移位拆開 ----
    - xform/oo([12345678])/o͘$1/
    # ---- 5. 調符移位 ----
    - xform/([aeiou])(r?m?n*h?g?p?t?k?)([12345678])/$1$3$2/
    - xform/([ae])([iueo])([12345678])/$1$3$2/
    # ---- 6. o͘ 調符代換 ----
    - xform/o͘1/o͘/
    - xform/o͘2/ó͘/
    - xform/o͘3/ò͘/
    - xform/o͘4/o͘/
    - xform/o͘5/ô͘/
    - xform/o͘7/ō͘/
    - xform/o͘8/o̍͘/
    # ---- 7. 一般調符代換 ----
    - xform/a1/a/
    - xform/e1/e/
    - xform/i1/i/
    - xform/u1/u/
    - xform/o1/o/
    - xform/m1/m/
    - xform/ng1/ng/
    - xform/a2/á/
    - xform/e2/é/
    - xform/i2/í/
    - xform/u2/ú/
    - xform/o2/ó/
    - xform/a3/à/
    - xform/e3/è/
    - xform/i3/ì/
    - xform/u3/ù/
    - xform/o3/ò/
    - xform/a4/a/
    - xform/e4/e/
    - xform/i4/i/
    - xform/u4/u/
    - xform/o4/o/
    - xform/a5/â/
    - xform/e5/ê/
    - xform/i5/î/
    - xform/u5/û/
    - xform/o5/ô/
    - xform/a7/ā/
    - xform/e7/ē/
    - xform/i7/ī/
    - xform/u7/ū/
    - xform/o7/ō/
    - xform/a8/a̍/
    - xform/e8/e̍/
    - xform/i8/i̍/
    - xform/u8/u̍/
    - xform/o8/o̍/
    # ---- 8. 後處理 ----
    - xform/nn/ⁿ/
    - xform/ua/oa/
    - xform/ue/oe/