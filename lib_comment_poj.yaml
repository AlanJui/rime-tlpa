# 【候選清單】程式舘：白話字（POJ）
# lib_comment_poj.yaml
# version: "v0.2.0.0"

hau_suan_tuann:
  __append:
    #==============================================================================
    # 定義【候選字清單】
    # 左欄：白話字（POJ）；右欄：台語音標（TLPA）
    #==============================================================================
    - xform/^(.*)$/〔》$1〕【$1】/
    #------------------------------------------------------
    # 遇【連續輸入】，將【分隔符號：'】換成空白
    #------------------------------------------------------
    # 左欄多音節：' 後面插入 》 標記（lookahead 限左欄 〔...〕 內）
    - xform/'(?=[^〕】]*〕)/ 》/
    - xform/'/ /
    - xform/\s+/ / # 多重空白壓成一格（美化）

    # ---- 0b. 右欄：聲母轉換 ----
    - xform/【tsh/【c/
    - xform/【ts(?!h)/【z/
    # ---- 0c. 韻化輔音特別處理 ----
    - xform/〔(m)(\d)/〔》m$2/
    - xform/〔(ng)(\d)/〔》n$2g/

    # ---- 1. 聲母：TL → POJ ----
    # 齒音/舌齒音（多字母先處理，長的先匹配）
    - xform/》tsh/chh》/
    - xform/》ts(?!h)/ch》/
    - xform/》j/j》/
    - xform/》s/s》/
    # 舌根音/鼻音（濁音）
    - xform/》ng(?!\d)/ng》/
    # 舌根音
    - xform/》g/g》/
    - xform/》k(?!h)/k》/
    - xform/》kh/kh》/
    # 唇音
    - xform/》b/b》/
    - xform/》p(?!h)/p》/
    - xform/》ph/ph》/
    - xform/》m(?!\d)/m》/
    # 舌尖音
    - xform/》t(?![hs])/t》/
    - xform/》th/th》/
    - xform/》n(?!g)/n》/
    - xform/》l/l》/
    # 聲門音
    - xform/》h/h》/

    # ---- 2. 韻母+聲調：TL → TLPA ----
    # 鼻化韻母：自 nn 後綴，改 n 前綴
    # - xform/》onn/》noo/          # onn(ㆧ) → noo（須先於一般規則）
    # - xform/》([iu]?(?:ai|ao|[aiueo]))nn/》$1ⁿ/  # ann→na, inn→ni, unn→nu 等
    - xform/》oo(\d)/》o͘${1}͘/
    - xform/》uainnh(\d)/o》a${1}ihⁿ/
    - xform/》iannh(\d)/i》a${1}hⁿ/
    - xform/》iaunn(\d)/i》a${1}uⁿ/
    - xform/》iunnh(\d)/》i${1}uhⁿ/
    - xform/》uainn(\d)/o》a${1}iⁿ/
    - xform/》annh(\d)/》a${1}hⁿ/
    - xform/》ainn(\d)/》a${1}iⁿ/
    - xform/》ennh(\d)/》e${1}hⁿ/
    - xform/》iann(\d)/i》a${1}ⁿ/
    - xform/》ionn(\d)/i》o${1}ⁿ/
    - xform/》iunn(\d)/》i${1}uⁿ/
    - xform/》onnh(\d)/》o${1}hⁿ/
    - xform/》ann(\d)/》a${1}ⁿ/
    - xform/》enn(\d)/》e${1}ⁿ/
    - xform/》inn(\d)/》i${1}ⁿ/
    - xform/》uih(\d)/》u${1}ih/
    - xform/》iang(\d)/i》a${1}ng/
    - xform/》iauh(\d)/i》a${1}uh/
    - xform/》iong(\d)/i》o${1}ng/
    - xform/》uann(\d)/o》a${1}ⁿ/
    - xform/》uang(\d)/o》a${1}ng/
    - xform/》uaih(\d)/o》a${1}ih/
    - xform/》uinn(\d)/》u${1}iⁿ/
    - xform/》ang(\d)/》a${1}ng/
    - xform/》aih(\d)/》a${1}ih/
    - xform/》auh(\d)/》a${1}uh/
    - xform/》ing(\d)/》e${1}ng/
    - xform/》iah(\d)/i》a${1}h/
    - xform/》iam(\d)/i》a${1}m/
    - xform/》ian(\d)/i》a${1}n/
    - xform/》iap(\d)/i》a${1}p/
    - xform/》iat(\d)/i》a${1}t/
    - xform/》iak(\d)/i》a${1}k/
    - xform/》iau(\d)/i》a${1}u/
    - xform/》ioh(\d)/i》o${1}h/
    - xform/》iok(\d)/i》o${1}k/
    - xform/》onn(\d)/》o${1}ⁿ/
    - xform/》ooh(\d)/》o${1}͘h/
    - xform/》ong(\d)/》o${1}ng/
    - xform/》uah(\d)/o》a${1}h/
    - xform/》uan(\d)/o》a${1}n/
    - xform/》uat(\d)/o》a${1}t/
    - xform/》uai(\d)/o》a${1}i/
    - xform/》ueh(\d)/o》e${1}h/
    - xform/》ngh(\d)/》n${1}gh/
    - xform/》ah(\d)/》a${1}h/
    - xform/》am(\d)/》a${1}m/
    - xform/》an(\d)/》a${1}n/
    - xform/》ap(\d)/》a${1}p/
    - xform/》at(\d)/》a${1}t/
    - xform/》ak(\d)/》a${1}k/
    - xform/》ai(\d)/》a${1}i/
    - xform/》au(\d)/》a${1}u/
    - xform/》eh(\d)/》e${1}h/
    - xform/》ih(\d)/》i${1}h/
    - xform/》im(\d)/》i${1}m/
    - xform/》in(\d)/》i${1}n/
    - xform/》ip(\d)/》i${1}p/
    - xform/》it(\d)/》i${1}t/
    - xform/》ik(\d)/》e${1}k/
    - xform/》ia(\d)/》i${1}a/
    - xform/》io(\d)/》i${1}o/
    - xform/》iu(\d)/》i${1}u/
    - xform/》oh(\d)/》o${1}h/
    - xform/》om(\d)/》o${1}m/
