    - xform/》ui(\d)/u》i${1}/
    - xform/》mh(\d)/》m${1}h/
    - xform/》ng(\d)/》n${1}g/
    - xform/》a(\d)/》a${1}/
    - xform/》e(\d)/》e${1}/
    - xform/》i(\d)/》i${1}/
    - xform/》o(\d)/》o${1}/
    - xform/》u(\d)/》u${1}/
    - xform/》m(\d)/》m${1}/

    # ---- 羅馬拼音字母上方標聲調符號 ----
    - xform/》o͘1/o͘/
    - xform/》o͘2/ó͘/
    - xform/》o͘3/ò͘/
    - xform/》o͘4/o͘/
    - xform/》o͘5/ǒ͘/
    - xform/》o͘6/ó͘/
    - xform/》o͘7/ō͘/
    - xform/》o͘8/o̍͘/
    - xform/》o͘9/ő͘/

    # 1: 陰平調
    - xform/》a1/a/
    - xform/》i1/i/
    - xform/》u1/u/
    - xform/》e1/e/
    - xform/》o1/o/
